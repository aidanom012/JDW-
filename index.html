<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JDW Campaign Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#07070a;
      --panel:#111119;
      --panel2:#171720;
      --text:#f5f5f7;
      --muted:#a1a1aa;
      --muted2:#71717a;
      --line:#2b2b36;
      --accent:#d7ff38;
      --accent-rgb:215,255,56;
      --red:#ff5f6d;
      --orange:#ffb454;
      --blue:#7aa7ff;
      --green:#72ff99;
      --purple:#c084fc;
      --cyan:#67e8f9;
      --shadow:0 24px 80px rgba(0,0,0,.42);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 15% 0%,rgba(var(--accent-rgb),.13),transparent 28%),
        radial-gradient(circle at 80% 20%,rgba(122,167,255,.10),transparent 25%),
        var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    .hidden{display:none!important}
    h1,h2,h3,p{margin-top:0}
    .muted{color:var(--muted)}
    .small{font-size:12px;line-height:1.55;color:var(--muted2)}

    label{
      display:block;
      font-size:11px;
      letter-spacing:.075em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:850;
      line-height:1.35;
    }

    input,textarea,select{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(0,0,0,.26);
      color:var(--text);
      padding:14px 15px;
      outline:none;
      min-width:0;
    }

    textarea{
      resize:vertical;
      min-height:130px;
      line-height:1.48;
    }

    input:focus,textarea:focus,select:focus{
      border-color:rgba(var(--accent-rgb),.65);
      box-shadow:0 0 0 4px rgba(var(--accent-rgb),.08);
      background:rgba(0,0,0,.38);
    }

    .field{display:grid;gap:10px;min-width:0}
    .stack{display:grid;gap:22px}
    .row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .between{display:flex;align-items:center;justify-content:space-between;gap:18px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}

    .btn{
      border:0;
      border-radius:14px;
      padding:13px 18px;
      background:var(--accent);
      color:#050505;
      font-weight:950;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      white-space:nowrap;
      transition:.16s;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn.secondary{
      background:rgba(255,255,255,.055);
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn.danger{
      background:rgba(255,95,109,.12);
      color:var(--red);
      border:1px solid rgba(255,95,109,.32);
    }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
      transform:none;
    }

    .login-screen{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .login-card{
      width:min(540px,100%);
      padding:36px;
      border:1px solid var(--line);
      border-radius:30px;
      background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.025));
      box-shadow:var(--shadow);
    }

    .logo-row{display:flex;gap:14px;align-items:center;margin-bottom:30px}

    .logo{
      width:48px;
      height:48px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:var(--accent);
      color:#050505;
      font-weight:950;
      letter-spacing:-.08em;
      box-shadow:0 0 35px rgba(var(--accent-rgb),.25);
    }

    .login-card h1{
      font-size:34px;
      line-height:.98;
      letter-spacing:-.065em;
      margin-bottom:14px;
    }

    .status-box{
      padding:13px 14px;
      border-radius:16px;
      border:1px solid rgba(114,255,153,.35);
      background:rgba(114,255,153,.08);
      color:var(--green);
      font-size:13px;
      line-height:1.45;
    }

    .status-box.error{
      border-color:rgba(255,95,109,.35);
      background:rgba(255,95,109,.08);
      color:var(--red);
    }

    .app{
      height:100vh;
      display:grid;
      grid-template-columns:280px 1fr;
    }

    .sidebar{
      border-right:1px solid var(--line);
      background:rgba(10,10,14,.78);
      backdrop-filter:blur(16px);
      padding:18px;
      overflow-y:auto;
    }

    .side-title h2{
      font-size:14px;
      margin:0;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .side-title p{
      margin:3px 0 0;
      font-size:12px;
      color:var(--muted);
    }

    .side-section-title{
      font-size:11px;
      letter-spacing:.11em;
      color:var(--muted2);
      text-transform:uppercase;
      font-weight:900;
      margin:24px 0 9px;
    }

    .folder-toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:24px 0 9px;
      font-size:11px;
      letter-spacing:.11em;
      color:var(--muted2);
      text-transform:uppercase;
      font-weight:900;
    }

    .folder-add-btn{
      width:24px;
      height:24px;
      border-radius:8px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.055);
      color:var(--accent);
      font-weight:950;
      line-height:1;
    }

    .folder-add-btn:hover{
      background:rgba(var(--accent-rgb),.12);
      border-color:rgba(var(--accent-rgb),.35);
    }

    .folder-list{display:grid;gap:7px}

    .folder-item{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:11px 12px;
      border:1px solid transparent;
      border-radius:13px;
      background:transparent;
      color:var(--muted);
      text-align:left;
    }

    .folder-item:hover{
      background:rgba(255,255,255,.05);
      color:var(--text);
    }

    .folder-item.active{
      background:rgba(var(--accent-rgb),.10);
      color:var(--accent);
      border-color:rgba(var(--accent-rgb),.20);
    }

    .folder-item-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      width:100%;
      background:none;
      border:0;
      color:inherit;
      text-align:left;
      padding:0;
    }

    .folder-delete-x{
      width:22px;
      height:22px;
      border-radius:999px;
      border:1px solid transparent;
      background:transparent;
      color:var(--muted2);
      font-size:14px;
      font-weight:900;
      display:grid;
      place-items:center;
      flex:0 0 auto;
    }

    .folder-delete-x:hover{
      color:var(--red);
      background:rgba(255,95,109,.10);
      border-color:rgba(255,95,109,.25);
    }

    .campaign-sublist{
      display:grid;
      gap:6px;
      margin:6px 0 10px 18px;
    }

    .campaign-subitem{
      width:100%;
      border:1px solid transparent;
      border-radius:12px;
      background:rgba(255,255,255,.028);
      color:var(--muted);
      padding:9px 10px;
      text-align:left;
      font-size:12px;
      line-height:1.25;
    }

    .campaign-subitem:hover{
      background:rgba(255,255,255,.06);
      color:var(--text);
      border-color:var(--line);
    }

    .folder-name{
      display:flex;
      align-items:center;
      gap:7px;
      min-width:0;
    }

    .folder-name span:last-child{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:22px;
      height:22px;
      border-radius:999px;
      padding:0 7px;
      background:rgba(255,255,255,.07);
      color:var(--muted);
      font-size:11px;
      font-weight:850;
    }

    .main{
      min-width:0;
      display:grid;
      grid-template-rows:auto auto auto 1fr;
      overflow:hidden;
    }

    .topbar{
      padding:18px 22px;
      border-bottom:1px solid var(--line);
      background:rgba(11,11,16,.62);
      backdrop-filter:blur(16px);
    }

    .topbar h1{
      margin:0;
      font-size:27px;
      letter-spacing:-.055em;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(150px,1fr));
      gap:12px;
      padding:16px 22px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.018);
    }

    .stat-card{
      border:1px solid var(--line);
      background:rgba(255,255,255,.035);
      border-radius:16px;
      padding:13px;
    }

    .stat-card strong{
      display:block;
      font-size:24px;
      letter-spacing:-.04em;
    }

    .stat-card span{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
    }

    .toolbar{
      padding:16px 22px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      border-bottom:1px solid var(--line);
      background:rgba(7,7,10,.38);
    }

    .search{max-width:430px}

    .board{
      padding:22px;
      overflow:auto;
      display:grid;
      grid-template-columns:repeat(8,minmax(260px,1fr));
      gap:16px;
      align-items:start;
    }

    .stack-board{
      display:block;
      overflow:auto;
    }

    .stack-group{
      border:1px solid var(--line);
      border-radius:20px;
      background:rgba(255,255,255,.028);
      padding:14px;
      margin-bottom:16px;
    }

    .stack-group-head{margin-bottom:12px}

    .stack-group-head h3{
      margin:0;
      font-size:18px;
      letter-spacing:-.04em;
    }

    .stack-list{
      display:grid;
      gap:10px;
    }

    .stack-campaign{
      border:1px solid var(--line);
      border-radius:16px;
      background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.03));
      padding:14px;
      display:grid;
      grid-template-columns:minmax(220px,1fr) minmax(240px,1fr) auto;
      gap:14px;
      align-items:center;
      cursor:pointer;
    }

    .stack-campaign:hover{
      border-color:rgba(var(--accent-rgb),.35);
      background:rgba(255,255,255,.07);
    }

    .stack-campaign h3{
      margin:0 0 5px;
      font-size:15px;
    }

    .stack-campaign p{
      margin:0;
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
    }

    .stack-budget{
      display:grid;
      gap:4px;
      font-size:12px;
      color:var(--muted);
    }

    .stack-budget strong,
    .stack-budget span{
      color:var(--text);
    }

    .column{
      background:rgba(255,255,255,.035);
      border:1px solid var(--line);
      border-radius:20px;
      min-height:calc(100vh - 250px);
      padding:12px;
    }

    .column.drag-over{
      border-color:rgba(var(--accent-rgb),.55);
      background:rgba(var(--accent-rgb),.045);
    }

    .column-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
      padding:3px 3px 7px;
    }

    .column-title{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--text);
      font-weight:950;
      font-size:13px;
    }

    .status-dot{
      width:9px;
      height:9px;
      border-radius:999px;
      background:var(--muted);
    }

    .status-dot.new{background:var(--blue)}
    .status-dot.needs{background:var(--red)}
    .status-dot.ready{background:var(--accent)}
    .status-dot.progress{background:var(--orange)}
    .status-dot.approval{background:var(--purple)}
    .status-dot.live{background:var(--green)}
    .status-dot.reporting{background:var(--cyan)}
    .status-dot.complete{background:var(--muted)}

    .cards{
      display:grid;
      gap:10px;
    }

    .card{
      border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.03));
      border-radius:17px;
      padding:14px;
      box-shadow:0 12px 28px rgba(0,0,0,.16);
      transition:.16s;
      cursor:grab;
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:rgba(var(--accent-rgb),.30);
      background:rgba(255,255,255,.07);
    }

    .card h3{
      margin:0 0 8px;
      font-size:15px;
      letter-spacing:-.025em;
    }

    .card p{
      margin:0;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
    }

    .budget-summary{
      display:grid;
      gap:6px;
      margin-top:12px;
      border:1px solid var(--line);
      border-radius:13px;
      background:rgba(0,0,0,.18);
      padding:10px;
      font-size:12px;
      line-height:1.35;
      color:var(--muted);
    }

    .budget-summary strong{color:var(--text)}
    .main-budget{font-size:13px}

    .adset-line{
      display:flex;
      align-items:center;
      gap:7px;
    }

    .adset-status-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      display:inline-block;
      flex:0 0 auto;
    }

    .adset-running{background:var(--green)}
    .adset-paused{background:var(--orange)}
    .adset-ended{background:var(--muted2)}
    .adset-review{background:var(--red)}

    .meta-grid{
      margin-top:12px;
      display:flex;
      gap:7px;
      flex-wrap:wrap;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.18);
      border-radius:999px;
      padding:5px 8px;
      color:var(--muted);
      font-size:11px;
      font-weight:800;
    }

    .progress-bar{
      height:7px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      overflow:hidden;
      margin-top:12px;
    }

    .progress-fill{
      height:100%;
      background:var(--accent);
      border-radius:inherit;
    }

    .empty{
      border:1px dashed var(--line);
      color:var(--muted2);
      border-radius:16px;
      padding:18px;
      text-align:center;
      font-size:13px;
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.62);
      display:grid;
      place-items:center;
      padding:22px;
      z-index:50;
    }

    .modal{
      width:min(1180px,100%);
      max-height:min(900px,calc(100vh - 44px));
      display:grid;
      grid-template-rows:auto auto 1fr;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:28px;
      background:#0f0f15;
      box-shadow:var(--shadow);
    }

    .modal-head{
      padding:22px 24px;
      border-bottom:1px solid var(--line);
    }

    .modal-head h2{
      margin:0 0 7px;
      font-size:28px;
      letter-spacing:-.055em;
    }

    .tabs{
      display:flex;
      gap:8px;
      padding:14px 24px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.025);
      overflow-x:auto;
    }

    .tab{
      border:1px solid var(--line);
      background:transparent;
      color:var(--muted);
      border-radius:999px;
      padding:8px 12px;
      font-weight:850;
      font-size:12px;
    }

    .tab.active{
      background:rgba(var(--accent-rgb),.1);
      color:var(--accent);
      border-color:rgba(var(--accent-rgb),.25);
    }

    .modal-body{
      overflow:auto;
      padding:28px 24px 32px;
    }

    .panel{
      border:1px solid var(--line);
      background:rgba(255,255,255,.035);
      border-radius:18px;
      padding:16px;
    }

    .panel h3{
      margin:0 0 13px;
      font-size:14px;
      letter-spacing:-.02em;
    }

    .check-item,
    .build-step{
      display:flex;
      align-items:flex-start;
      gap:11px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px;
      background:rgba(0,0,0,.16);
      margin-bottom:9px;
    }

    .check-item input,
    .build-step input{
      width:auto;
      margin-top:3px;
      accent-color:var(--accent);
    }

    .check-item.done span,
    .build-step.done span{
      color:var(--muted2);
      text-decoration:line-through;
    }

    .log-list{
      display:grid;
      gap:10px;
    }

    .log-item{
      border-left:3px solid rgba(var(--accent-rgb),.45);
      background:rgba(255,255,255,.035);
      border-radius:0 14px 14px 0;
      padding:12px;
    }

    .quality-list{
      display:grid;
      gap:8px;
    }

    .quality-item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
      background:rgba(0,0,0,.16);
    }

    .quality-ok{
      color:var(--green);
      font-weight:900;
    }

    .quality-missing{
      color:var(--red);
      font-weight:900;
    }

    .autosave-note{
      font-size:12px;
      color:var(--muted2);
      font-weight:800;
    }

    .toast{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:80;
      max-width:460px;
      padding:13px 14px;
      border-radius:16px;
      border:1px solid rgba(114,255,153,.28);
      background:rgba(20,35,25,.94);
      color:var(--green);
      box-shadow:var(--shadow);
      font-size:13px;
    }

    .toast.error{
      border-color:rgba(255,95,109,.35);
      background:rgba(40,20,24,.94);
      color:var(--red);
    }

    @media(max-width:900px){
      .app{grid-template-columns:1fr}
      .sidebar{display:none}
      .grid-2,.grid-3{grid-template-columns:1fr}
      .stack-campaign{grid-template-columns:1fr}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .toolbar{align-items:flex-start;flex-direction:column}
      .search{max-width:none}
    }
  </style>
</head>

<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-card stack">
      <div class="logo-row">
        <div class="logo">JW</div>
        <div>
          <h2 style="margin:0;font-size:14px;letter-spacing:.08em;text-transform:uppercase;">JDW Campaign Hub</h2>
          <p class="small" style="margin:3px 0 0;">Supabase-powered campaign operations portal</p>
        </div>
      </div>

      <div>
        <h1>Briefs, builds, logs and reports in one place.</h1>
        <p class="muted">Sign in with your Supabase email and password.</p>
      </div>

      <form id="authForm" class="stack">
        <div class="grid-2">
          <div class="field">
            <label>Email</label>
            <input id="emailInput" type="email" required>
          </div>

          <div class="field">
            <label>Password</label>
            <input id="passwordInput" type="password" required>
          </div>
        </div>

        <div class="row">
          <button id="signInButton" class="btn" type="submit">Sign In</button>
          <button id="signUpButton" class="btn secondary" type="button">Create Account</button>
        </div>

        <div id="authStatus" class="status-box">Loading login...</div>
      </form>
    </div>
  </section>

  <section id="app" class="app hidden">
    <aside class="sidebar">
      <div class="logo-row side-title">
        <div class="logo">JW</div>
        <div>
          <h2>Campaign Hub</h2>
          <p id="userLabel">Shared dashboard</p>
        </div>
      </div>

      <button class="btn" style="width:100%;" id="newCampaignSideBtn">+ New Campaign</button>
      <button class="btn secondary" style="width:100%;margin-top:12px;" id="importBriefSideBtn">Import Messy Brief</button>
      <button class="btn secondary" style="width:100%;margin-top:12px;" id="settingsBtn">Settings</button>

      <div class="folder-toolbar">
        <span>Artists</span>
        <button class="folder-add-btn" id="addArtistBtn" title="Add artist folder">+</button>
      </div>

      <div id="artistList" class="folder-list"></div>

      <div class="side-section-title">Actions</div>
      <button class="btn secondary" style="width:100%;" id="undoBtn" disabled>Undo Last Action</button>
    </aside>

    <main class="main">
      <header class="topbar between">
        <div>
          <h1 id="pageTitle">All Artists</h1>
          <p class="small" style="margin:5px 0 0;">Drag campaign cards between columns to update status.</p>
        </div>
      </header>

      <section class="stats-grid" id="statsGrid"></section>

      <section class="toolbar">
        <input id="searchInput" class="search" placeholder="Search campaigns, artists, briefs or logs...">

        <div class="row">
          <button class="btn secondary" id="viewToggleBtn">Stack View</button>
          <select id="artistFilterMobile"></select>
          <select id="sortSelect">

    async function signIn(){
      const email = val("emailInput");
      const password = val("passwordInput");

      if(!email || !password){
        setAuthStatus("Enter email and password.",true);
        return;
      }

      setAuthStatus("Signing in...");

      const {data,error} = await supabaseClient.auth.signInWithPassword({email,password});

      if(error){
        setAuthStatus(error.message,true);
        return;
      }

      currentUser = data.user;
      await showCorrectScreen();
    }

    async function signUp(){
      const email = val("emailInput");
      const password = val("passwordInput");

      if(!email || !password){
        setAuthStatus("Enter email and password.",true);
        return;
      }

      setAuthStatus("Creating account...");

      const {data,error} = await supabaseClient.auth.signUp({email,password});

      if(error){
        setAuthStatus(error.message,true);
        return;
      }

      if(data.session){
        currentUser = data.user;
        await showCorrectScreen();
      }else{
        setAuthStatus("Account created. Check email confirmation settings, then sign in.");

    async function signOut(){
      await supabaseClient.auth.signOut();

    async function showCorrectScreen(){
      if(currentUser){
        document.getElementById("loginScreen").classList.add("hidden");

        renderAll();
        await loadData();
      }else{
        document.getElementById("loginScreen").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
      }
    }

    async function loadData(){
      try{
        renderAll();

        const [artistsRes,campaignsRes,checklistRes,logsRes,adSetsRes] = await Promise.all([
          supabaseClient.from("artists").select("*").order("name"),
          supabaseClient.from("campaigns").select("*").order("updated_at",{ascending:false}),
          supabaseClient.from("checklist_items").select("*").order("position"),
          supabaseClient.from("work_logs").select("*").order("created_at"),
          supabaseClient.from("ad_sets").select("*").order("position")
        ]);

        if(artistsRes.error) throw artistsRes.error;
        if(campaignsRes.error) throw campaignsRes.error;
        if(checklistRes.error) throw checklistRes.error;
        if(logsRes.error) throw logsRes.error;
        if(adSetsRes.error) throw adSetsRes.error;

        artists = artistsRes.data || [];
        campaigns = campaignsRes.data || [];
        checklistItems = checklistRes.data || [];
        workLogs = logsRes.data || [];
        adSets = adSetsRes.data || [];

        renderAll();
      }catch(error){
        toast("Load failed: " + error.message,true);
        renderAll();
      }
    }

    function setUndo(label,fn){
      undoAction = {label,fn};

      const button = document.getElementById("undoBtn");

      if(button){
        button.disabled = false;
        button.textContent = label;
      }
    }

    function clearUndo(){
      undoAction = null;

      const button = document.getElementById("undoBtn");

      if(button){
        button.disabled = true;
        button.textContent = "Undo Last Action";
      }
    }

    async function undoLastAction(){
      if(!undoAction) return;

      const action = undoAction;
      clearUndo();

      try{
        await action.fn();
        toast("Undo complete.");
      }catch(error){
        toast("Undo failed: " + error.message,true);
      }
    }

    function renderAll(){
      renderArtists();
      renderMobileArtistSelect();
      renderStats();
      renderBoard();
    }

    function getArtistName(id){
      return artists.find(artist=>artist.id===id)?.name || "Unknown Artist";
    }

    function getCampaignChecklist(id){
      return checklistItems
        .filter(item=>item.campaign_id===id)
        .sort((a,b)=>(a.position||0)-(b.position||0));
    }

    function getCampaignLogs(id){
      return workLogs
        .filter(log=>log.campaign_id===id)
        .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    }

    function getCampaignAdSets(id){
      return adSets
        .filter(adSet=>adSet.campaign_id===id)
        .sort((a,b)=>(a.position||0)-(b.position||0));
    }

    function renderArtists(){
      const list = document.getElementById("artistList");

      if(!list) return;

      const rows = [
        `<button class="folder-item ${activeArtistId==="all" ? "active" : ""}" data-artist="all">

                <span>${open ? "▾" : "▸"}</span>

              activeArtistId = "all";
              document.getElementById("pageTitle").textContent = "All Artists";

          }else{
            expandedArtists.add(id);
            activeArtistId = id;
            document.getElementById("pageTitle").textContent = getArtistName(id);

          renderAll();

      list.querySelectorAll("[data-delete-artist]").forEach(button=>{

          event.stopPropagation();

    async function createArtistFolder(){
      const name = prompt("New artist folder name:");

      if(!name || !name.trim()) return;

      const cleanName = name.trim();

      try{
        const existing = artists.find(artist=>artist.name.toLowerCase()===cleanName.toLowerCase());

        if(existing){
          activeArtistId = existing.id;
          expandedArtists.add(existing.id);
          document.getElementById("pageTitle").textContent = existing.name;
          renderAll();
          toast("Artist folder already exists.");
          return;
        }

        const {data,error} = await supabaseClient
          .from("artists")
          .insert({name:cleanName})
          .select()
          .single();

        if(error) throw error;

        artists.push(data);
        activeArtistId = data.id;
        expandedArtists.add(data.id);
        document.getElementById("pageTitle").textContent = data.name;

        setUndo("Undo artist create",async()=>{
          await supabaseClient.from("artists").delete().eq("id",data.id);
          activeArtistId = "all";
          document.getElementById("pageTitle").textContent = "All Artists";
          await loadData();
        });

        renderAll();
        toast("Artist folder created.");
      }catch(error){
        toast(error.message,true);
      }
    }

    function openDeleteArtistConfirm(artistId){

      if(!artist) return;

      const artistCampaigns = campaigns.filter(campaign=>campaign.artist_id===artistId);

          </div>

      `;

      const input = document.getElementById("deleteArtistConfirmInput");

      input.addEventListener("input",()=>{
        deleteButton.disabled = input.value.trim() !== artist.name;

      document.getElementById("cancelDeleteArtistBtn").addEventListener("click",closeModal);

      deleteButton.addEventListener("click",async()=>{

    async function deleteArtistById(artistId){
      const artist = artists.find(item=>item.id===artistId);

      if(!artist) return;

      const artistCampaigns = campaigns.filter(campaign=>campaign.artist_id===artistId);
      const campaignIds = artistCampaigns.map(campaign=>campaign.id);

      const backup = {
        artist,
        campaigns:artistCampaigns,
        checklist:checklistItems.filter(item=>campaignIds.includes(item.campaign_id)),
        logs:workLogs.filter(log=>campaignIds.includes(log.campaign_id)),
        adsets:adSets.filter(adSet=>campaignIds.includes(adSet.campaign_id))
      };

      const {error} = await supabaseClient
        .from("artists")
        .delete()
        .eq("id",artistId);

      if(error){
        toast(error.message,true);
        return;
      }

      setUndo("Undo artist delete",async()=>{
        await supabaseClient.from("artists").insert(backup.artist);

        if(backup.campaigns.length){
          await supabaseClient.from("campaigns").insert(backup.campaigns);
        }

        if(backup.checklist.length){
          await supabaseClient.from("checklist_items").insert(backup.checklist);
        }

        if(backup.logs.length){
          await supabaseClient.from("work_logs").insert(backup.logs);
        }

        if(backup.adsets.length){
          await supabaseClient.from("ad_sets").insert(backup.adsets);
        }

        activeArtistId = backup.artist.id;
        expandedArtists.add(backup.artist.id);
        document.getElementById("pageTitle").textContent = backup.artist.name;

        await loadData();
      });

      activeArtistId = "all";
      document.getElementById("pageTitle").textContent = "All Artists";

      await loadData();
      toast("Artist folder deleted.");
    }

    function renderMobileArtistSelect(){
      const select = document.getElementById("artistFilterMobile");

      if(!select) return;

      select.innerHTML = [
        `<option value="all">Artist: All</option>`,
        ...artists.map(artist=>`<option value="${artist.id}">Artist: ${escapeHtml(artist.name)}</option>`)
      ].join("");

      select.value = activeArtistId;
    }

    function setActiveArtist(id){
      activeArtistId = id;

      if(id!=="all"){
        expandedArtists.add(id);
      }

      document.getElementById("pageTitle").textContent = id==="all" ? "All Artists" : getArtistName(id);
      renderAll();
    }

    function filteredCampaigns(){
      const search = document.getElementById("searchInput")?.value?.toLowerCase() || "";
      const sort = document.getElementById("sortSelect")?.value || "updated";

      let items = campaigns.filter(campaign=>{
        const artistMatch = activeArtistId==="all" || campaign.artist_id===activeArtistId;

        const text = [
          campaign.title,
          getArtistName(campaign.artist_id),
          campaign.status,
          campaign.priority,
          campaign.raw_brief,
          campaign.structured_brief,
          campaign.missing_info,
          getCampaignAdSets(campaign.id).map(adSet=>[
            adSet.name,
            adSet.objective,
            adSet.audience,
            adSet.notes,
            adSet.status,
            adSet.budget
          ].join(" ")).join(" "),
          getCampaignLogs(campaign.id).map(log=>log.text).join(" ")
        ].join(" ").toLowerCase();

        return artistMatch && text.includes(search);
      });

      items.sort((a,b)=>{
        if(sort==="artist"){
          return getArtistName(a.artist_id).localeCompare(getArtistName(b.artist_id));
        }

        if(sort==="deadline"){
          return (a.deadline || "9999").localeCompare(b.deadline || "9999");
        }

        return new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at);
      });

      return items;
    }

    function renderStats(){
      const items = filteredCampaigns();
      const count = status=>items.filter(campaign=>campaign.status===status).length;

      const dueThisWeek = items.filter(campaign=>{
        if(!campaign.deadline) return false;

        const diff = new Date(campaign.deadline+"T00:00:00") - new Date();

        return diff <= 6048e5 && diff >= -864e5;
      }).length;

      document.getElementById("statsGrid").innerHTML = `
        <div class="stat-card"><strong>${items.length}</strong><span>Campaigns</span></div>
        <div class="stat-card"><strong>${count("Needs Info")}</strong><span>Needs Info</span></div>
        <div class="stat-card"><strong>${count("Awaiting Approval")}</strong><span>Awaiting Approval</span></div>
        <div class="stat-card"><strong>${count("Live")}</strong><span>Live</span></div>
        <div class="stat-card"><strong>${dueThisWeek}</strong><span>Due This Week</span></div>
      `;
    }

    function toggleBoardView(){
      boardView = boardView==="columns" ? "stack" : "columns";
      localStorage.setItem("jdw_board_view",boardView);
      renderBoard();
    }

    function renderBoard(){
      const board = document.getElementById("board");
      const items = filteredCampaigns();

      if(!board) return;

      const toggle = document.getElementById("viewToggleBtn");

      if(toggle){
        toggle.textContent = boardView==="columns" ? "Stack View" : "Column View";
      }

      if(boardView==="stack"){
        renderStackBoard(board,items);
        return;
      }

      board.className = "board";

      board.innerHTML = STATUSES.map(status=>{
        const statusCampaigns = items.filter(campaign=>campaign.status===status.key);

        return `
          <div class="column" data-status="${status.key}">
            <div class="column-head">
              <div class="column-title"><span class="status-dot ${status.className}"></span>${status.key}</div>
              <span class="badge">${statusCampaigns.length}</span>
            </div>

            <div class="cards">
              ${
                statusCampaigns.length
                  ? statusCampaigns.map(renderCampaignCard).join("")
                  : `<div class="empty">Drop campaigns here.</div>`
              }
            </div>
          </div>
        `;
      }).join("");

      board.querySelectorAll(".column").forEach(column=>{
        column.addEventListener("dragover",event=>{
          event.preventDefault();
          column.classList.add("drag-over");
        });

        column.addEventListener("dragleave",()=>{
          column.classList.remove("drag-over");
        });

        column.addEventListener("drop",async event=>{
          event.preventDefault();
          column.classList.remove("drag-over");
          await moveCampaign(event.dataTransfer.getData("text/plain"),column.dataset.status);
        });
      });

      board.querySelectorAll(".card").forEach(card=>{
        card.addEventListener("dragstart",event=>{
          event.dataTransfer.setData("text/plain",card.dataset.id);
        });

        card.addEventListener("click",()=>{
          openCampaignModal(card.dataset.id);
        });
      });
    }

    function renderStackBoard(board,items){
      board.className = "board stack-board";

      const grouped = {};

      items.forEach(campaign=>{
        const artist = getArtistName(campaign.artist_id);

        if(!grouped[artist]){
          grouped[artist] = [];
        }

        grouped[artist].push(campaign);
      });

      board.innerHTML = Object.keys(grouped).length
        ? Object.entries(grouped).map(([artist,list])=>`
          <section class="stack-group">
            <div class="between stack-group-head">
              <h3>${escapeHtml(artist)}</h3>
              <span class="badge">${list.length}</span>
            </div>

            <div class="stack-list">
              ${list.map(renderStackCampaignCard).join("")}
            </div>
          </section>
        `).join("")
        : `<div class="empty">No campaigns found.</div>`;

      board.querySelectorAll("[data-stack-id]").forEach(card=>{
        card.addEventListener("click",()=>{
          openCampaignModal(card.dataset.stackId);
        });
      });
    }

    function renderStackCampaignCard(campaign){
      const adsets = getCampaignAdSets(campaign.id);
      const logs = getCampaignLogs(campaign.id);
      const last = logs[logs.length-1]?.text || campaign.structured_brief || "No work logs yet.";

      return `
        <article class="stack-campaign" data-stack-id="${campaign.id}">
          <div>
            <h3>${escapeHtml(campaign.title || "Untitled")}</h3>
            <p>${escapeHtml(truncate(last,120))}</p>
          </div>

          <div class="stack-budget">
            <strong>Budget: ${escapeHtml(formatCampaignBudget(campaign.budget) || "TBC")}</strong>
            ${adsets.map(adset=>`
              <span>
                ${escapeHtml(adset.name || "Ad Set")}: ${escapeHtml(formatAdSetBudget(adset))}
              </span>
            `).join("")}

    async function moveCampaign(id,status){
      if(!id) return;

      const campaign = campaigns.find(item=>item.id===id);
      const previousStatus = campaign?.status || "New Brief";

      const {error} = await supabaseClient
        .from("campaigns")
        .update({
          status,
          updated_at:new Date().toISOString()
        })
        .eq("id",id);

      if(error){
        toast(error.message,true);
        return;
      }

      await supabaseClient.from("work_logs").insert({
        campaign_id:id,
        logged_by:"System",
        log_type:"Status",
        text:`Status changed to ${status}.`,
        visible_to_james:true
      });

      setUndo("Undo status move",async()=>{
        await supabaseClient
          .from("campaigns")
          .update({
            status:previousStatus,
            updated_at:new Date().toISOString()
          })
          .eq("id",id);

        await loadData();
      });

      await loadData();
      toast("Moved to "+status);
    }

        const payload = {

    async function getOrCreateArtist(name){
      const cleanName = name.trim();

      if(!cleanName) throw new Error("Artist name is required.");

      const local = artists.find(artist=>artist.name.toLowerCase()===cleanName.toLowerCase());

      if(local) return local;

      const {data:rows,error:selectError} = await supabaseClient
        .from("artists")
        .select("*")
        .ilike("name",cleanName)
        .limit(1);

      if(selectError) throw selectError;

      if(rows && rows.length){
        artists.push(rows[0]);
        return rows[0];
      }

      const {data,error} = await supabaseClient
        .from("artists")
        .upsert({name:cleanName},{onConflict:"name"})
        .select()
        .single();

      if(error) throw error;

      artists.push(data);
      return data;
    }

    async function updateAdSet(id,silent=false){
      const existing = adSets.find(adset=>adset.id===id);

      if(!existing){
        toast("Ad set not found",true);
        return;
      }

      const status = document.querySelector(`[data-adset-status="${id}"]`)?.value || "Running";
      const notes = document.querySelector(`[data-adset-note="${id}"]`)?.value || "";
      const budget = document.querySelector(`[data-adset-budget="${id}"]`)?.value || "";
      const budget_type = document.querySelector(`[data-adset-budget-type="${id}"]`)?.value || "Daily Budget";
      const previous = {...existing};

      const {error} = await supabaseClient
        .from("ad_sets")
        .update({status,notes,budget,budget_type})
        .eq("id",id);

      if(error){
        toast(error.message,true);
        return;
      }

      const changed =
        status !== existing.status ||
        notes !== existing.notes ||
        budget !== existing.budget ||
        budget_type !== existing.budget_type;

      let logRes = {data:null};

      if(changed){
        const logText = `Ad set update — ${existing.name}: status set to ${status}. ${budget_type}: ${budget || "TBC"}.${notes ? " Notes: "+notes : ""}`;

        logRes = await supabaseClient
          .from("work_logs")
          .insert({
            campaign_id:activeCampaignId,
            logged_by:defaultLoggedBy(),
            log_type:"Ad Set",
            text:logText,
            visible_to_james:true
          })
          .select()
          .single();
      }

      setUndo("Undo ad set update",async()=>{
        await supabaseClient
          .from("ad_sets")
          .update({
            status:previous.status || "Running",
            notes:previous.notes || "",
            budget:previous.budget || "",
            budget_type:previous.budget_type || "Daily Budget"
          })
          .eq("id",id);

        if(logRes.data?.id){
          await supabaseClient.from("work_logs").delete().eq("id",logRes.data.id);
        }

        await loadData();
      });

      const index = adSets.findIndex(adset=>adset.id===id);

      if(index>=0){
        adSets[index] = {...adSets[index],status,notes,budget,budget_type};
      }

      renderBoard();
      renderStats();

      if(!silent){
        toast("Ad set update saved and logged");
      }
    }

    function localBriefOrganiser(raw){
      const lower = raw.toLowerCase();
      const title = getQuotedText(raw)[0] || "Untitled Campaign";
      const artist = getArtistBeforeTitle(raw,title) || getWordsBefore(raw,"pixel",2).replace(/^the /i,"") || "Untitled Artist";
      const objective = lower.includes("engagement") ? "Engagement" : "Confirm objective";
      const conversionLocation = lower.includes("website") ? "Website" : "Confirm conversion location";
      const event = lower.includes("view content") ? "View Content" : "Confirm optimisation event";
      const pixel = artist!=="Untitled Artist" ? artist+" pixel" : "Confirm pixel";
      const link = findUrl(raw,"song.so") || findUrl(raw,"http") || "";
      const budget = findOverallBudget(raw);
      const daily = findMoneyLine(raw,"day");
      const territories = extractTerritories(raw).join(", ");
      const split = extractAdSetBudgetSplit(raw,daily);
      const names = extractAdSetNames(raw);

      const structured = [
        `Artist: ${artist}`,
        `Campaign / track: ${title}`,
        `Campaign setup: Objective is ${objective}. Set conversion location to ${conversionLocation}. Optimise for ${event} using ${pixel}.`,
        `Conversion link: ${link || "TBC"}`,
        `Campaign budget: ${budget || "TBC"}.`,
        `Ad set budget split: ${names[0]} ${split[0] || "TBC"}; ${names[1]} ${split[1] || "TBC"}.`,
        `Targeting: ${territories || "TBC"}.`
      ].join("\\n\\n");

      return {
        artistName:clean(artist),
        title:clean(title),
        status:"New Brief",
        priority:"Normal",
        deadline:"",
        budget:budget,
        objective:`${objective}. Conversion location: ${conversionLocation}. Optimisation event: ${event}. Pixel: ${pixel}.`,
        campaign_link:link,
        territories,
        raw_brief:raw,
        structured_brief:structured,
        missing_info:"No major missing information detected.",
        report:"",
        checklist:DEFAULT_CHECKLIST,
        ad_sets:[
          {
            name:names[0],
            objective:`${conversionLocation} / ${event}`,
            budget:split[0] || daily || "TBC",
            budget_type:"Daily Budget",
            status:"Running",
            audience:"Warm custom audiences, lookalike, engagers and followers."
          },
          {
            name:names[1],
            objective:`${conversionLocation} / ${event}`,
            budget:split[1] || daily || "TBC",
            budget_type:"Daily Budget",
            status:"Running",
            audience:"Related artist / interest prospecting."
          }
        ]
      };
    }

    function formatCampaignBudget(value){
      const text = String(value || "");
      const compact = text.replace("Budget:","").replace("Campaign spend cap:","").trim();
      const found = compact.match(new RegExp("[€£$]? *[0-9][0-9,.]* *(euro|eur|gbp|usd|pounds?)?","i"));

      return found ? found[0].trim() : compact;
    }

    function formatAdSetBudget(adset){
      let amount = String(adset.budget || "").trim();

      amount = amount
        .replace("Budget:","")
        .replace("Ad set budget:","")
        .replace("if confirmed","")
        .trim();

      const found = amount.match(new RegExp("[€£$]? *[0-9][0-9,.]* *(per day|/day|daily|euro|eur|gbp|usd|pounds?)?","i"));

      amount = found ? found[0].trim() : amount || "TBC";

      const type = String(adset.budget_type || "Daily Budget").toLowerCase().includes("life")
        ? "lifetime"
        : "daily";

      return (amount+" "+type).replace(new RegExp(" +","g")," ").trim();
    }

    function slug(text){
      return String(text || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g,"-")
        .replace(/^-|-$/g,"");
    }

    function clean(text){
      return String(text || "")
        .replaceAll("-"," ")
        .replace(/\s+/g," ")
        .trim()
        .replace(/^the /i,"");
    }

    function formatDate(date){
      return date
        ? new Date(date+"T00:00:00").toLocaleDateString(undefined,{day:"2-digit",month:"short"})
        : "";
    }

    function formatDateTime(date){
      return date
        ? new Date(date).toLocaleString(undefined,{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})
        : "";
    }

    function escapeHtml(value){
      return String(value ?? "").replace(/[&<>'"]/g,char=>({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "'":"&#39;",
        '"':"&quot;"
      }[char]));
    }

    function escapeAttr(value){
      return escapeHtml(value).replace(/`/g,"&#96;");
    }

    function getQuotedText(text){
      const match = String(text).match(/["“](.*?)["”]/);

      return match ? [match[1].trim()] : [];
    }

    function getArtistBeforeTitle(raw,title){
      const marker = "write up the ";
      const lower = raw.toLowerCase();
      const start = lower.indexOf(marker);
      const index = lower.indexOf(String(title).toLowerCase());

      if(start===-1 || index===-1 || index<=start) return "";

      return clean(
        raw
          .slice(start+marker.length,index)
          .replaceAll('"',"")
          .replaceAll("“","")
          .replaceAll("”","")
      );
    }

    function getWordsBefore(raw,word,count){
      const words = String(raw)
        .replace(/[.,()]/g," ")
        .split(/\s+/)
        .filter(Boolean);

      const index = words.findIndex(item=>item.toLowerCase()===word.toLowerCase());

      return index===-1
        ? ""
        : words.slice(Math.max(0,index-count),index).join(" ");
    }

    function findUrl(text,domain){
      const tokens = String(text)
        .split(/\s+/)
        .map(token=>token.trim().replace(/[),.]+$/g,""));

      const found = tokens.find(token=>token.toLowerCase().includes(domain.toLowerCase()) && token.includes("."));

      return found
        ? (found.startsWith("http") ? found : "https://"+found)
        : "";
    }

    function findMoneyLine(text,keyword){
      const lines = String(text || "").split(String.fromCharCode(10));

      const found = lines.find(line=>
        hasNumber(line) && (!keyword || line.toLowerCase().includes(keyword.toLowerCase()))
      );

      return found ? found.trim().replace(/^[- ]+/,"") : "";
    }

    function hasNumber(text){
      return getNumbers(text).length > 0;
    }

    function getNumbers(text){
      const output = [];
      let current = "";

      for(const character of String(text || "")){
        if((character>="0" && character<="9") || character==="," || character==="."){
          current += character;
        }else{
          if(current && current!=="." && current!==","){
            output.push(current);
          }

          current = "";
        }
      }

      if(current && current!=="." && current!==","){
        output.push(current);
      }

      return output;
    }

    function moneySymbolFromText(text){
      const value = String(text || "");

      if(value.includes("£")) return "£";
      if(value.includes("$")) return "$";

      return "€";
    }

    function cleanNumberToken(number){
      return String(number || "").replaceAll(",","").trim();
    }

    function amountWithSymbol(number,raw){
      return number ? moneySymbolFromText(raw)+String(number).trim() : "";
    }

    function findOverallBudget(raw){
      const text = String(raw || "");
      const lines = text.split(String.fromCharCode(10));

      const line = lines.find(item=>{
        const lower = item.toLowerCase();

        return hasNumber(item) && (
          lower.includes("budget") ||
          lower.includes("spend cap") ||
          lower.includes("campaign level") ||
          lower.includes("campaign-level") ||
          lower.includes("total")
        );
      });

      if(line){
        const numbers = getNumbers(line).filter(number=>Number(cleanNumberToken(number))>10);

        if(numbers.length){
          return amountWithSymbol(numbers[0],text);
        }
      }

      const numbers = getNumbers(text).filter(number=>Number(cleanNumberToken(number))>10);

      return numbers.length ? amountWithSymbol(numbers[0],text) : "";
    }

    function cleanBudgetAmount(value,raw){
      const numbers = getNumbers(value).filter(number=>Number(cleanNumberToken(number))>0);

      return numbers.length ? amountWithSymbol(numbers[0],raw || value) : "";
    }

    function extractAdSetBudgetSplit(raw,fallback){
      const text = String(raw || "");
      const lines = text.split(String.fromCharCode(10));
      let first = "";
      let second = "";

      const firstLine = lines.find(line=>{
        const lower = line.toLowerCase();

        return hasNumber(line) && (
          lower.includes("warm") ||
          lower.includes("retarget") ||
          lower.includes("first") ||
          lower.includes("1st") ||
          lower.includes("ad set 1") ||
          lower.includes("adset 1")
        );
      });

      const secondLine = lines.find(line=>{
        const lower = line.toLowerCase();

        return hasNumber(line) && (
          lower.includes("prospecting") ||
          lower.includes("cold") ||
          lower.includes("interest") ||
          lower.includes("second") ||
          lower.includes("2nd") ||
          lower.includes("ad set 2") ||
          lower.includes("adset 2")
        );
      });

      if(firstLine){
        const numbers = getNumbers(firstLine).filter(number=>Number(cleanNumberToken(number))>10);

        if(numbers.length){
          first = amountWithSymbol(numbers[numbers.length-1],text);
        }
      }

      if(secondLine){
        const numbers = getNumbers(secondLine).filter(number=>Number(cleanNumberToken(number))>10);

        if(numbers.length){
          second = amountWithSymbol(numbers[numbers.length-1],text);
        }
      }

      if(!first || !second){
        const lower = text.toLowerCase();
        const startWords = ["split","ad sets","adsets","first","warm","prospecting"];
        let start = 0;

        for(const word of startWords){
          const index = lower.indexOf(word);

          if(index>=0){
            start = index;
            break;
          }
        }

        const relevant = text.slice(start,start+320);

        const numbers = getNumbers(relevant).filter(number=>{
          const value = Number(cleanNumberToken(number));

          return value>10 && value<10000;
        });

        if(numbers.length>=2){
          first = first || amountWithSymbol(numbers[0],text);
          second = second || amountWithSymbol(numbers[1],text);
        }
      }

      if(!first && fallback){
        first = cleanBudgetAmount(fallback,text) || fallback;
      }

      if(!second && fallback){
        second = cleanBudgetAmount(fallback,text) || fallback;
      }

      return [first,second];
    }

    function extractAdSetNames(raw){
      const text = String(raw || "");
      const lines = text.split(String.fromCharCode(10));

      let first = "";
      let second = "";

      const firstLine = lines.find(line=>{
        const lower = line.toLowerCase();

        return (
          lower.includes("warm") ||
          lower.includes("retarget") ||
          lower.includes("lookalike") ||
          lower.includes("lal") ||
          lower.includes("first") ||
          lower.includes("1st") ||
          lower.includes("ad set 1") ||
          lower.includes("adset 1")
        );
      });

      const secondLine = lines.find(line=>{
        const lower = line.toLowerCase();

        return (
          lower.includes("prospecting") ||
          lower.includes("related artist") ||
          lower.includes("interest") ||
          lower.includes("cold") ||
          lower.includes("second") ||
          lower.includes("2nd") ||
          lower.includes("ad set 2") ||
          lower.includes("adset 2")
        );
      });

      if(firstLine){
        first = cleanAdSetName(firstLine,"Warm / Retargeting");
      }

      if(secondLine){
        second = cleanAdSetName(secondLine,"Prospecting");
      }

      return [
        first || "Warm / Retargeting",
        second || "Prospecting"
      ];
    }

    function cleanAdSetName(line,fallback){
      let value = String(line || "")
        .replace(/^\s*[-*0-9.)]+/,"")
        .replace(/ad\s*set\s*\d+/i,"")
        .replace(/first|1st|second|2nd/i,"")
        .replace(/budget|daily|lifetime|spend|€|£|\$/ig,"")
        .replace(/[0-9,.]+/g,"")
        .replace(/[:;,-]+$/g,"")
        .replace(/\s+/g," ")
        .trim();

      if(value.length>48){
        value = value.slice(0,48).trim();
      }

      return value || fallback;
    }

    function extractTerritories(raw){
      const lower = String(raw).toLowerCase();
      const output = [];

      if(lower.includes("germany")) output.push("Germany");
      if(lower.includes("austria")) output.push("Austria");
      if(lower.includes("switzerland")) output.push("Switzerland");
      if(lower.includes("sweden")) output.push("Sweden");
      if(lower.includes("united kingdom") || lower.includes(" uk ")) output.push("United Kingdom");
      if(lower.includes("united states") || lower.includes(" usa ")) output.push("United States");

      return [...new Set(output)];
    }
