<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JDW Campaign Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#07070a;
      --panel:#111119;
      --panel2:#1b1b24;
      --text:#f5f5f7;
      --muted:#a1a1aa;
      --muted2:#71717a;
      --line:#2b2b36;
      --accent:#d7ff38;
      --accent-rgb:215,255,56;
      --red:#ff5f6d;
      --orange:#ffb454;
      --blue:#7aa7ff;
      --green:#72ff99;
      --purple:#c084fc;
      --cyan:#67e8f9;
      --shadow:0 24px 80px rgba(0,0,0,.42);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 14% 0%,rgba(var(--accent-rgb),.13),transparent 28%),
        radial-gradient(circle at 82% 18%,rgba(122,167,255,.10),transparent 27%),
        var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    h1,h2,h3,p{margin-top:0}
    .hidden{display:none!important}
    .small{font-size:12px;line-height:1.5;color:var(--muted2)}
    .muted{color:var(--muted)}

    label{
      display:block;
      font-size:11px;
      letter-spacing:.09em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:900;
      margin-bottom:8px;
    }

    input,textarea,select{
      width:100%;
      min-width:0;
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(0,0,0,.28);
      color:var(--text);
      padding:14px 15px;
      outline:none;
    }

    textarea{
      min-height:130px;
      resize:vertical;
      line-height:1.48;
    }

    input:focus,textarea:focus,select:focus{
      border-color:rgba(var(--accent-rgb),.7);
      box-shadow:0 0 0 4px rgba(var(--accent-rgb),.08);
    }

    .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .between{display:flex;align-items:center;justify-content:space-between;gap:16px}
    .stack{display:grid;gap:18px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}

    .btn{
      border:0;
      border-radius:14px;
      padding:13px 18px;
      background:var(--accent);
      color:#050505;
      font-weight:950;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.16s;
      white-space:nowrap;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn.secondary{
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn.danger{
      background:rgba(255,95,109,.12);
      color:var(--red);
      border:1px solid rgba(255,95,109,.34);
    }
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

    .login-screen{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .login-card{
      width:min(560px,100%);
      border:1px solid var(--line);
      border-radius:30px;
      background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.025));
      box-shadow:var(--shadow);
      padding:36px;
    }

    .logo-row{display:flex;align-items:center;gap:14px;margin-bottom:30px}
    .logo{
      width:50px;height:50px;border-radius:16px;
      background:var(--accent);
      color:#050505;
      display:grid;
      place-items:center;
      font-weight:950;
      box-shadow:0 0 35px rgba(var(--accent-rgb),.25);
    }

    .login-card h1{
      font-size:36px;
      line-height:.96;
      letter-spacing:-.07em;
      margin-bottom:14px;
    }

    .status-box{
      padding:13px 14px;
      border-radius:16px;
      border:1px solid rgba(114,255,153,.35);
      background:rgba(114,255,153,.08);
      color:var(--green);
      font-size:13px;
      line-height:1.45;
    }
    .status-box.error{
      border-color:rgba(255,95,109,.35);
      background:rgba(255,95,109,.08);
      color:var(--red);
    }

    .app{
      height:100vh;
      display:grid;
      grid-template-columns:285px 1fr;
    }

    .sidebar{
      border-right:1px solid var(--line);
      background:rgba(10,10,14,.82);
      backdrop-filter:blur(16px);
      padding:18px;
      overflow-y:auto;
    }

    .side-title h2{
      margin:0;
      font-size:14px;
      letter-spacing:.09em;
      text-transform:uppercase;
    }

    .side-title p{margin:3px 0 0;color:var(--muted);font-size:12px}

    .section-title{
      margin:24px 0 10px;
      font-size:11px;
      color:var(--muted2);
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:950;
    }

    .folder-toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin:24px 0 10px;
      font-size:11px;
      color:var(--muted2);
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:950;
    }

    .folder-add{
      width:24px;height:24px;
      border-radius:8px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--accent);
      font-weight:950;
    }

    .folder-list{display:grid;gap:7px}

    .folder-row{
      display:flex;
      align-items:center;
      gap:8px;
      border-radius:13px;
      padding:0;
    }

    .folder-btn{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      border:1px solid transparent;
      border-radius:13px;
      padding:11px 12px;
      background:transparent;
      color:var(--muted);
      text-align:left;
      min-width:0;
    }

    .folder-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
    .folder-btn.active{
      background:rgba(var(--accent-rgb),.10);
      color:var(--accent);
      border-color:rgba(var(--accent-rgb),.22);
    }

    .folder-name{
      display:flex;
      align-items:center;
      gap:7px;
      min-width:0;
    }

    .folder-name span:last-child{
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
    }

    .delete-x{
      width:24px;height:24px;
      border-radius:999px;
      border:1px solid transparent;
      background:transparent;
      color:var(--muted2);
      font-weight:950;
      display:grid;
      place-items:center;
    }

    .delete-x:hover{
      color:var(--red);
      background:rgba(255,95,109,.10);
      border-color:rgba(255,95,109,.25);
    }

    .sublist{
      display:grid;
      gap:6px;
      margin:6px 0 10px 18px;
    }

    .subitem{
      width:100%;
      border:1px solid transparent;
      border-radius:12px;
      background:rgba(255,255,255,.03);
      color:var(--muted);
      padding:9px 10px;
      text-align:left;
      font-size:12px;
      line-height:1.25;
    }

    .subitem:hover{
      color:var(--text);
      background:rgba(255,255,255,.06);
      border-color:var(--line);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:22px;
      height:22px;
      border-radius:999px;
      padding:0 7px;
      background:rgba(255,255,255,.07);
      color:var(--muted);
      font-size:11px;
      font-weight:900;
    }

    .main{
      min-width:0;
      display:grid;
      grid-template-rows:auto auto auto 1fr;
      overflow:hidden;
    }

    .topbar{
      padding:18px 22px;
      border-bottom:1px solid var(--line);
      background:rgba(11,11,16,.62);
    }

    .topbar h1{
      margin:0;
      font-size:28px;
      letter-spacing:-.06em;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(5,minmax(150px,1fr));
      gap:12px;
      padding:16px 22px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.018);
    }

    .stat{
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.035);
      padding:13px;
    }

    .stat strong{display:block;font-size:25px;letter-spacing:-.05em}
    .stat span{color:var(--muted);font-size:12px;font-weight:850}

    .toolbar{
      padding:16px 22px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      background:rgba(7,7,10,.38);
    }

    .search{max-width:430px}

    .board{
      padding:22px;
      overflow:auto;
      display:grid;
      grid-template-columns:repeat(8,minmax(260px,1fr));
      gap:16px;
      align-items:start;
    }

    .board.stack-view{
      display:block;
    }

    .column{
      min-height:calc(100vh - 265px);
      border:1px solid var(--line);
      border-radius:20px;
      background:rgba(255,255,255,.035);
      padding:12px;
    }

    .column.drag-over{
      border-color:rgba(var(--accent-rgb),.55);
      background:rgba(var(--accent-rgb),.045);
    }

    .column-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:3px 3px 10px;
    }

    .column-title{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      font-weight:950;
    }

    .dot{width:9px;height:9px;border-radius:999px;background:var(--muted)}
    .dot.new{background:var(--blue)}
    .dot.needs{background:var(--red)}
    .dot.ready{background:var(--accent)}
    .dot.progress{background:var(--orange)}
    .dot.approval{background:var(--purple)}
    .dot.live{background:var(--green)}
    .dot.reporting{background:var(--cyan)}
    .dot.complete{background:var(--muted)}

    .cards{display:grid;gap:10px}

    .card{
      border:1px solid var(--line);
      border-radius:17px;
      padding:14px;
      background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.03));
      box-shadow:0 12px 28px rgba(0,0,0,.16);
      cursor:grab;
      transition:.16s;
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:rgba(var(--accent-rgb),.30);
      background:rgba(255,255,255,.07);
    }

    .card h3{
      margin:0 0 9px;
      font-size:15px;
      letter-spacing:-.025em;
    }

    .budget-box{
      display:grid;
      gap:6px;
      border:1px solid var(--line);
      border-radius:13px;
      background:rgba(0,0,0,.20);
      padding:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }

    .budget-box strong{color:var(--text)}

    .adset-line{
      display:flex;
      align-items:center;
      gap:7px;
    }

    .adset-status-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      flex:0 0 auto;
    }

    .adset-running{background:var(--green)}
    .adset-paused{background:var(--orange)}
    .adset-ended{background:var(--muted2)}
    .adset-review{background:var(--red)}

    .chips{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(0,0,0,.18);
      color:var(--muted);
      padding:5px 8px;
      font-size:11px;
      font-weight:850;
    }

    .progress{
      height:7px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      margin-top:12px;
    }

    .progress-fill{
      height:100%;
      background:var(--accent);
      border-radius:inherit;
    }

    .empty{
      border:1px dashed var(--line);
      border-radius:16px;
      padding:18px;
      text-align:center;
      color:var(--muted2);
      font-size:13px;
    }

    .stack-group{
      border:1px solid var(--line);
      border-radius:20px;
      background:rgba(255,255,255,.028);
      padding:14px;
      margin-bottom:16px;
    }

    .stack-group h3{margin:0;font-size:18px;letter-spacing:-.04em}
    .stack-list{display:grid;gap:10px;margin-top:12px}

    .stack-card{
      border:1px solid var(--line);
      border-radius:16px;
      background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.03));
      padding:14px;
      display:grid;
      grid-template-columns:minmax(220px,1fr) minmax(260px,1fr) auto;
      gap:14px;
      align-items:center;
      cursor:pointer;
    }

    .stack-card:hover{
      background:rgba(255,255,255,.07);
      border-color:rgba(var(--accent-rgb),.32);
    }

    .stack-card h3{margin:0 0 5px;font-size:15px}
    .stack-card p{margin:0;color:var(--muted);font-size:12px;line-height:1.4}

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.64);
      display:grid;
      place-items:center;
      padding:22px;
      z-index:50;
    }

    .modal{
      width:min(1180px,100%);
      max-height:min(900px,calc(100vh - 44px));
      display:grid;
      grid-template-rows:auto auto 1fr;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:28px;
      background:#0f0f15;
      box-shadow:var(--shadow);
    }

    .modal-head{
      padding:22px 24px;
      border-bottom:1px solid var(--line);
    }

    .modal-head h2{
      margin:0 0 7px;
      font-size:28px;
      letter-spacing:-.055em;
    }

    .tabs{
      display:flex;
      gap:8px;
      padding:14px 24px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.025);
      overflow-x:auto;
    }

    .tab{
      border:1px solid var(--line);
      border-radius:999px;
      background:transparent;
      color:var(--muted);
      padding:8px 12px;
      font-size:12px;
      font-weight:900;
    }

    .tab.active{
      color:var(--accent);
      border-color:rgba(var(--accent-rgb),.28);
      background:rgba(var(--accent-rgb),.10);
    }

    .modal-body{
      overflow:auto;
      padding:24px;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.035);
      padding:16px;
    }

    .panel h3{margin:0 0 13px;font-size:14px}

    .quality-list,.log-list{display:grid;gap:9px}

    .quality-item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
      background:rgba(0,0,0,.16);
    }

    .ok{color:var(--green);font-weight:950}
    .bad{color:var(--red);font-weight:950}

    .log-item{
      border-left:3px solid rgba(var(--accent-rgb),.45);
      border-radius:0 14px 14px 0;
      background:rgba(255,255,255,.035);
      padding:12px;
    }

    .check-item{
      display:flex;
      gap:11px;
      align-items:flex-start;
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px;
      background:rgba(0,0,0,.16);
      margin-bottom:9px;
      cursor:pointer;
      user-select:none;
      transition:.14s;
    }

    .check-item:hover{
      border-color:rgba(var(--accent-rgb),.32);
      background:rgba(var(--accent-rgb),.045);
    }

    .check-item input{
      width:auto;
      margin-top:3px;
      accent-color:var(--accent);
      pointer-events:none;
    }

    .check-item.done span{
      color:var(--muted2);
      text-decoration:line-through;
    }

    .autosave-note{
      color:var(--muted2);
      font-size:12px;
      font-weight:850;
    }

    .toast{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:90;
      max-width:460px;
      border:1px solid rgba(114,255,153,.28);
      background:rgba(20,35,25,.95);
      color:var(--green);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:13px 14px;
      font-size:13px;
    }

    .toast.error{
      color:var(--red);
      border-color:rgba(255,95,109,.35);
      background:rgba(40,20,24,.95);
    }



    .brief-command{display:grid;gap:14px}
    .brief-header-card{
      border:1px solid var(--line);
      border-radius:20px;
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
      padding:16px;
    }
    .brief-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:13px}
    .brief-title-row h3{margin:0;font-size:22px;letter-spacing:-.045em;line-height:1.05}
    .brief-meta-row{display:grid;grid-template-columns:repeat(6,minmax(110px,1fr));gap:9px}
    .brief-meta{
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(0,0,0,.18);
      padding:9px 10px;
      min-width:0;
    }
    .brief-meta span{display:block;color:var(--muted2);font-size:10px;text-transform:uppercase;letter-spacing:.09em;font-weight:950;margin-bottom:4px}
    .brief-meta strong{display:block;font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pill{
      display:inline-flex;align-items:center;gap:6px;border-radius:999px;
      padding:5px 8px;font-size:11px;font-weight:950;
      border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--muted);
      white-space:nowrap;
    }
    .pill.green{color:var(--green);border-color:rgba(114,255,153,.25);background:rgba(114,255,153,.08)}
    .pill.orange{color:var(--orange);border-color:rgba(255,180,84,.25);background:rgba(255,180,84,.08)}
    .pill.red{color:var(--red);border-color:rgba(255,95,109,.25);background:rgba(255,95,109,.08)}
    .pill.accent{color:var(--accent);border-color:rgba(var(--accent-rgb),.25);background:rgba(var(--accent-rgb),.08)}
    .brief-card{border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.035);padding:14px;min-width:0}
    .brief-card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
    .brief-card-head h3{margin:0;font-size:13px;letter-spacing:.02em}
    .timeline-track{display:grid;grid-template-columns:repeat(6,minmax(130px,1fr));gap:10px;overflow-x:auto;padding-bottom:2px}
    .timeline-stage{border:1px solid var(--line);border-radius:15px;background:rgba(0,0,0,.18);padding:10px;min-width:130px;display:grid;gap:8px}
    .timeline-stage.done{border-color:rgba(114,255,153,.28);background:rgba(114,255,153,.06)}
    .timeline-stage strong{font-size:12px;line-height:1.2}
    .timeline-stage input,.timeline-stage select{padding:7px 8px;border-radius:10px;font-size:11px}
    .timeline-stage label{margin:0;display:flex;align-items:center;gap:7px;text-transform:none;letter-spacing:0;font-size:11px;color:var(--muted);font-weight:850}
    .snapshot-grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:9px}
    .snapshot-item{border:1px solid var(--line);border-radius:13px;background:rgba(0,0,0,.16);padding:10px;min-width:0}
    .snapshot-item span{display:block;color:var(--muted2);font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:950;margin-bottom:5px}
    .snapshot-item strong{display:block;font-size:12px;line-height:1.35;overflow:hidden;text-overflow:ellipsis}
    .meta-table{width:100%;border-collapse:separate;border-spacing:0 7px;font-size:12px}
    .meta-table th{color:var(--muted2);text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding:0 8px 2px;font-weight:950;white-space:nowrap}
    .meta-table td{background:rgba(0,0,0,.17);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px 8px;vertical-align:middle}
    .meta-table td:first-child{border-left:1px solid var(--line);border-radius:13px 0 0 13px;font-weight:900;color:var(--text)}
    .meta-table td:last-child{border-right:1px solid var(--line);border-radius:0 13px 13px 0}
    .meta-table .expand-row td{background:rgba(255,255,255,.035);border-radius:13px;border:1px solid var(--line);color:var(--muted);line-height:1.45}
    .mini-link{border:0;background:transparent;color:var(--accent);font-size:11px;font-weight:950;padding:0;text-decoration:none}
    .brief-note-tabs{display:flex;gap:7px;margin-bottom:10px}
    .brief-note-tab{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.04);color:var(--muted);padding:7px 10px;font-size:11px;font-weight:950}
    .brief-note-tab.active{color:var(--accent);border-color:rgba(var(--accent-rgb),.25);background:rgba(var(--accent-rgb),.08)}
    .brief-note-box{border:1px solid var(--line);border-radius:15px;background:rgba(0,0,0,.16);padding:13px;min-height:112px;color:var(--text);font-size:13px;line-height:1.5;white-space:pre-wrap}
    .blocker-list{display:grid;gap:7px}
    .blocker-item{display:flex;align-items:flex-start;gap:8px;border:1px solid var(--line);border-radius:12px;background:rgba(0,0,0,.16);padding:9px;font-size:12px;color:var(--muted)}
    .activity-mini{display:grid;gap:8px;max-height:235px;overflow:auto}
    .activity-mini-item{border-left:3px solid rgba(var(--accent-rgb),.4);background:rgba(0,0,0,.16);border-radius:0 12px 12px 0;padding:9px;font-size:12px;line-height:1.35;color:var(--muted)}
    .edit-brief-bar{border:1px solid rgba(var(--accent-rgb),.22);border-radius:16px;background:rgba(var(--accent-rgb),.06);padding:12px;margin-bottom:14px}
    .panel.stack{align-content:start}
    .raw-brief-viewer{position:fixed;inset:18px;z-index:120;border:1px solid var(--line);border-radius:24px;background:#0f0f15;box-shadow:var(--shadow);display:grid;grid-template-rows:auto 1fr;overflow:hidden}
    .raw-brief-viewer-backdrop{position:fixed;inset:0;z-index:119;background:rgba(0,0,0,.74);backdrop-filter:blur(8px)}
    .raw-brief-viewer-head{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.035)}
    .raw-brief-viewer-head h3{margin:0;font-size:20px;letter-spacing:-.035em}
    .raw-brief-content{margin:0;padding:22px;overflow:auto;white-space:pre-wrap;font-size:14px;line-height:1.55;color:var(--text);background:rgba(0,0,0,.16)}
    .mini-btn{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.05);color:var(--muted);padding:7px 10px;font-size:11px;font-weight:950}
    .mini-btn:hover{color:var(--accent);border-color:rgba(var(--accent-rgb),.25);background:rgba(var(--accent-rgb),.08)}



    .safe-import-layout{display:grid;gap:14px}
    .safe-import-panel{border:1px solid rgba(var(--accent-rgb),.22);border-radius:18px;background:rgba(var(--accent-rgb),.045);padding:14px}
    .safe-review-grid{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:10px}
    .safe-review-card{border:1px solid var(--line);border-radius:15px;background:rgba(0,0,0,.18);padding:11px;min-width:0}
    .safe-review-card label{margin:0 0 6px}
    .safe-review-card textarea,.safe-review-card input,.safe-review-card select{padding:9px 10px;border-radius:11px;font-size:12px;min-height:42px}
    .safe-review-card textarea{resize:vertical}
    .safe-evidence{margin-top:7px;color:var(--muted2);font-size:11px;line-height:1.35;white-space:pre-wrap;max-height:92px;overflow:auto}
    .safe-status{display:inline-flex;border-radius:999px;padding:4px 7px;font-size:10px;font-weight:950;margin-top:7px;border:1px solid rgba(114,255,153,.26);color:var(--green);background:rgba(114,255,153,.08)}
    .safe-status.warn{border-color:rgba(255,180,84,.28);color:var(--orange);background:rgba(255,180,84,.08)}
    .safe-adset-list{display:grid;gap:8px}
    .safe-adset-row{display:grid;grid-template-columns:minmax(160px,1.2fr) minmax(100px,.7fr) minmax(110px,.7fr) minmax(180px,1.5fr);gap:8px;align-items:start;border:1px solid var(--line);border-radius:14px;background:rgba(0,0,0,.16);padding:10px}
    .safe-adset-row input,.safe-adset-row textarea,.safe-adset-row select{padding:8px 9px;border-radius:10px;font-size:12px;min-height:38px}
    .safe-adset-row textarea{min-height:38px}

    @media(max-width:1100px){
      .brief-meta-row,.snapshot-grid{grid-template-columns:repeat(2,1fr)}
      .timeline-track{grid-template-columns:repeat(6,150px)}
    }

    @media(max-width:900px){
      body{overflow:auto}
      .app{height:auto;min-height:100vh;grid-template-columns:1fr}
      .sidebar{display:none}
      .grid-2,.grid-3{grid-template-columns:1fr}
      .stats{grid-template-columns:repeat(2,1fr)}
      .toolbar{align-items:flex-start;flex-direction:column}
      .search{max-width:none}
      .stack-card{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-card stack">
      <div class="logo-row">
        <div class="logo">JW</div>
        <div>
          <h2 style="margin:0;font-size:14px;letter-spacing:.08em;text-transform:uppercase;">JDW Campaign Hub</h2>
          <p class="small" style="margin:3px 0 0;">Supabase-powered campaign operations portal</p>
        </div>
      </div>

      <div>
        <h1>Briefs, builds, logs and reports in one place.</h1>
        <p class="muted">Sign in with your Supabase email and password.</p>
      </div>

      <form id="authForm" class="stack">
        <div class="grid-2">
          <div>
            <label>Email</label>
            <input id="emailInput" type="email" required />
          </div>
          <div>
            <label>Password</label>
            <input id="passwordInput" type="password" required />
          </div>
        </div>

        <div class="row">
          <button class="btn" type="submit">Sign In</button>
          <button class="btn secondary" id="signUpBtn" type="button">Create Account</button>
        </div>

        <div id="authStatus" class="status-box">Loading login...</div>
      </form>
    </div>
  </section>

  <section id="app" class="app hidden">
    <aside class="sidebar">
      <div class="logo-row side-title">
        <div class="logo">JW</div>
        <div>
          <h2>Campaign Hub</h2>
          <p id="userLabel">Shared dashboard</p>
        </div>
      </div>

      <button class="btn" style="width:100%;" id="newCampaignBtn">+ New Campaign</button>
      <button class="btn secondary hidden" style="width:100%;margin-top:12px;" id="importBriefBtn">Import Messy Brief</button>
      <button class="btn secondary" style="width:100%;margin-top:12px;" id="settingsBtn">Settings</button>

      <div class="folder-toolbar">
        <span>Artists</span>
        <button class="folder-add" id="addArtistBtn">+</button>
      </div>

      <div id="artistList" class="folder-list"></div>

      <div class="section-title">Actions</div>
      <button class="btn secondary" style="width:100%;" id="undoBtn" disabled>Undo Last Action</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1 id="pageTitle">All Artists</h1>
        <p class="small" style="margin:5px 0 0;">Drag campaign cards between columns to update status.</p>
      </header>

      <section class="stats" id="stats"></section>

      <section class="toolbar">
        <input id="searchInput" class="search" placeholder="Search campaigns, artists, briefs or logs..." />

        <div class="row">
          <button class="btn secondary" id="viewToggleBtn">Stack View</button>
          <select id="artistFilter"></select>
          <select id="sortSelect">
            <option value="updated">Sort: recently updated</option>
            <option value="deadline">Sort: deadline</option>
            <option value="artist">Sort: artist</option>
          </select>
        </div>
      </section>

      <section id="board" class="board"></section>
    </main>
  </section>

  <div id="modalRoot"></div>
  <div id="toast" class="toast hidden"></div>

  <script>
    const SUPABASE_URL = "https://zpkfxdyvesftnhkknggz.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpwa2Z4ZHl2ZXNmdG5oa2tuZ2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMDM5NjgsImV4cCI6MjA5NTg3OTk2OH0._w0PMiMUVh7MPyGWpKyRU4Sm6DXok-Yz657ctjUml3k";

    const STATUSES = [
      {key:"New Brief",cls:"new"},
      {key:"Needs Info",cls:"needs"},
      {key:"Ready to Build",cls:"ready"},
      {key:"In Progress",cls:"progress"},
      {key:"Awaiting Approval",cls:"approval"},
      {key:"Live",cls:"live"},
      {key:"Reporting",cls:"reporting"},
      {key:"Complete",cls:"complete"}
    ];

    const DEFAULT_CHECKLIST = [
      "Confirm correct Ads Manager account, business portfolio, artist pixel/dataset, destination link and any required ACID/compliance code",
      "Create the campaign in draft with the exact brief objective, conversion location and optimisation event, usually Engagement > Website > View Content for song-link campaigns",
      "Set the campaign spend cap and ad set budgets exactly as briefed; do not publish or overspend outside the ceiling",
      "Apply the correct naming convention across campaign, ad sets and ads before review",
      "Warm + LAL ad set: Advantage+ Audience OFF, manual warm custom audiences/LALs added, no unrelated interest targeting",
      "Prospecting ad set: duplicate Warm + LAL first, remove/exclude warm pools, use Advantage+ Audience/related artist interests as briefed",
      "Set targeting exactly: territories, age, platform and any gender/language notes from the brief only",
      "Use manual placements only: IG/FB feeds, reels and stories; turn off all other placements and placement expansion",
      "Ad level: use the correct existing post/Reel, CTA, destination URL, page/IG account, and turn off Advantage+ creative enhancements",
      "Final review: preview both ad sets, confirm Warm vs Prospecting difference, send campaign link/setup summary for approval before launch"
    ];
    window.DEFAULT_CHECKLIST = DEFAULT_CHECKLIST;
    let sb;
    let user = null;
    let artists = [];
    let campaigns = [];
    let checklist = [];
    let logs = [];
    let adsets = [];

    let activeArtistId = "all";
    let activeCampaignId = null;
    let activeTab = "overview";
    let draft = null;
    let expandedArtists = new Set();
    let undoAction = null;
    let autosaveTimer = null;
    let adsetTimers = {};
    let boardView = localStorage.getItem("jdw_board_view") || "columns";
    let briefEditMode = false;
    let briefNotesTab = "clean";

    start();

    function start(){
      applySavedSettings();

      if(!window.supabase){
        setAuthStatus("Supabase library did not load. Refresh the page.",true);
        return;
      }

      sb = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
      wireBaseEvents();
      setAuthStatus("Login ready. Enter details and press Sign In.");

      sb.auth.getSession().then(({data,error})=>{
        if(error) throw error;

        user = data.session?.user || null;

        sb.auth.onAuthStateChange((_event,session)=>{
          user = session?.user || null;
          showCorrectScreen();
        });

        showCorrectScreen();
      }).catch(error=>setAuthStatus(error.message,true));
    }

    function wireBaseEvents(){
      document.getElementById("authForm").addEventListener("submit",async event=>{
        event.preventDefault();
        await signIn();
      });

      document.getElementById("signUpBtn").addEventListener("click",signUp);
      document.getElementById("newCampaignBtn").addEventListener("click",()=>openCampaignModal(null));
      document.getElementById("importBriefBtn").addEventListener("click",openImportModal);
      document.getElementById("settingsBtn").addEventListener("click",openSettingsModal);
      document.getElementById("addArtistBtn").addEventListener("click",createArtistFolder);
      document.getElementById("undoBtn").addEventListener("click",undoLastAction);
      document.getElementById("searchInput").addEventListener("input",renderAll);
      document.getElementById("sortSelect").addEventListener("change",renderAll);
      document.getElementById("artistFilter").addEventListener("change",event=>setActiveArtist(event.target.value));
      document.getElementById("viewToggleBtn").addEventListener("click",toggleBoardView);
    }

    async function signIn(){
      const email = val("emailInput");
      const password = val("passwordInput");

      if(!email || !password){
        setAuthStatus("Enter email and password.",true);
        return;
      }

      setAuthStatus("Signing in...");

      const {data,error} = await sb.auth.signInWithPassword({email,password});

      if(error){
        setAuthStatus(error.message,true);
        return;
      }

      user = data.user;
      showCorrectScreen();
    }

    async function signUp(){
      const email = val("emailInput");
      const password = val("passwordInput");

      if(!email || !password){
        setAuthStatus("Enter email and password.",true);
        return;
      }

      setAuthStatus("Creating account...");

      const {data,error} = await sb.auth.signUp({email,password});

      if(error){
        setAuthStatus(error.message,true);
        return;
      }

      if(data.session){
        user = data.user;
        showCorrectScreen();
      }else{
        setAuthStatus("Account created. Check email confirmation settings, then sign in.");
      }
    }

    async function signOut(){
      await sb.auth.signOut();
      user = null;
      showCorrectScreen();
    }

    async function showCorrectScreen(){
      if(user){
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("userLabel").textContent = user.email || "Signed in";
        await loadData();
      }else{
        document.getElementById("loginScreen").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
      }
    }

    async function loadData(){
      try{
        const [a,c,ch,l,ad] = await Promise.all([
          sb.from("artists").select("*").order("name"),
          sb.from("campaigns").select("*").order("updated_at",{ascending:false}),
          sb.from("checklist_items").select("*").order("position"),
          sb.from("work_logs").select("*").order("created_at"),
          sb.from("ad_sets").select("*").order("position")
        ]);

        if(a.error) throw a.error;
        if(c.error) throw c.error;
        if(ch.error) throw ch.error;
        if(l.error) throw l.error;
        if(ad.error) throw ad.error;

        artists = a.data || [];
        campaigns = c.data || [];
        checklist = ch.data || [];
        logs = l.data || [];
        adsets = ad.data || [];

        renderAll();
      }catch(error){
        toast("Load failed: "+error.message,true);
        renderAll();
      }
    }

    function renderAll(){
      renderArtists();
      renderArtistFilter();
      renderStats();
      renderBoard();
    }

    function getArtistName(id){
      return artists.find(a=>a.id===id)?.name || "Unknown Artist";
    }

    function getCampaignChecklist(id){
      return checklist.filter(i=>i.campaign_id===id).sort((a,b)=>(a.position||0)-(b.position||0));
    }

    function getCampaignLogs(id){
      return logs.filter(l=>l.campaign_id===id).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    }

    function getCampaignAdSets(id){
      return adsets.filter(a=>a.campaign_id===id).sort((a,b)=>(a.position||0)-(b.position||0));
    }

    function renderArtists(){
      const list = document.getElementById("artistList");

      let html = `
        <div class="folder-row">
          <button class="folder-btn ${activeArtistId==="all"?"active":""}" data-artist="all">
            <span class="folder-name"><span>▾</span><span>All Artists</span></span>
            <span class="badge">${campaigns.length}</span>
          </button>
        </div>
      `;

      artists.forEach(artist=>{
        const artistCampaigns = campaigns.filter(c=>c.artist_id===artist.id);
        const open = expandedArtists.has(artist.id) || activeArtistId===artist.id;

        html += `
          <div class="folder-row">
            <button class="folder-btn ${activeArtistId===artist.id?"active":""}" data-artist="${artist.id}">
              <span class="folder-name">
                <span>${open ? "▾" : "▸"}</span>
                <span>${esc(artist.name)}</span>
              </span>
              <span class="badge">${artistCampaigns.length}</span>
            </button>
            <button class="delete-x" data-delete-artist="${artist.id}">×</button>
          </div>
        `;

        if(open){
          html += `<div class="sublist">`;
          html += artistCampaigns.length
            ? artistCampaigns.map(c=>`
              <button class="subitem" data-open-campaign="${c.id}">
                ${esc(c.title || "Untitled Campaign")}<br>
                <span class="small">${esc(c.status || "New Brief")}</span>
              </button>
            `).join("")
            : `<div class="empty" style="padding:10px;font-size:12px;">No campaigns yet.</div>`;
          html += `</div>`;
        }
      });

      list.innerHTML = html;

      list.querySelectorAll("[data-artist]").forEach(btn=>{
        btn.addEventListener("click",()=>{
          const id = btn.dataset.artist;

          if(id==="all"){
            activeArtistId = "all";
            document.getElementById("pageTitle").textContent = "All Artists";
            renderAll();
            return;
          }

          if(expandedArtists.has(id)){
            expandedArtists.delete(id);

            if(activeArtistId===id){
              activeArtistId = "all";
              document.getElementById("pageTitle").textContent = "All Artists";
            }
          }else{
            expandedArtists.add(id);
            activeArtistId = id;
            document.getElementById("pageTitle").textContent = getArtistName(id);
          }

          renderAll();
        });
      });

      list.querySelectorAll("[data-open-campaign]").forEach(btn=>{
        btn.addEventListener("click",event=>{
          event.stopPropagation();
          openCampaignModal(btn.dataset.openCampaign);
        });
      });

      list.querySelectorAll("[data-delete-artist]").forEach(btn=>{
        btn.addEventListener("click",event=>{
          event.stopPropagation();
          openDeleteArtistConfirm(btn.dataset.deleteArtist);
        });
      });
    }

    function renderArtistFilter(){
      const select = document.getElementById("artistFilter");
      select.innerHTML = `<option value="all">Artist: All</option>` + artists.map(a=>`
        <option value="${a.id}">Artist: ${esc(a.name)}</option>
      `).join("");
      select.value = activeArtistId;
    }

    function filteredCampaigns(){
      const search = val("searchInput").toLowerCase();
      const sort = val("sortSelect") || "updated";

      let items = campaigns.filter(c=>{
        const artistOk = activeArtistId==="all" || c.artist_id===activeArtistId;

        const blob = [
          c.title,
          getArtistName(c.artist_id),
          c.status,
          c.priority,
          c.raw_brief,
          c.structured_brief,
          c.missing_info,
          getCampaignAdSets(c.id).map(a=>[a.name,a.status,a.budget,a.objective,a.audience,a.notes].join(" ")).join(" "),
          getCampaignLogs(c.id).map(l=>l.text).join(" ")
        ].join(" ").toLowerCase();

        return artistOk && blob.includes(search);
      });

      items.sort((a,b)=>{
        if(sort==="artist") return getArtistName(a.artist_id).localeCompare(getArtistName(b.artist_id));
        if(sort==="deadline") return (a.deadline || "9999").localeCompare(b.deadline || "9999");
        return new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at);
      });

      return items;
    }

    function renderStats(){
      const items = filteredCampaigns();
      const count = status=>items.filter(c=>c.status===status).length;
      const due = items.filter(c=>{
        if(!c.deadline) return false;
        const diff = new Date(c.deadline+"T00:00:00") - new Date();
        return diff <= 6048e5 && diff >= -864e5;
      }).length;

      document.getElementById("stats").innerHTML = `
        <div class="stat"><strong>${items.length}</strong><span>Campaigns</span></div>
        <div class="stat"><strong>${count("Needs Info")}</strong><span>Needs Info</span></div>
        <div class="stat"><strong>${count("Awaiting Approval")}</strong><span>Awaiting Approval</span></div>
        <div class="stat"><strong>${count("Live")}</strong><span>Live</span></div>
        <div class="stat"><strong>${due}</strong><span>Due This Week</span></div>
      `;
    }

    function renderBoard(){
      const board = document.getElementById("board");
      const items = filteredCampaigns();

      document.getElementById("viewToggleBtn").textContent = boardView==="columns" ? "Stack View" : "Column View";

      if(boardView==="stack"){
        renderStackBoard(board,items);
        return;
      }

      board.className = "board";

      board.innerHTML = STATUSES.map(s=>{
        const statusItems = items.filter(c=>c.status===s.key);

        return `
          <div class="column" data-status="${s.key}">
            <div class="column-head">
              <div class="column-title"><span class="dot ${s.cls}"></span>${s.key}</div>
              <span class="badge">${statusItems.length}</span>
            </div>
            <div class="cards">
              ${statusItems.length ? statusItems.map(renderCampaignCard).join("") : `<div class="empty">Drop campaigns here.</div>`}
            </div>
          </div>
        `;
      }).join("");

      board.querySelectorAll(".column").forEach(col=>{
        col.addEventListener("dragover",event=>{
          event.preventDefault();
          col.classList.add("drag-over");
        });

        col.addEventListener("dragleave",()=>col.classList.remove("drag-over"));

        col.addEventListener("drop",async event=>{
          event.preventDefault();
          col.classList.remove("drag-over");
          await moveCampaign(event.dataTransfer.getData("text/plain"),col.dataset.status);
        });
      });

      board.querySelectorAll(".card").forEach(card=>{
        card.addEventListener("dragstart",event=>{
          event.dataTransfer.setData("text/plain",card.dataset.id);
        });

        card.addEventListener("click",()=>openCampaignModal(card.dataset.id));
      });
    }

    function renderStackBoard(board,items){
      board.className = "board stack-view";

      const groups = {};

      items.forEach(c=>{
        const name = getArtistName(c.artist_id);
        if(!groups[name]) groups[name] = [];
        groups[name].push(c);
      });

      board.innerHTML = Object.keys(groups).length
        ? Object.entries(groups).map(([artist,list])=>`
          <section class="stack-group">
            <div class="between">
              <h3>${esc(artist)}</h3>
              <span class="badge">${list.length}</span>
            </div>
            <div class="stack-list">
              ${list.map(c=>`
                <article class="stack-card" data-stack-id="${c.id}">
                  <div>
                    <h3>${esc(c.title || "Untitled")}</h3>
                    <p>${esc(c.status || "New Brief")}</p>
                  </div>
                  <div class="budget-box">
                    <div><strong>Budget</strong>: ${esc(formatCampaignBudget(c.budget) || "TBC")}</div>
                    ${getCampaignAdSets(c.id).map(a=>`
                      <div class="adset-line">
                        <span class="adset-status-dot ${adSetStatusClass(a.status)}"></span>
                        <strong>${esc(a.name || "Ad Set")}</strong>: ${esc(formatAdSetBudget(a))}
                      </div>
                    `).join("")}
                  </div>
                  <span class="chip">${getCampaignAdSets(c.id).length} ad sets</span>
                </article>
              `).join("")}
            </div>
          </section>
        `).join("")
        : `<div class="empty">No campaigns found.</div>`;

      board.querySelectorAll("[data-stack-id]").forEach(card=>{
        card.addEventListener("click",()=>openCampaignModal(card.dataset.stackId));
      });
    }

    function renderCampaignCard(c){
      const checks = getCampaignChecklist(c.id);
      const ads = getCampaignAdSets(c.id);
      const done = checks.filter(i=>i.done).length;
      const total = checks.length;
      const progress = total ? Math.round(done/total*100) : 0;

      return `
        <article class="card" draggable="true" data-id="${c.id}">

    async function moveCampaign(id,status){
      const campaign = campaigns.find(c=>c.id===id);
      if(!campaign) return;

      const oldStatus = campaign.status || "New Brief";

      const {error} = await sb.from("campaigns").update({
        status,
        updated_at:new Date().toISOString()
      }).eq("id",id);

      if(error){
        toast(error.message,true);
        return;
      }

      await sb.from("work_logs").insert({
        campaign_id:id,
        logged_by:"System",
        log_type:"Status",
        text:`Status changed to ${status}.`,
        visible_to_james:true
      });

      setUndo("Undo status move",async()=>{
        await sb.from("campaigns").update({status:oldStatus,updated_at:new Date().toISOString()}).eq("id",id);
        await loadData();
      });

      await loadData();
      toast("Moved to "+status);
    }

    function statusPill(status){
      const s = String(status || "New Brief");
      const cls = s.includes("Live") || s.includes("Complete") ? "green" : s.includes("Needs") ? "red" : s.includes("Progress") || s.includes("Approval") ? "orange" : "accent";
      return `<span class="pill ${cls}">${esc(s)}</span>`;
    }

    function priorityPill(priority){
      const p = String(priority || "Normal");
      const cls = p==="Urgent" ? "red" : p==="Low" ? "" : "accent";
      return `<span class="pill ${cls}">${esc(p)}</span>`;

    function snapshotItem(label,value){
      return `<div class="snapshot-item"><span>${esc(label)}</span><strong title="${attr(value || "")}">${esc(value || "TBC")}</strong></div>`;
    }

    function parseSetupSnapshot(text){
      const t = String(text || "");
      const get = pattern => (t.match(pattern)?.[1] || "").replace(/[.]+$/g,"").trim();
      return {
        objective: get(/objective(?:\s+is)?[:\s]+([^\.]+)(?:\.|$)/i) || (t.split(".")[0] || "").trim(),
        conversionLocation: get(/conversion location[:\s]+([^\.]+)(?:\.|$)/i),
        optimisationEvent: get(/optimis(?:e|ation|ing) event[:\s]+([^\.]+)(?:\.|$)/i) || get(/optimi(?:z|s)(?:e|ing) for[:\s]+([^\.]+)(?:\.|$)/i),
        pixel: get(/pixel[:\s]+([^\.]+)(?:\.|$)/i) || get(/using\s+([^\.]+pixel)(?:\.|$)/i)
      };
    }

    function inferBudgetType(budget,ads){
      const blob = [budget,...(ads || []).map(a=>a.budget_type)].join(" ").toLowerCase();
      if(blob.includes("lifetime")) return "Lifetime Budget";
      if(blob.includes("campaign")) return "Campaign Spend Limit";
      return "Daily Budget / Ad Set Budget";
    }

    function parseBlockers(text){
      const clean = String(text || "").trim();
      if(!clean || /no (major )?(missing|blocker)|nothing major|none/i.test(clean)) return [];
      return clean.split(/\n|;|\?\s+/).map(x=>x.replace(/^[-•\s]+/,"").trim()).filter(Boolean);
    }

    function splitNameParts(name){
      return String(name || "").split(/[_|]/).map(x=>x.trim()).filter(Boolean);
    }

    function adSetAudienceType(adset){
      const blob = `${adset.name || ""} ${adset.audience || ""}`.toLowerCase();
      if(blob.includes("warm")) return "Warm";
      if(blob.includes("lal") || blob.includes("lookalike")) return "LAL";
      if(blob.includes("broad")) return "Broad";
      if(blob.includes("int") || blob.includes("interest") || blob.includes("ra")) return "Interest / RA";
      if(blob.includes("custom") || blob.includes("ca_")) return "Custom Audience";
      return "TBC";
    }

    function inferAge(text){
      return String(text || "").match(/\b\d{2}\s*-\s*\d{2}\b/)?.[0].replace(/\s/g,"") || "TBC";
    }

    function inferPlatform(text){
      const t = String(text || "").toLowerCase();
      if(t.includes("ig-fb") || (t.includes("instagram") && t.includes("facebook"))) return "IG + FB";
      if(t.includes("ig") || t.includes("instagram")) return "IG";
      if(t.includes("fb") || t.includes("facebook")) return "FB";
      return "TBC";
    }

    function inferLocation(text,fallback){
      const t = String(text || "").toLowerCase();
      if(t.includes("dach") || (t.includes("de") && t.includes("at") && t.includes("ch"))) return "DACH";
      if(t.includes("uk")) return "UK";
      if(t.includes("us")) return "US";
      return fallback || "TBC";
    }

    function parseCreativesFromBrief(d,ads){
      const text = `${d.structured_brief || ""}\n${d.raw_brief || ""}`;
      const urls = [...text.matchAll(/https?:\/\/\S+/g)].map(m=>m[0].replace(/[),.]+$/,""));
      const native = /existing post|native|instagram\.com|use existing/i.test(text);
      const dark = /dark|unpublished/i.test(text);
      const cta = text.match(/CTA[:\s-]+([^\n.]+)/i)?.[1]?.trim() || (/listen now/i.test(text) ? "Listen Now" : "TBC");
      const catchphrase = text.match(/catchphrase[:\s-]+([^\n.]+)/i)?.[1]?.trim() || text.match(/hook[:\s-]+([^\n.]+)/i)?.[1]?.trim() || "TBC";
      const contentType = /carousel/i.test(text) ? "Carousel" : /image|static/i.test(text) ? "Image" : /gif/i.test(text) ? "GIF" : /reel/i.test(text) ? "Reel" : "Video";

    function wireChecklistDrag(){
      const items = Array.from(document.querySelectorAll(".check-item"));
      let dragging = false;
      let targetState = true;
      let touched = new Set();

      const apply = item=>{
        const input = item.querySelector("[data-check]");
        if(!input || input.disabled || touched.has(input.dataset.check)) return;
        touched.add(input.dataset.check);
        setChecklistItem(input,targetState);
      };

      items.forEach(item=>{
        item.addEventListener("pointerdown",event=>{
          const input = item.querySelector("[data-check]");
          if(!input || input.disabled) return;
          event.preventDefault();
          dragging = true;
          targetState = !input.checked;
          touched = new Set();
          item.setPointerCapture?.(event.pointerId);
          apply(item);
        });

        item.addEventListener("pointerenter",()=>{
          if(dragging) apply(item);
        });

        item.addEventListener("pointerup",()=>{
          dragging = false;
        });
      });

      window.addEventListener("pointerup",()=>{ dragging = false; },{once:true});
    }

    async function updateAdSet(id,silent=false){
      const existing = adsets.find(a=>a.id===id);
      if(!existing) return;

      const status = document.querySelector(`[data-adset-status="${id}"]`)?.value || "Running";
      const budget_type = document.querySelector(`[data-adset-budget-type="${id}"]`)?.value || "Daily Budget";
      const budget = document.querySelector(`[data-adset-budget="${id}"]`)?.value || "";
      const notes = document.querySelector(`[data-adset-note="${id}"]`)?.value || "";

      const old = {...existing};

      const {error} = await sb.from("ad_sets").update({status,budget_type,budget,notes}).eq("id",id);

      if(error){
        toast(error.message,true);
        return;
      }

      let logRow = null;

      if(status!==existing.status || budget_type!==existing.budget_type || budget!==existing.budget || notes!==existing.notes){
        const res = await sb.from("work_logs").insert({
          campaign_id:activeCampaignId,
          logged_by:defaultLoggedBy(),
          log_type:"Ad Set",
          text:`Ad set update — ${existing.name}: status set to ${status}. ${budget_type}: ${budget || "TBC"}.${notes ? " Notes: "+notes : ""}`,
          visible_to_james:true
        }).select().single();

        if(res.error){
          toast(res.error.message,true);
          return;
        }

        logRow = res.data;
        if(logRow) logs.push(logRow);
      }

      setUndo("Undo ad set update",async()=>{
        await sb.from("ad_sets").update({
          status:old.status,
          budget_type:old.budget_type,
          budget:old.budget,
          notes:old.notes
        }).eq("id",id);

        if(logRow?.id) await sb.from("work_logs").delete().eq("id",logRow.id);

        await loadData();
      });

      const index = adsets.findIndex(a=>a.id===id);
      if(index>=0) adsets[index] = {...adsets[index],status,budget_type,budget,notes};

      await updateJamesReportSilent(activeCampaignId);
      renderBoard();

      if(!silent) toast("Ad set saved.");
    }

    function openImportModal(){
      document.getElementById("modalRoot").innerHTML = `
        <div class="modal-backdrop">
          <div class="modal" style="width:min(980px,100%);">
            <div class="modal-head between">
              <div>
                <h2>Import Messy Brief</h2>
                <p class="small">Evidence-first import. The site extracts exact fields with hard rules first, then optional local AI can tidy the clean brief. Nothing is saved until you click Create Campaign.</p>
              </div>
              <button class="btn secondary" onclick="closeModal()">Close</button>
            </div>
            <div class="modal-body stack">
              <textarea id="importRaw" style="min-height:330px;" placeholder="Paste the raw campaign brief here..."></textarea>

              <div class="safe-import-panel">
                <div class="between">
                  <div>
                    <strong>Safe Import Mode</strong>
                    <p id="aiImportProgress" class="small" style="margin:5px 0 0;">Exact fields come from source text, not AI guesses. Artist, budget, territories, links and ad sets are protected by code.</p>
                    <label style="display:flex;align-items:center;gap:8px;margin:10px 0 0;text-transform:none;letter-spacing:0;font-size:12px;color:var(--muted);font-weight:850;">
                      <input id="useLocalAIToggle" type="checkbox" style="width:auto;" />
                      Optional: use local AI only to improve the clean summary/blockers, never protected fields
                    </label>
                    <label style="display:flex;align-items:center;gap:8px;margin:8px 0 0;text-transform:none;letter-spacing:0;font-size:12px;color:var(--muted);font-weight:850;">
                      <input id="saveRawBriefToggle" type="checkbox" style="width:auto;" />
                      Save raw brief in Supabase after I create the campaign
                    </label>
                  </div>
                  <button class="btn" id="organiseImportBtn">Safe Extract & Review</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById("organiseImportBtn").addEventListener("click",async()=>{
        const raw = val("importRaw");

        if(!raw){
          toast("Paste a brief first.",true);
          return;
        }

        const btn = document.getElementById("organiseImportBtn");
        const progress = document.getElementById("aiImportProgress");
        const saveRawBrief = document.getElementById("saveRawBriefToggle")?.checked || false;
        const useLocalAI = document.getElementById("useLocalAIToggle")?.checked || false;

        btn.disabled = true;
        btn.textContent = "Extracting exact fields...";
        progress.textContent = "Reading exact source fields first. This does not save anything.";

        try{
          const exactResult = buildDeterministicImportResult(raw);
          let finalResult = exactResult;

          if(useLocalAI && window.parseBriefWithWebLLM){
            try{
              btn.textContent = "Optional local AI summary...";
              progress.textContent = "Local AI is only improving the clean summary/blockers. Protected fields stay source-checked.";
              const aiResult = await window.parseBriefWithWebLLM(raw,message=>{
                progress.textContent = message || "Local AI is improving summary only...";
              });
              finalResult = mergeAIOnlyForSoftFields(exactResult,aiResult);
            }catch(error){
              console.error(error);
              exactResult.reviewFlags.push("Optional local AI summary failed. Exact field extraction was still used.");
              exactResult.reviewFlags.push(error.message);
              finalResult = exactResult;
            }
          }

          const review = buildStrictImportReview(raw,finalResult,{saveRawBrief});
          renderAIImportReviewModal(review);
        }catch(error){
          console.error(error);
          progress.textContent = "Import failed before anything was saved.";
          toast("Import failed: "+error.message,true);
        }finally{
          btn.disabled = false;
          btn.textContent = "Safe Extract & Review";
        }
      });
    }

    function localBriefOrganiser(raw){
      const lower = raw.toLowerCase();

      const title = getQuotedText(raw)[0] || inferTitleFromBrief(raw) || "Untitled Campaign";
      const artist = getArtistBeforeTitle(raw,title) || inferArtistFromBrief(raw,title) || getWordsBefore(raw,"pixel",2).replace(/^the /i,"") || "Untitled Artist";

      const objective = lower.includes("engagement") ? "Engagement" : "Confirm objective";
      const conversionLocation = lower.includes("website") ? "Website" : "Confirm conversion location";
      const event = lower.includes("view content") ? "View Content" : "Confirm optimisation event";
      const pixel = artist!=="Untitled Artist" ? artist+" pixel" : "Confirm pixel";
      const link = findUrl(raw,"song.so") || findUrl(raw,"http") || "";
      const budget = findOverallBudget(raw);
      const territories = extractTerritories(raw).join(", ");
      const extractedAdSets = extractAdSetsFromBrief(raw);

      const structured = [
        `Artist: ${artist}`,
        `Campaign / track: ${title}`,
        `Campaign setup: Objective is ${objective}. Set conversion location to ${conversionLocation}. Optimise for ${event} using ${pixel}.`,
        `Conversion link: ${link || "TBC"}`,
        `Campaign budget: ${budget || "TBC"}.`,
        `Ad set budget split: ${extractedAdSets.map(a=>`${a.name} ${a.budget || "TBC"}`).join("; ")}.`,
        `Targeting: ${territories || "TBC"}.`
      ].join("\\n\\n");

      return {
        artistName:clean(artist),
        title:clean(title),
        status:"New Brief",
        priority:"Normal",
        deadline:"",
        budget,
        objective:`${objective}. Conversion location: ${conversionLocation}. Optimisation event: ${event}. Pixel: ${pixel}.`,
        campaign_link:link,
        territories,
        raw_brief:raw,
        structured_brief:structured,
        missing_info:"No major missing information detected.",
        report:"",
        checklist:DEFAULT_CHECKLIST,
        ad_sets:extractedAdSets.map(a=>({
          name:a.name,
          objective:`${conversionLocation} / ${event}`,
          budget:a.budget || "TBC",
          budget_type:"Daily Budget",
          status:"Running",
          audience:a.audience || "",
          notes:""
        }))
      };
    }

    function buildJamesReportText(campaignId){
      const c = campaigns.find(item=>item.id===campaignId);
      const currentDraft = draft && activeCampaignId===campaignId ? collectDraft() : null;
      const artistName = currentDraft?.artistName || getArtistName(c?.artist_id);
      const title = currentDraft?.title || c?.title || "Untitled";
      const status = currentDraft?.status || c?.status || "New Brief";
      const budget = currentDraft?.budget || c?.budget || "TBC";
      const missing = currentDraft?.missing_info || c?.missing_info || "No major missing info flagged.";
      const ads = getCampaignAdSets(campaignId);
      const activity = getCampaignLogs(campaignId).slice(-10);

      return `Hey mate, quick update on ${artistName} — ${title}.\n\nStatus: ${status}.\n\nBudget: ${budget}\n${ads.map(a=>`- ${a.name}: ${a.status || "Running"} / ${a.budget || "TBC"} ${String(a.budget_type || "Daily Budget").toLowerCase().includes("life") ? "lifetime" : "daily"}${a.notes ? ` — ${a.notes}` : ""}`).join("\n") || "- No ad sets added yet."}\n\nLatest updates:\n${activity.length ? activity.map(l=>`- ${l.text}`).join("\n") : "- No work logs added yet."}\n\n${missing}`;
    }

      const {error} = await sb.from("campaigns").update({

        updated_at:new Date().toISOString()
      }).eq("id",campaignId);

      }

      const index = campaigns.findIndex(c=>c.id===campaignId);
      if(index>=0) campaigns[index] = {...campaigns[index],report,updated_at:new Date().toISOString()};
    }

    function extractBudgetFromText(text){
      const value = String(text || "");

      const symbol = value.match(/[€£$]\s*([0-9][0-9,.]*)/);
      if(symbol) return symbol[0].replace(/\s+/g,"").trim();

      const word = value.match(/([0-9][0-9,.]*)\s*(euro|eur|gbp|usd|pounds?)/i);

      if(word){
        const mark = /gbp|pound/i.test(word[2]) ? "£" : /usd/i.test(word[2]) ? "$" : "€";
        return mark + word[1];
      }

      for(const line of lines){

          current = {

          };

          }
        ];

      return blocks.map(block=>{

    function extractSharedAdSetBudget(raw){

          extractBudgetFromText(item)
        );
      });

      if(line) return extractBudgetFromText(line);

      const fallback = lines.find(item=>{
        const lower = item.toLowerCase();
        return (lower.includes("/day") || lower.includes("per day") || lower.includes("daily")) && extractBudgetFromText(item);
      });

    function detectCurrency(text,fallback=""){
      const t = String(text || "");
      const m = t.match(/[€£$]/);
      return m ? m[0] : fallback;
    }

    function normaliseBudgetStrict(value,defaultCurrency=""){
      const text = String(value || "").trim();
      if(!text) return {value:"",flag:"Budget missing",evidence:""};

      const match = text.match(/([€£$])?\s*([0-9]+(?:[.,][0-9]+)?)\s*(k|m|thousand|million)?\b/i);
      if(!match) return {value:text,flag:"Budget format needs review",evidence:text};

      const originalNumber = match[0].trim();
      const currency = match[1] || defaultCurrency || "";
      let number = parseFloat(String(match[2]).replace(/,/g,""));
      const suffix = String(match[3] || "").toLowerCase();

      if(suffix==="k" || suffix==="thousand") number *= 1000;
      if(suffix==="m" || suffix==="million") number *= 1000000;

      let formatted = Math.round(number).toLocaleString("en-GB");
      const daily = /\/\s*day|per\s+day|daily/i.test(text);
      const suffixText = daily ? "/day" : "";

      if(!currency){
        return {value:formatted+suffixText+" currency TBC",flag:"Budget has no currency stated",evidence:text};
      }

      const out = currency+formatted+suffixText;
      const wasShorthand = /\b(k|m|thousand|million)\b/i.test(originalNumber);
      return {value:out,flag:wasShorthand ? `Budget shorthand normalised from "${originalNumber}" to "${out}"` : "",evidence:text};
    }

    function extractBudgetCandidatesStrict(text){
      const raw = String(text || "");
      const lines = raw.split(/\n/).map(x=>x.trim()).filter(Boolean);
      const candidates = [];
      const budgetPattern = /([€£$])?\s*([0-9]+(?:[.,][0-9]+)?)\s*(k|m|thousand|million)?\s*(?:\/\s*day|per\s+day|daily)?/ig;

      for(const line of lines){
        let match;
        while((match = budgetPattern.exec(line))){
          const token = match[0].trim();
          const hasCurrency = !!match[1];
          const hasScale = !!match[3];
          const hasBudgetContext = /budget|spend|cap|ceiling|daily|\/day|per day|each|boosting|pre-order|preorder|ecom|awareness/i.test(line);
          if(!hasCurrency && !hasScale) continue;
          if(!hasBudgetContext && !/\/\s*day|per\s+day|daily/i.test(token)) continue;
          candidates.push({token,line,value:normaliseBudgetStrict(token+(/\/\s*day|per\s+day|daily/i.test(line) ? "/day" : ""),detectCurrency(line)).value});
        }
      }
      return candidates;
    }

    function findOverallBudget(raw){
      const lines = String(raw || "").split(/\n/).map(x=>x.trim()).filter(Boolean);
      const priority = lines.find(line=>{
        const lower = line.toLowerCase();
        return extractBudgetFromText(line) && (
          lower.includes("campaign-level") ||
          lower.includes("campaign level") ||
          lower.includes("spend cap") ||
          lower.includes("ceiling") ||
          lower.includes("total budget") ||
          lower.includes("campaign budget") ||
          /^budget\s*:/i.test(line)
        );
      });
      if(priority) return extractBudgetFromText(priority);

      const fallback = lines.find(line=>/budget|spend cap|initial meta budget/i.test(line) && extractBudgetFromText(line));
      return fallback ? extractBudgetFromText(fallback) : "";
    }

    function extractBudgetFromText(text){
      const candidates = extractBudgetCandidatesStrict(text);
      return candidates[0]?.value || "";
    }

    function findOverallBudgetStrict(raw){
      const lines = String(raw || "").split(/\n/).map(x=>x.trim()).filter(Boolean);
      const priority = lines.find(line=>{
        const lower = line.toLowerCase();
        return extractBudgetFromText(line) && (
          lower.includes("campaign-level") ||
          lower.includes("campaign level") ||
          lower.includes("spend cap") ||
          lower.includes("ceiling") ||
          lower.includes("total budget") ||
          lower.includes("campaign budget") ||
          lower.includes("initial meta budget") ||
          /^budget\s*:/i.test(line)
        );
      });
      if(priority){
        const norm = normaliseBudgetStrict(extractBudgetFromText(priority),detectCurrency(priority));
        return {...norm,evidence:priority};
      }
      const candidates = extractBudgetCandidatesStrict(raw).filter(c=>/budget|spend|cap|ceiling|initial meta/i.test(c.line));
      if(candidates[0]) return {value:candidates[0].value,flag:"",evidence:candidates[0].line};
      return {value:"",flag:"Budget missing",evidence:""};
    }

    function extractBudgetSplitsStrict(raw,defaultCurrency=""){
      const lines = String(raw || "").split(/\n/).map(x=>x.trim()).filter(Boolean);
      const splits = [];
      for(const line of lines){
        if(!/(boosting|awareness|pre-?order|ecom|ad set|retargeting|prospecting)/i.test(line)) continue;
        const budget = extractBudgetFromText(line);
        if(!budget) continue;
        let name = line.replace(/[·•-]/g," ").replace(/([€£$])?\s*[0-9]+(?:[.,][0-9]+)?\s*(k|m|thousand|million)?/ig,"").replace(/\s+/g," ").trim();
        name = name.replace(/^budget\s*:?/i,"").trim() || "Budget Split";
        const norm = normaliseBudgetStrict(budget,detectCurrency(line,defaultCurrency));
        splits.push({
          name:clean(name),
          objective:name,
          budget:norm.value,
          budget_type:/\/\s*day|per\s+day|daily/i.test(line) ? "Daily Budget" : "Lifetime Budget",
          status:"Needs Review",
          audience:"",
          notes:`Source: ${line}`
        });
      }
      return splits;
    }

      return String(value || "");

    function firstMatch(text,patterns){

    function deterministicArtistTitle(raw,briefType){
      const text = removeEmailNoise(raw);
      const lines = text.split(/\n/).map(x=>x.trim()).filter(Boolean);

      let found = firstMatch(text,[
        /^\s*Paid\s+Media\s+Brief\s*:\s*([^\n\r]+)/im,
        /^\s*([^\n\r]+?)\s+[-–—]\s+([^\n\r]+?)\s*$/m,

        /^\s*Artist\s*:\s*([^\n\r]+)/im
      ]);

      if(/^paid media brief/i.test(found.evidence)){
        const artist = clean(found.value.replace(/campaign.*$/i,"").trim());
        const albumSingle = firstMatch(text,[/album\s+[‘']([^’']+)[’']\s+accompanied by the release of his single\s+[‘']([^’']+)[’']/i,/album\s+["“]([^"”]+)["”]\s+accompanied by the release of his single\s+["“]([^"”]+)["”]/i]);
        const m = text.match(/album\s+[‘']([^’']+)[’']\s+accompanied by the release of his single\s+[‘']([^’']+)[’']/i) || text.match(/album\s+["“]([^"”]+)["”]\s+accompanied by the release of his single\s+["“]([^"”]+)["”]/i);
        return {artistName:artist,title:m ? `${m[1]} / ${m[2]}` : "",evidence:{artistName:found.evidence,title:m ? m[0] : "Title not explicitly in header; album/single found in context."},flags:m ? ["Campaign title uses album / single context. Confirm this is the desired campaign title."] : ["Campaign / track title missing. Confirm manually."]};
      }

      const lilli = text.match(/write up the\s+([A-Z][\w .'-]+?)\s+["“]([^"”]+)["”]\s+campaign/i);
      if(lilli){
        return {artistName:clean(lilli[1]),title:clean(lilli[2]),evidence:{artistName:lilli[0],title:lilli[0]},flags:[]};
      }

      const dash = lines.find(l=>/^.{2,80}\s+[-–—]\s+.{2,80}$/.test(l) && !/campaign report|paid media brief/i.test(l));
      if(dash){
        const parts = dash.split(/\s+[-–—]\s+/);
        if(parts.length>=2) return {artistName:clean(parts[0]),title:clean(parts.slice(1).join(" - ")),evidence:{artistName:dash,title:dash},flags:[]};
      }

      const pixel = text.match(/(?:on|using)\s+the\s+([A-Z][\w .'-]+?)\s+pixel/i);
      if(pixel){
        return {artistName:clean(pixel[1]),title:"",evidence:{artistName:pixel[0],title:""},flags:["Campaign / track title missing. Confirm manually."]};
      }

      return {artistName:"",title:"",evidence:{},flags:["Artist name not found with exact parser.","Campaign / track title not found with exact parser."]};

    function deterministicTerritories(raw){

      const extracted = extractTerritories(text);
      if(/\bUK only\b/i.test(text) && !extracted.includes("United Kingdom")) extracted.push("United Kingdom");
      if(direct && /uk only/i.test(direct[1])) return {territories:"United Kingdom",evidence:direct[0]};
      if(direct && extracted.length) return {territories:extracted.join(", "),evidence:direct[0]};
