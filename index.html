<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JDW Campaign Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#07070a;
      --panel:#111119;
      --panel2:#1b1b24;
      --text:#f5f5f7;
      --muted:#a1a1aa;
      --muted2:#71717a;
      --line:#2b2b36;
      --accent:#d7ff38;
      --accent-rgb:215,255,56;
      --red:#ff5f6d;
      --orange:#ffb454;
      --blue:#7aa7ff;
      --green:#72ff99;
      --purple:#c084fc;
      --cyan:#67e8f9;
      --shadow:0 24px 80px rgba(0,0,0,.42);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 14% 0%,rgba(var(--accent-rgb),.13),transparent 28%),
        radial-gradient(circle at 82% 18%,rgba(122,167,255,.10),transparent 27%),
        var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    h1,h2,h3,p{margin-top:0}
    .hidden{display:none!important}
    .small{font-size:12px;line-height:1.5;color:var(--muted2)}
    .muted{color:var(--muted)}

    label{
      display:block;
      font-size:11px;
      letter-spacing:.09em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:900;
      margin-bottom:8px;
    }

    input,textarea,select{
      width:100%;
      min-width:0;
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(0,0,0,.28);
      color:var(--text);
      padding:14px 15px;
      outline:none;
    }

    textarea{
      min-height:130px;
      resize:vertical;
      line-height:1.48;
    }

    input:focus,textarea:focus,select:focus{
      border-color:rgba(var(--accent-rgb),.7);
      box-shadow:0 0 0 4px rgba(var(--accent-rgb),.08);
    }

    .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .between{display:flex;align-items:center;justify-content:space-between;gap:16px}
    .stack{display:grid;gap:18px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}

    .btn{
      border:0;
      border-radius:14px;
      padding:13px 18px;
      background:var(--accent);
      color:#050505;
      font-weight:950;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.16s;
      white-space:nowrap;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn.secondary{
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn.danger{
      background:rgba(255,95,109,.12);
      color:var(--red);
      border:1px solid rgba(255,95,109,.34);
    }
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

    .login-screen{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .login-card{
      width:min(560px,100%);
      border:1px solid var(--line);
      border-radius:30px;
      background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.025));
      box-shadow:var(--shadow);
      padding:36px;
    }

    .logo-row{display:flex;align-items:center;gap:14px;margin-bottom:30px}
    .logo{
      width:50px;height:50px;border-radius:16px;
      background:var(--accent);
      color:#050505;
      display:grid;
      place-items:center;
      font-weight:950;
      box-shadow:0 0 35px rgba(var(--accent-rgb),.25);
    }

    .login-card h1{
      font-size:36px;
      line-height:.96;
      letter-spacing:-.07em;
      margin-bottom:14px;
    }

    .status-box{
      padding:13px 14px;
      border-radius:16px;
      border:1px solid rgba(114,255,153,.35);
      background:rgba(114,255,153,.08);
      color:var(--green);
      font-size:13px;
      line-height:1.45;
    }
    .status-box.error{
      border-color:rgba(255,95,109,.35);
      background:rgba(255,95,109,.08);
      color:var(--red);
    }

    .app{
      height:100vh;
      display:grid;
      grid-template-columns:285px 1fr;
    }

    .sidebar{
      border-right:1px solid var(--line);
      background:rgba(10,10,14,.82);
      backdrop-filter:blur(16px);
      padding:18px;
      overflow-y:auto;
    }

    .side-title h2{
      margin:0;
      font-size:14px;
      letter-spacing:.09em;
      text-transform:uppercase;
    }

    .side-title p{margin:3px 0 0;color:var(--muted);font-size:12px}

    .section-title{
      margin:24px 0 10px;
      font-size:11px;
      color:var(--muted2);
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:950;
    }

    .folder-toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin:24px 0 10px;
      font-size:11px;
      color:var(--muted2);
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:950;
    }

    .folder-add{
      width:24px;height:24px;
      border-radius:8px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--accent);
      font-weight:950;
    }

    .folder-list{display:grid;gap:7px}

    .folder-row{
      display:flex;
      align-items:center;
      gap:8px;
      border-radius:13px;
      padding:0;
    }

    .folder-btn{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      border:1px solid transparent;
      border-radius:13px;
      padding:11px 12px;
      background:transparent;
      color:var(--muted);
      text-align:left;
      min-width:0;
    }

    .folder-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
    .folder-btn.active{
      background:rgba(var(--accent-rgb),.10);
      color:var(--accent);
      border-color:rgba(var(--accent-rgb),.22);
    }

    .folder-name{
      display:flex;
      align-items:center;
      gap:7px;
      min-width:0;
    }

    .folder-name span:last-child{
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
    }

    .delete-x{
      width:24px;height:24px;
      border-radius:999px;
      border:1px solid transparent;
      background:transparent;
      color:var(--muted2);
      font-weight:950;
      display:grid;
      place-items:center;
    }

    .delete-x:hover{
      color:var(--red);
      background:rgba(255,95,109,.10);
      border-color:rgba(255,95,109,.25);
    }

    .sublist{
      display:grid;
      gap:6px;
      margin:6px 0 10px 18px;
    }

    .subitem{
      width:100%;
      border:1px solid transparent;
      border-radius:12px;
      background:rgba(255,255,255,.03);
      color:var(--muted);
      padding:9px 10px;
      text-align:left;
      font-size:12px;
      line-height:1.25;
    }

    .subitem:hover{
      color:var(--text);
      background:rgba(255,255,255,.06);
      border-color:var(--line);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:22px;
      height:22px;
      border-radius:999px;
      padding:0 7px;
      background:rgba(255,255,255,.07);
      color:var(--muted);
      font-size:11px;
      font-weight:900;
    }

    .main{
      min-width:0;
      display:grid;
      grid-template-rows:auto auto auto 1fr;
      overflow:hidden;
    }

    .topbar{
      padding:18px 22px;
      border-bottom:1px solid var(--line);
      background:rgba(11,11,16,.62);
    }

    .topbar h1{
      margin:0;
      font-size:28px;
      letter-spacing:-.06em;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(5,minmax(150px,1fr));
      gap:12px;
      padding:16px 22px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.018);
    }

    .stat{
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.035);
      padding:13px;
    }

    .stat strong{display:block;font-size:25px;letter-spacing:-.05em}
    .stat span{color:var(--muted);font-size:12px;font-weight:850}

    .toolbar{
      padding:16px 22px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      background:rgba(7,7,10,.38);
    }

    .search{max-width:430px}

    .board{
      padding:22px;
      overflow:auto;
      display:grid;
      grid-template-columns:repeat(8,minmax(260px,1fr));
      gap:16px;
      align-items:start;
    }

    .board.stack-view{
      display:block;
    }

    .column{
      min-height:calc(100vh - 265px);
      border:1px solid var(--line);
      border-radius:20px;
      background:rgba(255,255,255,.035);
      padding:12px;
    }

    .column.drag-over{
      border-color:rgba(var(--accent-rgb),.55);
      background:rgba(var(--accent-rgb),.045);
    }

    .column-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:3px 3px 10px;
    }

    .column-title{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      font-weight:950;
    }

    .dot{width:9px;height:9px;border-radius:999px;background:var(--muted)}
    .dot.new{background:var(--blue)}
    .dot.needs{background:var(--red)}
    .dot.ready{background:var(--accent)}
    .dot.progress{background:var(--orange)}
    .dot.approval{background:var(--purple)}
    .dot.live{background:var(--green)}
    .dot.reporting{background:var(--cyan)}
    .dot.complete{background:var(--muted)}

    .cards{display:grid;gap:10px}

    .card{
      border:1px solid var(--line);
      border-radius:17px;
      padding:14px;
      background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.03));
      box-shadow:0 12px 28px rgba(0,0,0,.16);
      cursor:grab;
      transition:.16s;
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:rgba(var(--accent-rgb),.30);
      background:rgba(255,255,255,.07);
    }

    .card h3{
      margin:0 0 9px;
      font-size:15px;
      letter-spacing:-.025em;
    }

    .budget-box{
      display:grid;
      gap:6px;
      border:1px solid var(--line);
      border-radius:13px;
      background:rgba(0,0,0,.20);
      padding:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }

    .budget-box strong{color:var(--text)}

    .adset-line{
      display:flex;
      align-items:center;
      gap:7px;
    }

    .adset-status-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      flex:0 0 auto;
    }

    .adset-running{background:var(--green)}
    .adset-paused{background:var(--orange)}
    .adset-ended{background:var(--muted2)}
    .adset-review{background:var(--red)}

    .chips{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(0,0,0,.18);
      color:var(--muted);
      padding:5px 8px;
      font-size:11px;
      font-weight:850;
    }

    .progress{
      height:7px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      margin-top:12px;
    }

    .progress-fill{
      height:100%;
      background:var(--accent);
      border-radius:inherit;
    }

    .empty{
      border:1px dashed var(--line);
      border-radius:16px;
      padding:18px;
      text-align:center;
      color:var(--muted2);
      font-size:13px;
    }

    .stack-group{
      border:1px solid var(--line);
      border-radius:20px;
      background:rgba(255,255,255,.028);
      padding:14px;
      margin-bottom:16px;
    }

    .stack-group h3{margin:0;font-size:18px;letter-spacing:-.04em}
    .stack-list{display:grid;gap:10px;margin-top:12px}

    .stack-card{
      border:1px solid var(--line);
      border-radius:16px;
      background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.03));
      padding:14px;
      display:grid;
      grid-template-columns:minmax(220px,1fr) minmax(260px,1fr) auto;
      gap:14px;
      align-items:center;
      cursor:pointer;
    }

    .stack-card:hover{
      background:rgba(255,255,255,.07);
      border-color:rgba(var(--accent-rgb),.32);
    }

    .stack-card h3{margin:0 0 5px;font-size:15px}
    .stack-card p{margin:0;color:var(--muted);font-size:12px;line-height:1.4}

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.64);
      display:grid;
      place-items:center;
      padding:22px;
      z-index:50;
    }

    .modal{
      width:min(1180px,100%);
      max-height:min(900px,calc(100vh - 44px));
      display:grid;
      grid-template-rows:auto auto 1fr;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:28px;
      background:#0f0f15;
      box-shadow:var(--shadow);
    }

    .modal-head{
      padding:22px 24px;
      border-bottom:1px solid var(--line);
    }

    .modal-head h2{
      margin:0 0 7px;
      font-size:28px;
      letter-spacing:-.055em;
    }

    .tabs{
      display:flex;
      gap:8px;
      padding:14px 24px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.025);
      overflow-x:auto;
    }

    .tab{
      border:1px solid var(--line);
      border-radius:999px;
      background:transparent;
      color:var(--muted);
      padding:8px 12px;
      font-size:12px;
      font-weight:900;
    }

    .tab.active{
      color:var(--accent);
      border-color:rgba(var(--accent-rgb),.28);
      background:rgba(var(--accent-rgb),.10);
    }

    .modal-body{
      overflow:auto;
      padding:24px;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.035);
      padding:16px;
    }

    .panel h3{margin:0 0 13px;font-size:14px}

    .quality-list,.log-list{display:grid;gap:9px}

    .quality-item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
      background:rgba(0,0,0,.16);
    }

    .ok{color:var(--green);font-weight:950}
    .bad{color:var(--red);font-weight:950}

    .log-item{
      border-left:3px solid rgba(var(--accent-rgb),.45);
      border-radius:0 14px 14px 0;
      background:rgba(255,255,255,.035);
      padding:12px;
    }

    .check-item{
      display:flex;
      gap:11px;
      align-items:flex-start;
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px;
      background:rgba(0,0,0,.16);
      margin-bottom:9px;
    }

    .check-item input{
      width:auto;
      margin-top:3px;
      accent-color:var(--accent);
    }

    .check-item.done span{
      color:var(--muted2);
      text-decoration:line-through;
    }

    .autosave-note{
      color:var(--muted2);
      font-size:12px;
      font-weight:850;
    }

    .toast{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:90;
      max-width:460px;
      border:1px solid rgba(114,255,153,.28);
      background:rgba(20,35,25,.95);
      color:var(--green);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:13px 14px;
      font-size:13px;
    }

    .toast.error{
      color:var(--red);
      border-color:rgba(255,95,109,.35);
      background:rgba(40,20,24,.95);
    }

    @media(max-width:900px){
      body{overflow:auto}
      .app{height:auto;min-height:100vh;grid-template-columns:1fr}
      .sidebar{display:none}
      .grid-2,.grid-3{grid-template-columns:1fr}
      .stats{grid-template-columns:repeat(2,1fr)}
      .toolbar{align-items:flex-start;flex-direction:column}
      .search{max-width:none}
      .stack-card{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-card stack">
      <div class="logo-row">
        <div class="logo">JW</div>
        <div>
          <h2 style="margin:0;font-size:14px;letter-spacing:.08em;text-transform:uppercase;">JDW Campaign Hub</h2>
          <p class="small" style="margin:3px 0 0;">Supabase-powered campaign operations portal</p>
        </div>
      </div>

      <div>
        <h1>Briefs, builds, logs and reports in one place.</h1>
        <p class="muted">Sign in with your Supabase email and password.</p>
      </div>

      <form id="authForm" class="stack">
        <div class="grid-2">
          <div>
            <label>Email</label>
            <input id="emailInput" type="email" required />
          </div>
          <div>
            <label>Password</label>
            <input id="passwordInput" type="password" required />
          </div>
        </div>

        <div class="row">
          <button class="btn" type="submit">Sign In</button>
          <button class="btn secondary" id="signUpBtn" type="button">Create Account</button>
        </div>

        <div id="authStatus" class="status-box">Loading login...</div>
      </form>
    </div>
  </section>

  <section id="app" class="app hidden">
    <aside class="sidebar">
      <div class="logo-row side-title">
        <div class="logo">JW</div>
        <div>
          <h2>Campaign Hub</h2>
          <p id="userLabel">Shared dashboard</p>
        </div>
      </div>

      <button class="btn" style="width:100%;" id="newCampaignBtn">+ New Campaign</button>
      <button class="btn secondary" style="width:100%;margin-top:12px;" id="importBriefBtn">Import Messy Brief</button>
      <button class="btn secondary" style="width:100%;margin-top:12px;" id="settingsBtn">Settings</button>

      <div class="folder-toolbar">
        <span>Artists</span>
        <button class="folder-add" id="addArtistBtn">+</button>
      </div>

      <div id="artistList" class="folder-list"></div>

      <div class="section-title">Actions</div>
      <button class="btn secondary" style="width:100%;" id="undoBtn" disabled>Undo Last Action</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1 id="pageTitle">All Artists</h1>
        <p class="small" style="margin:5px 0 0;">Drag campaign cards between columns to update status.</p>
      </header>

      <section class="stats" id="stats"></section>

      <section class="toolbar">
        <input id="searchInput" class="search" placeholder="Search campaigns, artists, briefs or logs..." />

        <div class="row">
          <button class="btn secondary" id="viewToggleBtn">Stack View</button>
          <select id="artistFilter"></select>
          <select id="sortSelect">
            <option value="updated">Sort: recently updated</option>
            <option value="deadline">Sort: deadline</option>
            <option value="artist">Sort: artist</option>
          </select>
        </div>
      </section>

      <section id="board" class="board"></section>
    </main>
  </section>

  <div id="modalRoot"></div>
  <div id="toast" class="toast hidden"></div>

  <script>

    let logs = [];
    let adsets = [];

    let activeArtistId = "all";
    let activeCampaignId = null;
    let activeTab = "overview";
    let draft = null;
    let expandedArtists = new Set();
    let undoAction = null;
    let autosaveTimer = null;
    let adsetTimers = {};
    let boardView = localStorage.getItem("jdw_board_view") || "columns";

    start();

    function start(){
      applySavedSettings();

      if(!window.supabase){
        setAuthStatus("Supabase library did not load. Refresh the page.",true);
        return;
      }

      sb = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
      wireBaseEvents();
      setAuthStatus("Login ready. Enter details and press Sign In.");

      sb.auth.getSession().then(({data,error})=>{
        if(error) throw error;

        user = data.session?.user || null;

        sb.auth.onAuthStateChange((_event,session)=>{
          user = session?.user || null;
          showCorrectScreen();
        });

        showCorrectScreen();
      }).catch(error=>setAuthStatus(error.message,true));
    }

    function wireBaseEvents(){
      document.getElementById("authForm").addEventListener("submit",async event=>{
        event.preventDefault();
        await signIn();
      });

      document.getElementById("signUpBtn").addEventListener("click",signUp);
      document.getElementById("newCampaignBtn").addEventListener("click",()=>openCampaignModal(null));
      document.getElementById("importBriefBtn").addEventListener("click",openImportModal);
      document.getElementById("settingsBtn").addEventListener("click",openSettingsModal);
      document.getElementById("addArtistBtn").addEventListener("click",createArtistFolder);
      document.getElementById("undoBtn").addEventListener("click",undoLastAction);
      document.getElementById("searchInput").addEventListener("input",renderAll);
      document.getElementById("sortSelect").addEventListener("change",renderAll);
      document.getElementById("artistFilter").addEventListener("change",event=>setActiveArtist(event.target.value));
      document.getElementById("viewToggleBtn").addEventListener("click",toggleBoardView);
    }

    async function signIn(){
      const email = val("emailInput");
      const password = val("passwordInput");

      if(!email || !password){
        setAuthStatus("Enter email and password.",true);
        return;
      }

      setAuthStatus("Signing in...");

      const {data,error} = await sb.auth.signInWithPassword({email,password});

      if(error){
        setAuthStatus(error.message,true);
        return;
      }

      user = data.user;
      showCorrectScreen();
    }

    async function signUp(){
      const email = val("emailInput");
      const password = val("passwordInput");

      if(!email || !password){
        setAuthStatus("Enter email and password.",true);
        return;
      }

      setAuthStatus("Creating account...");

      const {data,error} = await sb.auth.signUp({email,password});

      if(error){
        setAuthStatus(error.message,true);
        return;
      }

      if(data.session){
        user = data.user;
        showCorrectScreen();
      }else{
        setAuthStatus("Account created. Check email confirmation settings, then sign in.");
      }
    }

    async function signOut(){
      await sb.auth.signOut();
      user = null;
      showCorrectScreen();
    }

    async function showCorrectScreen(){
      if(user){
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("userLabel").textContent = user.email || "Signed in";
        await loadData();
      }else{
        document.getElementById("loginScreen").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
      }
    }

    async function loadData(){
      try{
        const [a,c,ch,l,ad] = await Promise.all([
          sb.from("artists").select("*").order("name"),
          sb.from("campaigns").select("*").order("updated_at",{ascending:false}),
          sb.from("checklist_items").select("*").order("position"),
          sb.from("work_logs").select("*").order("created_at"),
          sb.from("ad_sets").select("*").order("position")
        ]);

        if(a.error) throw a.error;
        if(c.error) throw c.error;
        if(ch.error) throw ch.error;
        if(l.error) throw l.error;
        if(ad.error) throw ad.error;

        artists = a.data || [];
        campaigns = c.data || [];
        checklist = ch.data || [];
        logs = l.data || [];
        adsets = ad.data || [];

        renderAll();
      }catch(error){
        toast("Load failed: "+error.message,true);
        renderAll();
      }
    }

    function renderAll(){
      renderArtists();
      renderArtistFilter();
      renderStats();
      renderBoard();
    }

    function getArtistName(id){
      return artists.find(a=>a.id===id)?.name || "Unknown Artist";
    }

    function getCampaignChecklist(id){
      return checklist.filter(i=>i.campaign_id===id).sort((a,b)=>(a.position||0)-(b.position||0));
    }

    function getCampaignLogs(id){
      return logs.filter(l=>l.campaign_id===id).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    }

    function getCampaignAdSets(id){
      return adsets.filter(a=>a.campaign_id===id).sort((a,b)=>(a.position||0)-(b.position||0));
    }

    function renderArtists(){
      const list = document.getElementById("artistList");

      let html = `
        <div class="folder-row">
          <button class="folder-btn ${activeArtistId==="all"?"active":""}" data-artist="all">
            <span class="folder-name"><span>▾</span><span>All Artists</span></span>
            <span class="badge">${campaigns.length}</span>
          </button>
        </div>
      `;

      artists.forEach(artist=>{
        const artistCampaigns = campaigns.filter(c=>c.artist_id===artist.id);
        const open = expandedArtists.has(artist.id) || activeArtistId===artist.id;

        html += `
          <div class="folder-row">
            <button class="folder-btn ${activeArtistId===artist.id?"active":""}" data-artist="${artist.id}">
              <span class="folder-name">
                <span>${open ? "▾" : "▸"}</span>
                <span>${esc(artist.name)}</span>
              </span>
              <span class="badge">${artistCampaigns.length}</span>
            </button>
            <button class="delete-x" data-delete-artist="${artist.id}">×</button>
          </div>
        `;

        if(open){
          html += `<div class="sublist">`;
          html += artistCampaigns.length
            ? artistCampaigns.map(c=>`
              <button class="subitem" data-open-campaign="${c.id}">
                ${esc(c.title || "Untitled Campaign")}<br>
                <span class="small">${esc(c.status || "New Brief")}</span>
              </button>
            `).join("")
            : `<div class="empty" style="padding:10px;font-size:12px;">No campaigns yet.</div>`;
          html += `</div>`;
        }
      });

      list.innerHTML = html;

      list.querySelectorAll("[data-artist]").forEach(btn=>{
        btn.addEventListener("click",()=>{
          const id = btn.dataset.artist;

          if(id==="all"){
            activeArtistId = "all";
            document.getElementById("pageTitle").textContent = "All Artists";
            renderAll();
            return;
          }

          if(expandedArtists.has(id)){
            expandedArtists.delete(id);

            if(activeArtistId===id){
              activeArtistId = "all";
              document.getElementById("pageTitle").textContent = "All Artists";
            }
          }else{
            expandedArtists.add(id);
            activeArtistId = id;
            document.getElementById("pageTitle").textContent = getArtistName(id);
          }

          renderAll();
        });
      });

      list.querySelectorAll("[data-open-campaign]").forEach(btn=>{
        btn.addEventListener("click",event=>{
          event.stopPropagation();
          openCampaignModal(btn.dataset.openCampaign);
        });
      });

      list.querySelectorAll("[data-delete-artist]").forEach(btn=>{
        btn.addEventListener("click",event=>{
          event.stopPropagation();
          openDeleteArtistConfirm(btn.dataset.deleteArtist);
        });
      });
    }

    function renderArtistFilter(){
      const select = document.getElementById("artistFilter");
      select.innerHTML = `<option value="all">Artist: All</option>` + artists.map(a=>`
        <option value="${a.id}">Artist: ${esc(a.name)}</option>
      `).join("");
      select.value = activeArtistId;
    }

    function filteredCampaigns(){
      const search = val("searchInput").toLowerCase();
      const sort = val("sortSelect") || "updated";

      let items = campaigns.filter(c=>{
        const artistOk = activeArtistId==="all" || c.artist_id===activeArtistId;

        const blob = [
          c.title,
          getArtistName(c.artist_id),
          c.status,
          c.priority,
          c.raw_brief,
          c.structured_brief,
          c.missing_info,
          getCampaignAdSets(c.id).map(a=>[a.name,a.status,a.budget,a.objective,a.audience,a.notes].join(" ")).join(" "),
          getCampaignLogs(c.id).map(l=>l.text).join(" ")
        ].join(" ").toLowerCase();

        return artistOk && blob.includes(search);
      });

      items.sort((a,b)=>{
        if(sort==="artist") return getArtistName(a.artist_id).localeCompare(getArtistName(b.artist_id));
        if(sort==="deadline") return (a.deadline || "9999").localeCompare(b.deadline || "9999");
        return new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at);
      });

      return items;
    }

    function renderStats(){
      const items = filteredCampaigns();
      const count = status=>items.filter(c=>c.status===status).length;
      const due = items.filter(c=>{
        if(!c.deadline) return false;
        const diff = new Date(c.deadline+"T00:00:00") - new Date();
        return diff <= 6048e5 && diff >= -864e5;
      }).length;

      document.getElementById("stats").innerHTML = `
        <div class="stat"><strong>${items.length}</strong><span>Campaigns</span></div>
        <div class="stat"><strong>${count("Needs Info")}</strong><span>Needs Info</span></div>
        <div class="stat"><strong>${count("Awaiting Approval")}</strong><span>Awaiting Approval</span></div>
        <div class="stat"><strong>${count("Live")}</strong><span>Live</span></div>
        <div class="stat"><strong>${due}</strong><span>Due This Week</span></div>
      `;
    }

    function renderBoard(){
      const board = document.getElementById("board");
      const items = filteredCampaigns();

      document.getElementById("viewToggleBtn").textContent = boardView==="columns" ? "Stack View" : "Column View";

      if(boardView==="stack"){
        renderStackBoard(board,items);
        return;
      }

      board.className = "board";

      board.innerHTML = STATUSES.map(s=>{
        const statusItems = items.filter(c=>c.status===s.key);

        return `
          <div class="column" data-status="${s.key}">
            <div class="column-head">
              <div class="column-title"><span class="dot ${s.cls}"></span>${s.key}</div>
              <span class="badge">${statusItems.length}</span>
            </div>
            <div class="cards">
              ${statusItems.length ? statusItems.map(renderCampaignCard).join("") : `<div class="empty">Drop campaigns here.</div>`}
            </div>
          </div>
        `;
      }).join("");

      board.querySelectorAll(".column").forEach(col=>{
        col.addEventListener("dragover",event=>{
          event.preventDefault();
          col.classList.add("drag-over");
        });

        col.addEventListener("dragleave",()=>col.classList.remove("drag-over"));

        col.addEventListener("drop",async event=>{
          event.preventDefault();
          col.classList.remove("drag-over");
          await moveCampaign(event.dataTransfer.getData("text/plain"),col.dataset.status);
        });
      });

      board.querySelectorAll(".card").forEach(card=>{
        card.addEventListener("dragstart",event=>{
          event.dataTransfer.setData("text/plain",card.dataset.id);
        });

        card.addEventListener("click",()=>openCampaignModal(card.dataset.id));
      });
    }

    function renderStackBoard(board,items){
      board.className = "board stack-view";

      const groups = {};

      items.forEach(c=>{
        const name = getArtistName(c.artist_id);
        if(!groups[name]) groups[name] = [];
        groups[name].push(c);
      });

      board.innerHTML = Object.keys(groups).length
        ? Object.entries(groups).map(([artist,list])=>`
          <section class="stack-group">
            <div class="between">
              <h3>${esc(artist)}</h3>
              <span class="badge">${list.length}</span>
            </div>
            <div class="stack-list">
              ${list.map(c=>`
                <article class="stack-card" data-stack-id="${c.id}">
                  <div>
                    <h3>${esc(c.title || "Untitled")}</h3>
                    <p>${esc(c.status || "New Brief")}</p>
                  </div>
                  <div class="budget-box">
                    <div><strong>Budget</strong>: ${esc(formatCampaignBudget(c.budget) || "TBC")}</div>
                    ${getCampaignAdSets(c.id).map(a=>`
                      <div class="adset-line">
                        <span class="adset-status-dot ${adSetStatusClass(a.status)}"></span>
                        <strong>${esc(a.name || "Ad Set")}</strong>: ${esc(formatAdSetBudget(a))}
                      </div>
                    `).join("")}
                  </div>
                  <span class="chip">${getCampaignAdSets(c.id).length} ad sets</span>
                </article>
              `).join("")}
            </div>
          </section>
        `).join("")
        : `<div class="empty">No campaigns found.</div>`;

      board.querySelectorAll("[data-stack-id]").forEach(card=>{
        card.addEventListener("click",()=>openCampaignModal(card.dataset.stackId));
      });
    }

    function renderCampaignCard(c){
      const checks = getCampaignChecklist(c.id);
      const ads = getCampaignAdSets(c.id);
      const done = checks.filter(i=>i.done).length;
      const total = checks.length;
      const progress = total ? Math.round(done/total*100) : 0;

      return `
        <article class="card" draggable="true" data-id="${c.id}">
          <h3>${esc(getArtistName(c.artist_id))} — ${esc(c.title || "Untitled")}</h3>

          <div class="budget-box">
            <div><strong>Budget</strong>: ${esc(formatCampaignBudget(c.budget) || "TBC")}</div>
            ${ads.map(a=>`
              <div class="adset-line">
                <span class="adset-status-dot ${adSetStatusClass(a.status)}"></span>
                <strong>${esc(a.name || "Ad Set")}</strong>: ${esc(formatAdSetBudget(a))}
              </div>
            `).join("")}
          </div>

          <div class="chips">
            <span class="chip">${esc(c.priority || "Normal")}</span>
            ${c.deadline ? `<span class="chip">Due ${formatDate(c.deadline)}</span>` : ""}
          </div>

          <div class="progress"><div class="progress-fill" style="width:${progress}%"></div></div>
          <p class="small" style="margin-top:7px;">Checklist ${done}/${total}</p>
        </article>
      `;
    }

    function toggleBoardView(){
      boardView = boardView==="columns" ? "stack" : "columns";
      localStorage.setItem("jdw_board_view",boardView);
      renderBoard();
    }

    async function moveCampaign(id,status){
      const campaign = campaigns.find(c=>c.id===id);
      if(!campaign) return;

      const oldStatus = campaign.status || "New Brief";

      const {error} = await sb.from("campaigns").update({
        status,
        updated_at:new Date().toISOString()
      }).eq("id",id);

      if(error){
        toast(error.message,true);
        return;
      }

      await sb.from("work_logs").insert({
        campaign_id:id,
        logged_by:"System",
        log_type:"Status",
        text:`Status changed to ${status}.`,
        visible_to_james:true
      });

      setUndo("Undo status move",async()=>{
        await sb.from("campaigns").update({status:oldStatus,updated_at:new Date().toISOString()}).eq("id",id);
        await loadData();
      });

      await loadData();
      toast("Moved to "+status);
    }

    function blankDraft(){
      return {
        artistName:activeArtistId==="all" ? "" : getArtistName(activeArtistId),
        title:"",
        status:"New Brief",
        priority:"Normal",
        deadline:"",
        budget:"",
        objective:"",
        campaign_link:"",
        territories:"",
        raw_brief:"",
        structured_brief:"",
        missing_info:"",
        report:"",
        ad_sets:[],
        checklist:DEFAULT_CHECKLIST
      };
    }

    function campaignToDraft(c){
      return {
        id:c.id,
        artistName:getArtistName(c.artist_id),
        title:c.title || "",
        status:c.status || "New Brief",
        priority:c.priority || "Normal",
        deadline:c.deadline || "",
        budget:c.budget || "",
        objective:c.objective || "",
        campaign_link:c.campaign_link || "",
        territories:c.territories || "",
        raw_brief:c.raw_brief || "",
        structured_brief:c.structured_brief || "",
        missing_info:c.missing_info || "",
        report:c.report || "",
        ad_sets:getCampaignAdSets(c.id)
      };
    }

    function openCampaignModal(id,prefill=null){
      activeCampaignId = id;
      activeTab = "overview";
      draft = prefill || (id ? campaignToDraft(campaigns.find(c=>c.id===id)) : blankDraft());
      renderModal();
    }

    function renderModal(){
      const isNew = !activeCampaignId;
      const title = isNew ? "New Campaign" : `${draft.artistName} — ${draft.title}`;

      document.getElementById("modalRoot").innerHTML = `
        <div class="modal-backdrop" id="modalBackdrop">
          <div class="modal">
            <div class="modal-head between">
              <div>
                <h2>${esc(title)}</h2>
                <p class="small">${isNew ? "Create a campaign under an artist folder." : `Status: ${esc(draft.status)} · Artist folder: ${esc(draft.artistName)}`}</p>
              </div>
              <div class="row">
                ${!isNew ? `<button class="btn danger" id="deleteCampaignBtn">Delete</button>` : ""}
                <button class="btn secondary" id="closeModalBtn">Close</button>
              </div>
            </div>

            <div class="tabs">
              ${["overview","brief","setup","build","logs"].map(t=>`
                <button class="tab ${activeTab===t?"active":""}" data-tab="${t}">${tabName(t)}</button>
              `).join("")}
            </div>

            <div class="modal-body" id="modalBody"></div>
          </div>
        </div>
      `;

      document.getElementById("closeModalBtn").addEventListener("click",closeModal);
      document.getElementById("deleteCampaignBtn")?.addEventListener("click",deleteActiveCampaign);

      document.getElementById("modalBackdrop").addEventListener("click",event=>{
        if(event.target.id==="modalBackdrop") closeModal();
      });

      document.querySelectorAll("[data-tab]").forEach(btn=>{
        btn.addEventListener("click",()=>{
          collectDraft();
          activeTab = btn.dataset.tab;
          renderModal();
        });
      });

      renderModalBody();
    }

    function renderModalBody(){
      if(activeTab==="overview") renderOverviewTab();
      if(activeTab==="brief") renderBriefTab();
      if(activeTab==="setup") renderSetupTab();
      if(activeTab==="build") renderBuildTab();
      if(activeTab==="logs") renderLogsTab();
    }

    function renderOverviewTab(){
      collectDraft();

      const ads = activeCampaignId ? getCampaignAdSets(activeCampaignId) : draft.ad_sets || [];
      const checks = activeCampaignId ? getCampaignChecklist(activeCampaignId) : DEFAULT_CHECKLIST.map(t=>({text:t,done:false}));
      const activity = activeCampaignId ? getCampaignLogs(activeCampaignId) : [];
      const done = checks.filter(i=>i.done).length;

      const missing = [];
      if(!draft.campaign_link) missing.push("Campaign link");
      if(!draft.budget) missing.push("Budget");
      if(!draft.objective) missing.push("Objective / pixel / event");
      if(!draft.territories) missing.push("Territories");
      if(!ads.length) missing.push("Ad sets");
      if(!/acid|compliance/i.test((draft.raw_brief||"")+" "+(draft.structured_brief||""))) missing.push("ACID compliance note");

      document.getElementById("modalBody").innerHTML = `
        <div class="grid-2">
          <div class="panel stack">
            <h3>Campaign Overview</h3>

            <div class="quality-list">
              <div class="quality-item"><span>Status</span><strong>${esc(draft.status)}</strong></div>
              <div class="quality-item"><span>Ad Sets</span><strong>${ads.length}</strong></div>
              <div class="quality-item"><span>Checklist</span><strong>${done}/${checks.length}</strong></div>
              <div class="quality-item"><span>Missing Info</span><strong class="${missing.length?"bad":"ok"}">${missing.length ? missing.length : "None"}</strong></div>
            </div>

            <div class="panel" style="${missing.length ? "border-color:rgba(255,95,109,.35);background:rgba(255,95,109,.06);" : "border-color:rgba(114,255,153,.25);background:rgba(114,255,153,.05);"}">
              <h3 style="color:${missing.length ? "var(--red)" : "var(--green)"}">Missing Information</h3>
              ${
                missing.length
                  ? `<div class="quality-list">${missing.map(i=>`<div class="quality-item"><span>${esc(i)}</span><strong class="bad">Missing</strong></div>`).join("")}</div>`
                  : `<p class="small">Nothing major missing.</p>`
              }
            </div>
          </div>

          <div class="panel stack">
            <h3>Recent Activity</h3>
            <div class="log-list">
              ${
                activity.length
                  ? activity.slice(-7).reverse().map(l=>`
                    <div class="log-item">
                      <p>${esc(l.text)}</p>
                      <p class="small" style="margin-top:6px;">${esc(l.log_type)} · ${esc(l.logged_by)} · ${formatDateTime(l.created_at)}</p>
                    </div>
                  `).join("")
                  : `<div class="empty">No activity yet.</div>`
              }
            </div>
          </div>
        </div>
      `;
    }

              <input id="m_budget" value="${attr(draft.budget)}" />

      document.getElementById("saveCampaignBtn")?.addEventListener("click",saveCampaign);

    async function saveCampaignSilent(){
      try{
        const d = collectDraft();

        const artist = await getOrCreateArtist(d.artistName);

        const payload = {
          artist_id:artist.id,
          title:d.title,
          status:d.status,
          priority:d.priority,
          deadline:d.deadline || null,
          budget:d.budget,
          objective:d.objective,
          campaign_link:d.campaign_link,
          territories:d.territories,
          raw_brief:d.raw_brief,
          structured_brief:d.structured_brief,
          missing_info:d.missing_info,
          report:d.report || "",
          updated_at:new Date().toISOString()
        };

        const {error} = await sb.from("campaigns").update(payload).eq("id",activeCampaignId);
        if(error) throw error;

        const index = campaigns.findIndex(c=>c.id===activeCampaignId);
        if(index>=0) campaigns[index] = {...campaigns[index],...payload};

        renderBoard();
        renderStats();
      }catch(error){
        toast("Autosave failed: "+error.message,true);
      }
    }

    async function getOrCreateArtist(name){
      const cleanName = name.trim();

      const local = artists.find(a=>a.name.toLowerCase()===cleanName.toLowerCase());
      if(local) return local;

      const {data,error} = await sb.from("artists").upsert({name:cleanName},{onConflict:"name"}).select().single();
      if(error) throw error;

      artists.push(data);
      return data;
    }

    async function updateAdSet(id,silent=false){
      const existing = adsets.find(a=>a.id===id);
      if(!existing) return;

      const status = document.querySelector(`[data-adset-status="${id}"]`)?.value || "Running";
      const budget_type = document.querySelector(`[data-adset-budget-type="${id}"]`)?.value || "Daily Budget";
      const budget = document.querySelector(`[data-adset-budget="${id}"]`)?.value || "";
      const notes = document.querySelector(`[data-adset-note="${id}"]`)?.value || "";

      const old = {...existing};

      const {error} = await sb.from("ad_sets").update({status,budget_type,budget,notes}).eq("id",id);

      if(error){
        toast(error.message,true);
        return;
      }

      let logRow = null;

      if(status!==existing.status || budget_type!==existing.budget_type || budget!==existing.budget || notes!==existing.notes){
        const res = await sb.from("work_logs").insert({
          campaign_id:activeCampaignId,
          logged_by:defaultLoggedBy(),
          log_type:"Ad Set",
          text:`Ad set update — ${existing.name}: status set to ${status}. ${budget_type}: ${budget || "TBC"}.${notes ? " Notes: "+notes : ""}`,
          visible_to_james:true
        }).select().single();

        logRow = res.data;
      }

      setUndo("Undo ad set update",async()=>{
        await sb.from("ad_sets").update({
          status:old.status,
          budget_type:old.budget_type,
          budget:old.budget,
          notes:old.notes
        }).eq("id",id);

        if(logRow?.id) await sb.from("work_logs").delete().eq("id",logRow.id);

        await loadData();
      });

      const index = adsets.findIndex(a=>a.id===id);
      if(index>=0) adsets[index] = {...adsets[index],status,budget_type,budget,notes};

      renderBoard();

      if(!silent) toast("Ad set saved.");
    }

    function localBriefOrganiser(raw){
      const lower = raw.toLowerCase();

      const title = getQuotedText(raw)[0] || inferTitleFromBrief(raw) || "Untitled Campaign";
      const artist = getArtistBeforeTitle(raw,title) || inferArtistFromBrief(raw,title) || getWordsBefore(raw,"pixel",2).replace(/^the /i,"") || "Untitled Artist";

      const objective = lower.includes("engagement") ? "Engagement" : "Confirm objective";
      const conversionLocation = lower.includes("website") ? "Website" : "Confirm conversion location";
      const event = lower.includes("view content") ? "View Content" : "Confirm optimisation event";
      const pixel = artist!=="Untitled Artist" ? artist+" pixel" : "Confirm pixel";
      const link = findUrl(raw,"song.so") || findUrl(raw,"http") || "";
      const budget = findOverallBudget(raw);
      const territories = extractTerritories(raw).join(", ");
      const extractedAdSets = extractAdSetsFromBrief(raw);

      const structured = [
        `Artist: ${artist}`,
        `Campaign / track: ${title}`,
        `Campaign setup: Objective is ${objective}. Set conversion location to ${conversionLocation}. Optimise for ${event} using ${pixel}.`,
        `Conversion link: ${link || "TBC"}`,
        `Campaign budget: ${budget || "TBC"}.`,
        `Ad set budget split: ${extractedAdSets.map(a=>`${a.name} ${a.budget || "TBC"}`).join("; ")}.`,
        `Targeting: ${territories || "TBC"}.`
      ].join("\\n\\n");

      return {
        artistName:clean(artist),
        title:clean(title),
        status:"New Brief",
        priority:"Normal",
        deadline:"",
        budget,
        objective:`${objective}. Conversion location: ${conversionLocation}. Optimisation event: ${event}. Pixel: ${pixel}.`,
        campaign_link:link,
        territories,
        raw_brief:raw,
        structured_brief:structured,
        missing_info:"No major missing information detected.",
        report:"",
        checklist:DEFAULT_CHECKLIST,
        ad_sets:extractedAdSets.map(a=>({
          name:a.name,
          objective:`${conversionLocation} / ${event}`,
          budget:a.budget || "TBC",
          budget_type:"Daily Budget",
          status:"Running",
          audience:a.audience || "",
          notes:""
        }))
      };
    }

    function organiseCurrentBrief(){
      collectDraft();

      if(!draft.raw_brief){
        toast("Paste a raw brief first.",true);
        return;
      }

      draft = {...draft,...localBriefOrganiser(draft.raw_brief)};
      renderModal();
    }

    function generateNames(){
      collectDraft();

      const artist = slug(draft.artistName || "artist");
      const title = slug(draft.title || "campaign");
      const territories = slug((draft.territories || "core").replaceAll(",","-"));

      const text = `Suggested naming convention:\\n\\nCampaign:\\n${artist}_eng-${title}_vc_${territories}\\n\\nAd Sets:\\n${(draft.ad_sets || []).map((a,index)=>`${index+1}. ${slug(a.name)}_${artist}_18-50_${territories}_ig-fb`).join("\\n")}`;

      const box = document.getElementById("m_structuredBrief");

      if(box){
        box.value = (draft.structured_brief ? draft.structured_brief + "\\n\\n" : "") + text;
        collectDraft();
        scheduleAutosave();
      }

      toast("Names added.");
    }

    function summariseLogs(){
      const activity = activeCampaignId ? getCampaignLogs(activeCampaignId) : [];

      draft.report = activity.length
        ? activity.map(l=>`- ${formatDateTime(l.created_at)}: ${l.text}`).join("\\n")
        : "No logs yet.";

      const box = document.getElementById("m_report");
      if(box) box.value = draft.report;
      scheduleAutosave();
    }

    function generateJamesUpdate(){
      collectDraft();

      const activity = activeCampaignId ? getCampaignLogs(activeCampaignId) : [];
      const ads = activeCampaignId ? getCampaignAdSets(activeCampaignId) : draft.ad_sets || [];

      draft.report = `Hey mate, quick update on ${draft.artistName} — ${draft.title}.\\n\\nStatus: ${draft.status}.\\n\\nBudget: ${draft.budget || "TBC"}\\n${ads.map(a=>`- ${a.name}: ${a.status || "Running"} / ${a.budget || "TBC"} ${String(a.budget_type || "Daily Budget").toLowerCase().includes("life") ? "lifetime" : "daily"}`).join("\\n")}\\n\\nWhat has been done:\\n${activity.slice(-7).map(l=>`- ${l.text}`).join("\\n") || "- No work logs added yet."}\\n\\n${draft.missing_info || "No major missing info flagged."}`;

      const box = document.getElementById("m_report");
      if(box) box.value = draft.report;
      scheduleAutosave();
    }

    function generateClientReport(){
      collectDraft();

      const activity = activeCampaignId ? getCampaignLogs(activeCampaignId) : [];
      const ads = activeCampaignId ? getCampaignAdSets(activeCampaignId) : draft.ad_sets || [];

      draft.report = `Campaign Report — ${draft.artistName} / ${draft.title}\\n\\nStatus: ${draft.status}\\nObjective / Setup: ${draft.objective || "TBC"}\\nBudget: ${draft.budget || "TBC"}\\nTerritories: ${draft.territories || "TBC"}\\nDestination: ${draft.campaign_link || "TBC"}\\n\\nAd Sets:\\n${ads.map(a=>`- ${a.name}: ${a.status || "Running"} / ${a.budget || "TBC"} ${String(a.budget_type || "Daily Budget").toLowerCase().includes("life") ? "lifetime" : "daily"}`).join("\\n") || "No ad sets added yet."}\\n\\nBrief Summary:\\n${draft.structured_brief || draft.raw_brief || "No brief added yet."}\\n\\nWork Completed:\\n${activity.map(l=>`- ${l.text}`).join("\\n") || "No work logs added yet."}`;

      const box = document.getElementById("m_report");
      if(box) box.value = draft.report;
      scheduleAutosave();
    }

    async function createArtistFolder(){
      const name = prompt("New artist folder name:");
      if(!name || !name.trim()) return;

      try{
        const artist = await getOrCreateArtist(name.trim());
        activeArtistId = artist.id;
        expandedArtists.add(artist.id);
        document.getElementById("pageTitle").textContent = artist.name;

        setUndo("Undo artist create",async()=>{
          await sb.from("artists").delete().eq("id",artist.id);
          activeArtistId = "all";
          await loadData();
        });

        await loadData();
        toast("Artist folder created.");
      }catch(error){
        toast(error.message,true);
      }
    }

    function openDeleteArtistConfirm(artistId){
      const artist = artists.find(a=>a.id===artistId);
      if(!artist) return;

      const artistCampaigns = campaigns.filter(c=>c.artist_id===artistId);

      document.getElementById("modalRoot").innerHTML = `
        <div class="modal-backdrop">
          <div class="modal" style="width:min(620px,100%);">
            <div class="modal-head between">
              <div>
                <h2>Delete artist folder?</h2>
                <p class="small">Type the exact artist name to confirm.</p>
              </div>
              <button class="btn secondary" onclick="closeModal()">Close</button>
            </div>
            <div class="modal-body stack">
              <div class="panel" style="border-color:rgba(255,95,109,.35);background:rgba(255,95,109,.06);">
                <h3 style="color:var(--red);">Delete ${esc(artist.name)}</h3>
                <p class="small">This will delete ${artistCampaigns.length} campaigns inside the folder.</p>
              </div>
              <div>
                <label>Type artist name to confirm</label>
                <input id="deleteArtistConfirmInput" placeholder="${attr(artist.name)}" />
              </div>
              <div class="row">
                <button class="btn secondary" onclick="closeModal()">Cancel</button>
                <button class="btn danger" id="confirmDeleteArtistBtn" disabled>Delete Folder</button>
              </div>
            </div>
          </div>
        </div>
      `;

      const input = document.getElementById("deleteArtistConfirmInput");
      const btn = document.getElementById("confirmDeleteArtistBtn");

      input.addEventListener("input",()=>btn.disabled = input.value.trim() !== artist.name);
      btn.addEventListener("click",()=>deleteArtistById(artistId));
    }

    async function deleteArtistById(artistId){
      const oldArtist = artists.find(a=>a.id===artistId);
      const oldCampaigns = campaigns.filter(c=>c.artist_id===artistId);

      const {error} = await sb.from("artists").delete().eq("id",artistId);

      if(error){
        toast(error.message,true);
        return;
      }

      setUndo("Undo artist delete",async()=>{
        if(oldArtist) await sb.from("artists").insert(oldArtist);
        if(oldCampaigns.length) await sb.from("campaigns").insert(oldCampaigns);
        await loadData();
      });

      closeModal();
      activeArtistId = "all";
      document.getElementById("pageTitle").textContent = "All Artists";
      await loadData();
      toast("Artist folder deleted.");
    }

    function setActiveArtist(id){
      activeArtistId = id;

      if(id!=="all") expandedArtists.add(id);

      document.getElementById("pageTitle").textContent = id==="all" ? "All Artists" : getArtistName(id);
      renderAll();
    }

    function setUndo(label,fn){
      undoAction = {label,fn};
      const btn = document.getElementById("undoBtn");
      btn.disabled = false;
      btn.textContent = label;
    }

    function clearUndo(){
      undoAction = null;
      const btn = document.getElementById("undoBtn");
      btn.disabled = true;
      btn.textContent = "Undo Last Action";
    }

    async function undoLastAction(){
      if(!undoAction) return;
      const action = undoAction;
      clearUndo();

      try{
        await action.fn();
        toast("Undo complete.");
      }catch(error){
        toast("Undo failed: "+error.message,true);
      }
    }

    function closeModal(){
      document.getElementById("modalRoot").innerHTML = "";
      activeCampaignId = null;
      draft = null;
    }

    function setAuthStatus(message,error=false){
      const el = document.getElementById("authStatus");
      el.textContent = message;
      el.className = "status-box" + (error ? " error" : "");
    }

    function toast(message,error=false){
      const el = document.getElementById("toast");
      el.textContent = message;
      el.className = "toast" + (error ? " error" : "");
      el.classList.remove("hidden");
      setTimeout(()=>el.classList.add("hidden"),3500);
    }

    function val(id){
      return document.getElementById(id)?.value?.trim() || "";
    }

    function tabName(tab){
      return {
        overview:"Overview",
        brief:"Brief",
        setup:"Setup",
        build:"Build",
        logs:"Logs / Report"
      }[tab];
    }

    function defaultLoggedBy(){
      try{
        return JSON.parse(localStorage.getItem("jdw_settings") || "{}").loggedBy || "Aidan";
      }catch(e){
        return "Aidan";
      }
    }

    function applySavedSettings(){
      try{
        const saved = JSON.parse(localStorage.getItem("jdw_settings") || "{}");
        applyTheme(saved.accent || "#d7ff38");
      }catch(e){
        applyTheme("#d7ff38");
      }
    }

    function applyTheme(hex){
      const colour = hex || "#d7ff38";
      const number = parseInt(colour.replace("#",""),16);
      document.documentElement.style.setProperty("--accent",colour);
      document.documentElement.style.setProperty("--accent-rgb",`${(number>>16)&255},${(number>>8)&255},${number&255}`);
    }

    function formatCampaignBudget(value){
      const text = String(value || "");
      const found = text.match(/[€£$]\s*[0-9][0-9,.]*|[0-9][0-9,.]*\s*(euro|eur|gbp|usd|pounds?)/i);
      return found ? found[0].replace(/\s+/g,"").trim() : text.trim();
    }

    function formatAdSetBudget(adset){
      const amount = formatCampaignBudget(adset.budget) || "TBC";
      const type = String(adset.budget_type || "Daily Budget").toLowerCase().includes("life") ? "lifetime" : "daily";
      return `${amount} ${type}`;
    }

    function adSetStatusClass(status){
      const s = String(status || "Running").toLowerCase();
      if(s.includes("pause")) return "adset-paused";
      if(s.includes("end")) return "adset-ended";
      if(s.includes("review") || s.includes("need")) return "adset-review";
      return "adset-running";
    }

    function formatDate(date){
      return date ? new Date(date+"T00:00:00").toLocaleDateString(undefined,{day:"2-digit",month:"short"}) : "";
    }

    function formatDateTime(date){
      return date ? new Date(date).toLocaleString(undefined,{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "";
    }

    function esc(value){
      return String(value ?? "").replace(/[&<>'"]/g,c=>({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "'":"&#39;",
        '"':"&quot;"
      }[c]));
    }

    function attr(value){
      return esc(value).replace(/`/g,"&#96;");
    }

    function slug(text){
      return String(text || "").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
    }

    function clean(text){
      return String(text || "").replaceAll("-"," ").replace(/\s+/g," ").trim().replace(/^the /i,"");
    }

    function getQuotedText(text){
      const match = String(text).match(/["“](.*?)["”]/);
      return match ? [match[1].trim()] : [];
    }

    function inferTitleFromBrief(raw){
      const text = String(raw || "");
      const match = text.match(/write up the\s+(.+?)\s+campaign/i);

      if(match){
        const value = match[1].replace(/["“”]/g,"").trim();
        const parts = value.split(/\s+/);
        if(parts.length>1) return parts.slice(1).join(" ");
        return value;
      }

      return "";
    }

    function inferArtistFromBrief(raw,title){
      const text = String(raw || "");
      const match = text.match(/write up the\s+(.+?)\s+campaign/i);

      if(match){
        const value = match[1].replace(/["“”]/g,"").trim();
        const parts = value.split(/\s+/);
        if(parts.length>1) return parts[0];
      }

      const pixel = text.match(/using the\s+(.+?)\s+pixel/i);
      if(pixel) return pixel[1].trim();

      return "";
    }

    function getArtistBeforeTitle(raw,title){
      const marker = "write up the ";
      const lower = raw.toLowerCase();
      const start = lower.indexOf(marker);
      const index = lower.indexOf(String(title).toLowerCase());

      if(start===-1 || index===-1 || index<=start) return "";

      return clean(raw.slice(start+marker.length,index).replaceAll('"',"").replaceAll("“","").replaceAll("”",""));
    }

    function getWordsBefore(raw,word,count){
      const words = String(raw).replace(/[.,()]/g," ").split(/\s+/).filter(Boolean);
      const index = words.findIndex(w=>w.toLowerCase()===word.toLowerCase());
      return index===-1 ? "" : words.slice(Math.max(0,index-count),index).join(" ");
    }

    function findUrl(text,domain){
      const tokens = String(text).split(/\s+/).map(t=>t.trim().replace(/[),.]+$/g,""));
      const found = tokens.find(t=>t.toLowerCase().includes(domain.toLowerCase()) && t.includes("."));
      return found ? (found.startsWith("http") ? found : "https://"+found) : "";
    }

    function findOverallBudget(raw){
      const lines = String(raw || "").split(/\n/);

      const priority = lines.find(line=>{
        const lower = line.toLowerCase();
        return extractBudgetFromText(line) && (
          lower.includes("campaign-level") ||
          lower.includes("campaign level") ||
          lower.includes("spend cap") ||
          lower.includes("total budget") ||
          lower.includes("budget:")
        );
      });

      if(priority) return extractBudgetFromText(priority);

      const fallback = lines.find(line=>line.toLowerCase().includes("budget") && extractBudgetFromText(line));
      return fallback ? extractBudgetFromText(fallback) : "";
    }

    function extractBudgetFromText(text){
      const value = String(text || "");

      const symbol = value.match(/[€£$]\s*([0-9][0-9,.]*)/);
      if(symbol) return symbol[0].replace(/\s+/g,"").trim();

      const word = value.match(/([0-9][0-9,.]*)\s*(euro|eur|gbp|usd|pounds?)/i);

      if(word){
        const mark = /gbp|pound/i.test(word[2]) ? "£" : /usd/i.test(word[2]) ? "$" : "€";
        return mark + word[1];
      }

      return "";
    }

    function extractAdSetsFromBrief(raw){
      const text = String(raw || "");
      const lines = text.split(/\n/);
      const sharedBudget = extractSharedAdSetBudget(text);

      const blocks = [];
      let current = null;

      for(const line of lines){
        const trimmed = line.trim();
        const heading = trimmed.match(/^(\d+)[.)]\s+(.+)/);

        if(heading){
          if(current) blocks.push(current);

          current = {
            number:Number(heading[1]),
            name:cleanAdSetHeading(heading[2]),
            lines:[]
          };

          continue;
        }

        if(current) current.lines.push(trimmed);
      }

      if(current) blocks.push(current);

      if(!blocks.length){
        return [
          {
            name:"Warm / Retargeting",
            budget:sharedBudget || "TBC",
            audience:"Warm custom audiences, lookalike, engagers and followers."
          },
          {
            name:"Prospecting",
            budget:sharedBudget || "TBC",
            audience:"Related artist / interest prospecting."
          }
        ];
      }

      return blocks.map(block=>{
        const blockText = block.lines.join(" ");
        const budget = extractBudgetFromText(blockText) || sharedBudget || "TBC";

        return {
          name:block.name,
          budget,
          audience:extractAudienceSummary(block.name,blockText)
        };
      });
    }

    function extractSharedAdSetBudget(raw){
      const lines = String(raw || "").split(/\n/);

      const line = lines.find(item=>{
        const lower = item.toLowerCase();

        return (
          (lower.includes("ad set") || lower.includes("ad sets")) &&
          (lower.includes("each") || lower.includes("/day") || lower.includes("per day") || lower.includes("daily")) &&
          extractBudgetFromText(item)
        );
      });

      if(line) return extractBudgetFromText(line);

      const fallback = lines.find(item=>{
        const lower = item.toLowerCase();
        return (lower.includes("/day") || lower.includes("per day") || lower.includes("daily")) && extractBudgetFromText(item);
      });

      return fallback ? extractBudgetFromText(fallback) : "";
    }

    function cleanAdSetHeading(text){
      return String(text || "").replace(/^\s*[-*]+/,"").replace(/\s+/g," ").trim();
    }

    function extractAudienceSummary(name,blockText){
      const n = String(name || "").toLowerCase();
      const b = String(blockText || "").toLowerCase();

      if(n.includes("warm") || n.includes("retarget")){
        return "Warm audiences, engagers, followers, video viewers, custom audiences and lookalikes.";
      }

      if(n.includes("related") || b.includes("hozier") || b.includes("lana")){
        return "Related artist / acoustic singer-songwriter prospecting.";
      }

      if(n.includes("indie") || n.includes("female") || b.includes("billie") || b.includes("clairo")){
        return "Broader indie pop / female-led alternative prospecting.";
      }

      return blockText.slice(0,180) || "Audience TBC.";
    }

    function extractTerritories(raw){
      const lower = String(raw).toLowerCase();
      const out = [];

      if(lower.includes("germany")) out.push("Germany");
      if(lower.includes("austria")) out.push("Austria");
      if(lower.includes("switzerland")) out.push("Switzerland");
      if(lower.includes("sweden")) out.push("Sweden");
      if(lower.includes("united kingdom") || lower.includes(" uk ")) out.push("United Kingdom");
      if(lower.includes("united states") || lower.includes(" usa ")) out.push("United States");

      return [...new Set(out)];
    }
  </script>
