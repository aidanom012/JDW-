    function deterministicAdSets(raw,briefType,defaultCurrency){
      const text = String(raw || "");
      if(briefType === "campaign_report") return [];

      if(briefType === "build_brief" && /Ad sets/i.test(text)){
        const sharedLine = text.match(/Ad sets\s*\([^)]*?([€£$]?\s*\d+(?:[.,]\d+)?\s*(?:k|m|thousand|million)?\s*\/\s*day|[€£$]?\s*\d+(?:[.,]\d+)?\s*(?:k|m|thousand|million)?\s*per\s+day|[€£$]?\s*\d+(?:[.,]\d+)?\s*(?:k|m|thousand|million)?\s*daily)[^)]*\)/i);
        const sharedBudget = sharedLine ? normaliseBudgetStrict(sharedLine[1],detectCurrency(sharedLine[1],defaultCurrency)).value : "";
        const blocks = [];
        const re = /^\s*(\d+)[.)]\s+([^:\n]+)\s*:\s*([^\n]+(?:\n(?!\s*\d+[.)]).*)*)/gmi;
        let m;
        while((m = re.exec(text))){
          const name = clean(m[2]);
          const body = m[3].replace(/\n/g," ").replace(/\s+/g," ").trim();
          blocks.push({
            name,
            objective:"Website / View Content",
            budget:sharedBudget || "",
            budget_type:sharedBudget ? "Daily Budget" : "Needs Review",
            status:"Needs Review",
            audience:body,
            notes:`Advantage+ Audience: ${/advantage\+ audience\s+off/i.test(body) ? "OFF" : /advantage\+ audience\s+on/i.test(body) ? "ON" : "TBC"}. Source: ${name}: ${body}`
          });
        }
        if(blocks.length) return blocks;
      }

      const splits = extractBudgetSplitsStrict(text,defaultCurrency);
      if(splits.length) return splits;
      return [];
    }

    function buildDeterministicStructuredBrief(d,briefType,extras=[]){
      const adText = d.ad_sets && d.ad_sets.length ? d.ad_sets.map(a=>`- ${a.name}: ${a.budget || "budget TBC"}; ${a.audience || a.notes || "details TBC"}`).join("\n") : "No safe build ad sets detected.";
      return [
        `Brief type: ${briefType}`,
        `Artist: ${d.artistName || "TBC"}`,
        `Campaign / track: ${d.title || "TBC"}`,
        `Budget: ${d.budget || "TBC"}`,
        `Territories: ${d.territories || "TBC"}`,
        `Campaign link: ${d.campaign_link || "TBC"}`,
        `Objective / setup: ${d.objective || "TBC"}`,
        `Ad sets:\n${adText}`,
        extras.length ? `Notes:\n${extras.join("\n")}` : ""
      ].filter(Boolean).join("\n\n");
    }

    function buildDeterministicImportResult(raw){
      const briefType = classifyBriefTypeStrict(raw);
      const artistTitle = deterministicArtistTitle(raw,briefType);
      const budget = findOverallBudgetStrict(raw);
      const defaultCurrency = detectCurrency(budget.value || raw);
      const territories = deterministicTerritories(raw);
      const link = deterministicCampaignLink(raw);
      const objective = deterministicObjective(raw,briefType);
      const dates = deterministicDates(raw);
      const adsets = deterministicAdSets(raw,briefType,defaultCurrency);
      const flags = [...artistTitle.flags];
      if(budget.flag && budget.flag !== "Budget missing") flags.push(budget.flag);
      if(objective.flag) flags.push(objective.flag);
      if(dates.flag && !/not explicitly found/i.test(dates.flag)) flags.push(dates.flag);

      let status = "New Brief";
      if(briefType === "campaign_report") status = "Reporting";
      if(briefType === "build_brief") status = "Ready to Build";

      const finalDraft = {
        ...defaultDraftShape(),
        artistName:artistTitle.artistName,
        title:artistTitle.title,
        status,
        priority:"Normal",
        deadline:dates.deadline,
        budget:budget.value || "",
        objective:objective.objective || "",
        campaign_link:link.link || "",
        territories:territories.territories || "",
        raw_brief:"",
        structured_brief:"",
        missing_info:"",
        report:briefType === "campaign_report" ? "Campaign report imported. Review report content before client-facing use." : "",
        ad_sets:adsets
      };

      finalDraft.structured_brief = buildDeterministicStructuredBrief(finalDraft,briefType,[]);

      const evidence = {
        artistName:artistTitle.evidence.artistName || "",
        title:artistTitle.evidence.title || "",
        budget:budget.evidence || "",
        objective:objective.evidence || "",
        campaign_link:link.evidence || "",
        territories:territories.evidence || "",
        deadline:dates.evidence || "",
        ad_sets:adsets.map(a=>a.notes || a.audience || a.name)
      };

      return {brief_type:briefType,confidence:"source-checked",finalDraft,evidence,reviewFlags:flags};
    }

    function mergeAIOnlyForSoftFields(exactResult,aiResult){
      const merged = JSON.parse(JSON.stringify(exactResult));
      const aiDraft = aiResult?.finalDraft || {};
      const aiFlags = Array.isArray(aiResult?.reviewFlags) ? aiResult.reviewFlags : [];
      if(aiDraft.structured_brief && String(aiDraft.structured_brief).length > String(merged.finalDraft.structured_brief || "").length){
        merged.finalDraft.structured_brief = aiDraft.structured_brief;
      }
      if(aiDraft.report && !merged.finalDraft.report) merged.finalDraft.report = aiDraft.report;
      merged.reviewFlags = [...new Set([...merged.reviewFlags,"Optional local AI was used only for soft summary fields, not protected fields.",...aiFlags])];
      return merged;
    }

    function buildStrictImportReview(raw,aiResult={},options={}){
      const final = {...defaultDraftShape(),...(aiResult.finalDraft || aiResult || {})};
      const evidence = aiResult.evidence || {};
      const flags = Array.isArray(aiResult.reviewFlags) ? [...aiResult.reviewFlags] : [];
      const rawType = aiResult.brief_type || aiResult.briefType || "";
      const briefType = rawType && rawType !== "unknown" ? rawType : classifyBriefTypeStrict(raw);
      const confidence = aiResult.confidence || "medium";

      const rawOverallBudget = findOverallBudgetStrict(raw);
      const defaultCurrency = detectCurrency(rawOverallBudget.value || raw);

      if(rawOverallBudget.value){
        const aiBudgetNorm = normaliseBudgetStrict(final.budget,defaultCurrency);
        if(!final.budget || aiBudgetNorm.value !== rawOverallBudget.value || /currency TBC|£2$|€2$|\$2$/.test(aiBudgetNorm.value)){
          if(final.budget && final.budget !== rawOverallBudget.value){
            flags.push(`Budget overwritten from AI value "${final.budget}" to source-checked value "${rawOverallBudget.value}".`);
          }
          final.budget = rawOverallBudget.value;
          evidence.budget = rawOverallBudget.evidence;
        }
        if(rawOverallBudget.flag) flags.push(rawOverallBudget.flag);
      }else if(final.budget){
        const norm = normaliseBudgetStrict(final.budget,defaultCurrency);
        final.budget = norm.value;
        if(norm.flag) flags.push(norm.flag);
      }

      if(!final.territories){
        const t = extractTerritories(raw).join(", ");
        if(t){
          final.territories = t;
          evidence.territories = "Detected exact territory names in brief.";
        }
      }

      if(!final.campaign_link){
        const songLink = findUrl(raw,"song.so");
        if(songLink){
          final.campaign_link = songLink;
          evidence.campaign_link = songLink;
        }
      }

      final.ad_sets = Array.isArray(final.ad_sets) ? final.ad_sets : [];
      final.ad_sets = final.ad_sets.filter(a=>a && (a.name || a.budget || a.audience || a.notes)).map(a=>{
        const norm = normaliseBudgetStrict(a.budget || "",defaultCurrency);
        if(norm.flag && a.budget) flags.push(`${a.name || "Ad set"}: ${norm.flag}`);
        return {
          name:a.name || "Ad Set",
          objective:a.objective || "",
          budget:norm.value || a.budget || "",
          budget_type:a.budget_type || (/\/day|per day|daily/i.test(String(a.budget || "")) ? "Daily Budget" : "Needs Review"),
          status:a.status || "Needs Review",
          audience:a.audience || "",
          notes:a.notes || ""
        };
      });

      if(briefType === "campaign_report"){
        final.status = "Reporting";
        final.priority = final.priority || "Normal";
        final.report = final.report || final.structured_brief || "Campaign report imported. Review the source report before client-facing use.";
        final.ad_sets = [];
        flags.push("Campaign report detected: build ad-set rows were not created automatically.");
        if(!final.objective) flags.push("Campaign report does not contain a safe build objective field.");
      }

      if(briefType === "strategy_brief"){
        const splits = extractBudgetSplitsStrict(raw,defaultCurrency);
        if(!final.ad_sets.length && splits.length) final.ad_sets = splits;
        final.ad_sets = final.ad_sets.map(a=>({...a,status:a.status || "Needs Review"}));
        flags.push("Strategy brief detected: exact Meta build settings may be incomplete. Review objective, pixel, ad sets and links before saving.");
      }

      if(briefType === "build_brief"){
        final.status = final.status || "New Brief";
      }

      const missing = [];
      if(!final.artistName) missing.push("Confirm artist name");
      if(!final.title) missing.push("Confirm campaign / track title");
      if(!final.budget) missing.push("Confirm campaign budget");
      if(!final.territories) missing.push("Confirm territories");
      if(!final.campaign_link && briefType !== "campaign_report") missing.push("Campaign/conversion link missing");
      if(!final.objective && briefType !== "campaign_report") missing.push("Objective / pixel / event setup missing or not explicit");
      if(/\b\d+(?:\.\d+)?k\b/i.test(raw) && !/[€£$]\s*\d+(?:\.\d+)?k/i.test(raw)) missing.push("A K shorthand budget appears without a currency. Confirm currency.");

      const combinedMissing = [...new Set([
        ...parseBlockers(final.missing_info || ""),
        ...missing,
        ...flags.filter(Boolean)
      ])];

      final.missing_info = combinedMissing.length ? combinedMissing.join("\n") : "No major missing information detected.";
      final.raw_brief = options.saveRawBrief ? raw : "";
      final.checklist = DEFAULT_CHECKLIST;
      final.report = final.report || "";
      final.structured_brief = final.structured_brief || buildStrictStructuredBrief(final,briefType);

      return {rawBrief:raw,briefType,confidence,finalDraft:final,evidence,reviewFlags:combinedMissing,saveRawBrief:!!options.saveRawBrief};
    }

    function buildStrictStructuredBrief(d,briefType){
      return [
        `Brief type: ${briefType}`,
        `Artist: ${d.artistName || "TBC"}`,
        `Campaign / track: ${d.title || "TBC"}`,
        `Budget: ${d.budget || "TBC"}`,
        `Territories: ${d.territories || "TBC"}`,
        `Campaign link: ${d.campaign_link || "TBC"}`,
        `Objective / setup: ${d.objective || "TBC"}`,
        `Ad sets: ${d.ad_sets?.length ? d.ad_sets.map(a=>`${a.name} (${a.budget || "budget TBC"})`).join("; ") : "No safe build ad sets detected."}`
      ].join("\n\n");
    }

              <section class="panel">
                <div class="brief-card-head"><h3>Protected Fields</h3><span class="small">Exact parser fills these first. AI is not allowed to overwrite them.</span></div>
                <div class="safe-review-grid">
                  ${fields.map(([key,label,type])=>{
                    const st = statusFor(key);
                    return `<div class="safe-review-card">

                    </div>`;
                  }).join("")}
                </div>
              </section>

              <div class="grid-2">
                <section class="panel stack">
                  <h3>Clean Team Brief</h3>
                  <textarea id="reviewStructuredBrief" style="min-height:220px;">${esc(d.structured_brief || "")}</textarea>
                </section>
                <section class="panel stack">
                  <h3>Questions / Blockers</h3>
                  <textarea id="reviewMissingInfo" style="min-height:220px;">${esc(d.missing_info || "")}</textarea>
                </section>
              </div>

              <section class="panel">
                <div class="brief-card-head"><h3>Ad Sets / Budget Splits</h3><span class="badge">${(d.ad_sets || []).length}</span></div>
                ${(d.ad_sets || []).length ? `<div class="safe-adset-list" id="reviewAdSetList">
                  ${(d.ad_sets || []).map((a,index)=>`
                    <div class="safe-adset-row" data-review-adset="${index}">

                      <div><label>Budget Type</label><select data-adset-field="budget_type"><option ${a.budget_type==="Daily Budget"?"selected":""}>Daily Budget</option><option ${a.budget_type==="Lifetime Budget"?"selected":""}>Lifetime Budget</option><option ${a.budget_type==="Needs Review"?"selected":""}>Needs Review</option></select></div>
                      <div><label>Audience / Notes</label><textarea data-adset-field="audience">${esc(a.audience || a.notes || "")}</textarea></div>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    let jdwAIEngine = null;
    const JDW_MODEL_ID = "Llama-3.2-1B-Instruct-q4f16_1-MLC";

    async function getJDWAIEngine(onProgress){
      if(jdwAIEngine) return jdwAIEngine;
      if(!("gpu" in navigator)) throw new Error("WebGPU is not supported in this browser. Use latest Chrome or Edge on desktop.");
      jdwAIEngine = await webllm.CreateMLCEngine(JDW_MODEL_ID, {
        initProgressCallback: progress => onProgress?.(progress.text)
      });
      return jdwAIEngine;
    }

    function extractJSONObjectFromText(text){
      const value = String(text || "").trim();

      try{
        return JSON.parse(value);
      }catch(error){}

      const first = value.indexOf("{");
      const last = value.lastIndexOf("}");

      if(first === -1 || last === -1 || last <= first){
        throw new Error("No JSON object found in AI response.");
      }

      return JSON.parse(value.slice(first,last + 1));
    }

    window.parseBriefWithWebLLM = async function(rawBrief,onProgress){
      const engine = await getJDWAIEngine(onProgress);
      onProgress?.("Extracting exact fields locally...");

      const systemPrompt = `
You are a STRICT paid media campaign brief extractor for JDW Media.

Your job is to extract exact campaign data into the website fields. This is a high-risk operations tool. A wrong budget, objective, pixel, date, link, territory, audience or ad-set instruction could cause serious damage.

ABSOLUTE RULES:
- Return JSON only. No markdown. No explanation.
- Do not guess. Do not invent. Do not complete missing information from general knowledge.
- If a field is not explicitly stated, use an empty string and add a review flag.
- Every important field should have source evidence copied from the brief.
- Preserve exact URLs.
- K means thousand: £2K = £2,000, €2K = €2,000, 2K = 2,000 currency TBC.
- Never convert 2K to 2.
- Campaign-level spend cap, spend cap, ceiling, total budget, campaign budget = campaign budget.
- /day, per day, daily, each to start = ad set daily budget.
- Do not confuse total campaign budget with ad set daily budget.
- DACH means Germany, Austria, Switzerland.
- LAL = Lookalike Audience. CA = Custom Audience. INT = Interest Audience. RA = Related Artists. IG = Instagram. FB = Facebook.
- Native = existing public post. Dark = unpublished ad.
- If the document is a campaign report, classify it as campaign_report and do NOT create build ad sets.
- If the document is a strategy/paid media brief without exact build instructions, classify it as strategy_brief and mark ad sets as Needs Review.
- If the document gives exact Meta build instructions, classify it as build_brief.

Return this exact JSON shape:
{
  "brief_type": "build_brief | strategy_brief | campaign_report | unknown",
  "confidence": "high | medium | low",
  "finalDraft": {
    "artistName": "",
    "title": "",
    "status": "New Brief",
    "priority": "Normal",
    "deadline": "",
    "budget": "",
    "objective": "",
    "campaign_link": "",
    "territories": "",
    "raw_brief": "",
    "structured_brief": "",
    "missing_info": "",
    "report": "",
    "ad_sets": [
      {
        "name": "",
        "objective": "",
        "budget": "",
        "budget_type": "",
        "status": "Needs Review",
        "audience": "",
        "notes": ""
      }
    ]
  },
  "evidence": {
    "artistName": "",
    "title": "",
    "budget": "",
    "objective": "",
    "campaign_link": "",
    "territories": "",
    "deadline": "",
    "ad_sets": []
  },
  "reviewFlags": []
}

EXAMPLE RULES:
- For a brief saying "Budget: set €1,000 as the campaign-level spend cap" finalDraft.budget must be "€1,000".
- For a brief saying "£2K Initial Meta budget" finalDraft.budget must be "£2,000".
- For "£1K boosting / awareness" and "£1K pre-order / ecom", create two Needs Review ad sets/budget split rows, not final build-ready ad sets.
- For a campaign report containing ROAS/CPP/purchases/spend tables, put the summary in report/structured_brief, set status to Reporting, and leave objective/campaign_link blank unless explicitly stated.
`;

      const aiRequest = engine.chat.completions.create({
        messages:[
          {role:"system",content:systemPrompt},
          {role:"user",content:rawBrief}
        ],
        temperature:0
      });

      const timeout = new Promise((_,reject)=>{
        setTimeout(()=>reject(new Error("Local AI timed out after 2 minutes.")),120000);
      });

      const response = await Promise.race([aiRequest,timeout]);

      const content = response.choices?.[0]?.message?.content;
      if(!content) throw new Error("AI returned no content.");

      try{
        return extractJSONObjectFromText(content);
      }catch(error){
        console.error("Invalid AI JSON:",content);
        throw new Error("AI returned invalid JSON.");
      }
    };
  </script>

  .jdw-check-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}.jdw-check-list{display:grid;gap:8px}.jdw-ad-targets{display:grid;gap:5px;max-height:155px;overflow:auto}.jdw-ad-targets label{display:flex;gap:6px;align-items:center;margin:0;text-transform:none;letter-spacing:0;font-size:11px;color:var(--muted);font-weight:850}.jdw-ad-targets input{width:auto}.jdw-error-card{border:1px solid rgba(255,95,109,.4);background:rgba(255,95,109,.08);border-radius:18px;padding:16px;color:var(--red)}
  @media(max-width:1000px){.jdw-platform-grid,.jdw-check-grid,.jdw-form-grid{grid-template-columns:1fr}.jdw-form-grid .wide{grid-column:auto}}
</style>

<script>
(function(){
  const legacyOpenCampaignModal = openCampaignModal;
  const builderSteps = ["campaign","adsets","ads","checklist","report"];
  const TIKTOK_BUILDER_CHECKLIST = [
    "Confirm correct TikTok Business Center and Ads Manager account.",
    "Confirm objective is Video Views.",
    "Set optimisation goal to 15-second focused view if briefed.",
    "Confirm budget strategy, total budget and schedule.",
    "Confirm ad group/ad set naming follows JDW convention.",
    "Confirm locations, age, gender and language targeting.",
    "Add broad folk-pop / singer-songwriter / sad indie targeting only when briefed.",
    "Keep Smart Interests & Behaviours on unless told otherwise.",
    "Add Spark codes or authorised TikTok posts at ad level.",
    "Map each ad to the correct ad groups.",
    "Check bid control and frequency cap.",
    "Check automatic enhancements are not changing native/Spark creative.",
    "Preview each ad before publishing.",
    "Send summary/update to James or JD before launch if approval is needed."
  ];
  const META_BUILDER_CHECKLIST = window.DEFAULT_CHECKLIST || [
    "Confirm correct Ads Manager account, pixel/dataset, destination link and ACID/compliance code.",
    "Confirm campaign objective, conversion location and optimisation event.",
    "Set campaign budget/spend cap exactly as briefed.",
    "Apply naming convention across campaign, ad sets and ads.",
    "Confirm ad set audiences, territories, age and placements.",
    "Confirm exclusions/warm pools where needed.",
    "Confirm ad-level creative, CTA and destination URL.",
    "Preview every ad before launch.",
    "Send setup summary for approval before publishing."
  ];
  let builder = null;

  function emptyBuilder(platform){
    return {
      platform, step:"campaign", artistName:"", title:"", status:"New Brief", priority:"Normal", deadline:"", budget:"", objective:"", campaign_link:"", territories:"", raw_brief:"", structured_brief:"", missing_info:"", report:"", campaign_name:"", acid_code:"", ad_account:"", optimisation_goal:"", budget_strategy:"", schedule_start:"", schedule_end:"", ad_sets:[], ads:[], checklist:(platform === "tiktok" ? TIKTOK_BUILDER_CHECKLIST : META_BUILDER_CHECKLIST).map((text,i)=>({text,done:false,position:i}))
    };
  }
  function e(v){return String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));}
  function a(v){return e(v).replace(/`/g,"&#96;");}
  function g(id){return document.getElementById(id)?.value?.trim() || "";}
  function term(){return builder.platform === "tiktok" ? "Ad Groups" : "Ad Sets";}
  function platformLabel(){return builder.platform === "tiktok" ? "TikTok" : "Meta";}
  function input(id,label,value,type="text",wide=false){return `<div class="${wide?'wide':''}"><label>${label}</label><input id="jdw_${id}" type="${type}" value="${a(value)}" /></div>`;}
  function select(id,label,value,opts,wide=false){return `<div class="${wide?'wide':''}"><label>${label}</label><select id="jdw_${id}">${opts.map(o=>`<option value="${a(o)}" ${String(value||"")===String(o)?"selected":""}>${e(o || "—")}</option>`).join("")}</select></div>`;}
  function textarea(id,label,value,wide=false){return `<div class="${wide?'wide':''}"><label>${label}</label><textarea id="jdw_${id}">${e(value)}</textarea></div>`;}
  function collect(){
    if(!builder) return;
    ["artistName","title","campaign_name","acid_code","ad_account","objective","optimisation_goal","budget_strategy","budget","deadline","campaign_link","territories","schedule_start","schedule_end","structured_brief","missing_info","report"].forEach(k=>{const el=document.getElementById("jdw_"+k); if(el) builder[k]=el.value.trim();});
    const status=document.getElementById("jdw_status"); if(status) builder.status=status.value;
    const priority=document.getElementById("jdw_priority"); if(priority) builder.priority=priority.value;
    document.querySelectorAll("[data-jdw-check]").forEach(box=>{const i=+box.dataset.jdwCheck; if(builder.checklist[i]) builder.checklist[i].done=box.checked;});
    document.querySelectorAll("[data-jdw-adset]").forEach(row=>{const i=+row.dataset.jdwAdset; if(!builder.ad_sets[i]) return; ["name","objective","budget","budget_type","status","audience","notes"].forEach(k=>{const el=row.querySelector(`[data-field="${k}"]`); if(el) builder.ad_sets[i][k]=el.value.trim();});});
    document.querySelectorAll("[data-jdw-ad]").forEach(row=>{const i=+row.dataset.jdwAd; if(!builder.ads[i]) return; ["name","format","track","source","spark_code","destination","cta","status","notes"].forEach(k=>{const el=row.querySelector(`[data-field="${k}"]`); if(el) builder.ads[i][k]=el.value.trim();}); builder.ads[i].adset_targets=Array.from(row.querySelectorAll("[data-target]:checked")).map(x=>x.value);});
  }
  function renderShell(body){
    const label = platformLabel();
    modalRoot.innerHTML = `<div class="modal-backdrop" id="modalBackdrop"><div class="modal jdw-builder-modal"><div class="modal-head between"><div><h2><span class="jdw-platform-pill">${label}</span> New Campaign</h2><p class="small">Campaign → ${term()} → Ads → Checklist → Status / Report</p></div><button class="btn secondary" id="jdwCloseBuilder">Close</button></div><div class="jdw-builder-flow">${builderSteps.map((s,i)=>`<button class="${builder.step===s?'active':''}" data-step="${s}">${i+1}. ${s==='adsets'?term():s==='checklist'?'Checklist':s==='report'?'Status / Report':s[0].toUpperCase()+s.slice(1)}</button>`).join("")}</div><div class="modal-body jdw-builder-body">${body}</div></div></div>`;
    document.getElementById("jdwCloseBuilder").onclick=()=>{modalRoot.innerHTML=""; builder=null;};
    document.getElementById("modalBackdrop").onclick=(ev)=>{ if(ev.target.id==="modalBackdrop"){modalRoot.innerHTML=""; builder=null;} };
    document.querySelectorAll("[data-step]").forEach(b=>b.onclick=()=>{collect(); builder.step=b.dataset.step; renderBuilder();});
  }
  function renderPlatformChoice(){
    modalRoot.innerHTML = `<div class="modal-backdrop" id="modalBackdrop"><div class="modal jdw-builder-modal"><div class="modal-head between"><div><h2>New Campaign</h2><p class="small">Choose the platform build style.</p></div><button class="btn secondary" id="jdwCloseBuilder">Close</button></div><div class="modal-body jdw-builder-body"><div class="jdw-platform-grid"><article class="jdw-platform-card" id="jdwChooseMeta"><div><div class="jdw-platform-icon">M</div><h3>Meta</h3><p>Build a Meta / Instagram / Facebook campaign.</p></div><button class="btn">Build Meta Campaign</button></article><article class="jdw-platform-card" id="jdwChooseTikTok"><div><div class="jdw-platform-icon">♫</div><h3>TikTok</h3><p>Build a TikTok / Spark Ads campaign.</p></div><button class="btn">Build TikTok Campaign</button></article></div></div></div></div>`;
    document.getElementById("jdwCloseBuilder").onclick=()=>modalRoot.innerHTML="";
    document.getElementById("jdwChooseMeta").onclick=()=>{builder=emptyBuilder("meta"); renderBuilder();};
    document.getElementById("jdwChooseTikTok").onclick=()=>{builder=emptyBuilder("tiktok"); renderBuilder();};
  }
  function renderCampaign(){
    shell(`<section class="jdw-v2-panel"><div class="jdw-v2-head"><div><span class="jdw-v2-pill">${label()} Campaign</span><h3>Campaign level</h3><p class="small">Only the key campaign fields: campaign name, artist/track, ad account, budget, territories and objective.</p></div><button class="btn" id="nextAdsets">Next: ${adsetTerm()}</button></div><div class="jdw-v2-grid">${input('campaign_name','Campaign Name','text',true)}${input('artistName','Artist')}${input('title','Campaign / Track')}${input('ad_account','Ad Account')}${select('budget_strategy','Budget Type',['','Campaign budget','Ad set budget','Ad group budget','Lifetime campaign budget','Daily campaign budget'])}${input('budget','Campaign Budget')}${input('territories','Territories')}${input('objective','Objective','text',true)}</div></section>`);
    getEl('#nextAdsets').onclick=()=>{collect();v2.step='adsets';render();};
  }
  function renderAdsets(){
    shell(`<section class="jdw-v2-panel"><div class="jdw-v2-head"><div><span class="jdw-v2-pill">${adsetTerm()}</span><h3>${adsetTerm()} level</h3><p class="small">Keep this simple: imported ${adsetTerm().slice(0,-1).toLowerCase()} name from Meta, budget type/amount and notes. If it uses campaign budget, the amount field disappears.</p></div><div class="row"><input id="v2Count" type="number" min="1" max="20" value="${Math.max(1,v2.ad_sets.length||2)}" style="width:90px"><button class="btn secondary" id="genSets">Generate Rows</button><button class="btn secondary" id="addSet">+ Add Row</button><button class="btn" id="nextAds">Next: Ads</button></div></div>${v2.ad_sets.length?`<table class="jdw-v2-table"><thead><tr><th>${adsetTerm().slice(0,-1)} Name</th><th>Budget Type</th><th>Budget Amount</th><th>Notes</th><th></th></tr></thead><tbody>${v2.ad_sets.map((s,i)=>{ const usesCampaign=adsetUsesCampaignBudget(s); if(usesCampaign) s.budget=''; return `<tr data-v2-adset="${i}"><td><input data-field="name" value="${attr2(s.name||'')}" placeholder="Imported Meta ${adsetTerm().slice(0,-1).toLowerCase()} name"></td><td><select data-field="budget_type"><option ${s.budget_type==='Uses campaign budget'?'selected':''}>Uses campaign budget</option><option ${s.budget_type==='Daily Budget'?'selected':''}>Daily Budget</option><option ${s.budget_type==='Lifetime Budget'?'selected':''}>Lifetime Budget</option><option ${s.budget_type==='Campaign Budget'?'selected':''}>Campaign Budget</option></select></td><td>${usesCampaign?`<div class="pill accent">Uses campaign budget</div><p class="small" style="margin:6px 0 0;">No ${adsetTerm().slice(0,-1).toLowerCase()} amount needed.</p>`:`<input data-field="budget" value="${attr2(s.budget||'')}" placeholder="Budget amount">`}</td><td><textarea data-field="notes" placeholder="Audience, targeting, placements, import notes...">${esc2(s.notes||'')}</textarea></td><td><button class="mini-btn" data-remove-set="${i}">×</button></td></tr>`;}).join('')}</tbody></table>`:`<div class="empty">No ${adsetTerm().toLowerCase()} yet.</div>`}</section>`);
    getEl('#genSets').onclick=()=>{collect(); const n=Number(getEl('#v2Count').value||1); v2.ad_sets=Array.from({length:n},(_,i)=>v2.ad_sets[i]||adsetRowDefaults(i)); render();};
    getEl('#addSet').onclick=()=>{collect();v2.ad_sets.push(adsetRowDefaults(v2.ad_sets.length));render();};
    getEl('#nextAds').onclick=()=>{collect();v2.step='ads';render();};
    getAll('[data-remove-set]').forEach(b=>b.onclick=()=>{collect();v2.ad_sets.splice(+b.dataset.removeSet,1);render();});
    getAll('[data-v2-adset] [data-field]').forEach(el=>{ el.oninput=()=>{ collect(); }; el.onchange=()=>{ collect(); render(); }; });
  }
  function renderAds(){
    const targets = builder.ad_sets.map((s,i)=>s.name || `${term().slice(0,-1)} ${i+1}`);
    renderShell(`<section class="jdw-page-card"><div class="jdw-page-head"><div><span class="jdw-platform-pill">Ad level</span><h3>Ads / creative assets</h3><p class="small">Add videos/assets and tick which ${term().toLowerCase()} each sits in.</p></div><div class="row"><button class="btn secondary" id="jdwAddAd">+ Add Ad</button><button class="btn secondary" id="jdwAllAdsAllSets">Put all ads in all ${term().toLowerCase()}</button><button class="btn" id="jdwNextChecklist">Next: Checklist</button></div></div>${builder.ads.length?`<table class="jdw-table"><thead><tr><th>Ad name</th><th>Format</th><th>Track / Asset</th><th>Source / Spark Code</th><th>CTA / Destination</th><th>${term()}</th><th>Status</th><th></th></tr></thead><tbody>${builder.ads.map((ad,i)=>`<tr data-jdw-ad="${i}"><td><input data-field="name" value="${a(ad.name||'')}" /></td><td><input data-field="format" value="${a(ad.format||'')}" placeholder="Video / Reel / Spark" /></td><td><input data-field="track" value="${a(ad.track||'')}" /></td><td><input data-field="source" value="${a(ad.source||'')}" placeholder="Post / asset link" /><input data-field="spark_code" value="${a(ad.spark_code||'')}" placeholder="Spark code" style="margin-top:6px" /></td><td><input data-field="cta" value="${a(ad.cta||'')}" placeholder="CTA" /><input data-field="destination" value="${a(ad.destination||'')}" placeholder="Destination" style="margin-top:6px" /></td><td><div class="jdw-ad-targets">${targets.length?targets.map(t=>`<label><input type="checkbox" data-target value="${a(t)}" ${(ad.adset_targets||[]).includes(t)?'checked':''}>${e(t)}</label>`).join(""):`<span class="small">Add ${term().toLowerCase()} first.</span>`}</div></td><td><select data-field="status"><option ${ad.status==='Draft'?'selected':''}>Draft</option><option ${ad.status==='Ready'?'selected':''}>Ready</option><option ${ad.status==='Live'?'selected':''}>Live</option><option ${ad.status==='Needs Review'?'selected':''}>Needs Review</option></select></td><td><button class="mini-btn" data-remove-ad="${i}">×</button></td></tr>`).join("")}</tbody></table>`:`<div class="empty">No ads yet. Add your first video/asset.</div>`}</section>`);
    document.getElementById("jdwAddAd").onclick=()=>{collect();builder.ads.push({name:"",format:"",track:"",source:"",spark_code:"",destination:"",cta:"",status:"Draft",adset_targets:[],notes:""});renderBuilder();};
    document.getElementById("jdwAllAdsAllSets").onclick=()=>{collect();builder.ads.forEach(ad=>ad.adset_targets=targets.slice());renderBuilder();};
    document.getElementById("jdwNextChecklist").onclick=()=>{collect();builder.step="checklist";renderBuilder();};
    document.querySelectorAll("[data-remove-ad]").forEach(b=>b.onclick=()=>{collect();builder.ads.splice(+b.dataset.removeAd,1);renderBuilder();});
  }
  function summary(){
    return `${label()} Campaign Build\n\nCampaign Name: ${v2.campaign_name||'TBC'}\nArtist / Track: ${v2.artistName||'TBC'} — ${v2.title||'TBC'}\nAd Account: ${v2.ad_account||'TBC'}\nBudget: ${v2.budget||'TBC'}\nTerritories: ${v2.territories||'TBC'}\nObjective: ${v2.objective||'TBC'}\n\n${adsetTerm()}:\n${v2.ad_sets.length?v2.ad_sets.map((s,i)=>`${i+1}. ${s.name||'Untitled'} — ${adsetUsesCampaignBudget(s)?'Uses campaign budget':`${s.budget||'Budget TBC'} ${s.budget_type||''}`}${s.notes?` — Notes: ${s.notes}`:''}`).join('\n'):'None yet'}\n\nAds:\n${v2.ads.length?v2.ads.map((ad,i)=>`${i+1}. ${ad.name||'Untitled'} — ${(ad.adset_targets||[]).length?'Targets: '+ad.adset_targets.join(', '):'Targets TBC'}`).join('\n'):'None yet'}\n\nQuestions / Missing Info:\n${v2.missing_info||'None'}`;
  }
  function renderChecklist(){
    const done = builder.checklist.filter(x=>x.done).length;
    renderShell(`<section class="jdw-page-card"><div class="jdw-page-head"><div><span class="jdw-platform-pill">${platformLabel()} Checklist</span><h3>Pre-launch checklist</h3><p class="small">This works before saving too.</p></div><div class="row"><span class="badge">${done}/${builder.checklist.length}</span><button class="btn" id="jdwNextReport">Next: Status / Report</button></div></div><div class="jdw-check-grid"><div class="panel"><div class="jdw-check-list">${builder.checklist.map((c,i)=>`<label class="check-item ${c.done?'done':''}"><input type="checkbox" data-jdw-check="${i}" ${c.done?'checked':''}><span>${e(c.text)}</span></label>`).join("")}</div></div><div class="panel stack"><h3>Build summary</h3><textarea readonly style="min-height:360px">${e(summary())}</textarea><button class="btn secondary" id="jdwCopySummary">Copy Build Summary</button></div></div></section>`);
    document.querySelectorAll("[data-jdw-check]").forEach(b=>b.onchange=()=>{collect(); renderBuilder();});
    document.getElementById("jdwNextReport").onclick=()=>{collect();builder.step="report";renderBuilder();};
    document.getElementById("jdwCopySummary").onclick=()=>navigator.clipboard.writeText(summary()).then(()=>toast("Build summary copied"));
  }
  function renderReport(){
    const rep = builder.report || summary();
    renderShell(`<section class="jdw-page-card"><div class="jdw-page-head"><div><span class="jdw-platform-pill">Status / Report</span><h3>Status and report</h3><p class="small">Copyable update for James/JD/client.</p></div><div class="row"><button class="btn secondary" id="jdwGenerateReport">Generate Report</button><button class="btn secondary" id="jdwCopyReport">Copy Report</button><button class="btn" id="jdwSaveBuilder">Create Campaign</button></div></div><div class="grid-2"><div class="panel stack"><h3>Status</h3><div class="quality-list"><div class="quality-item"><span>Status</span><strong>${e(builder.status)}</strong></div><div class="quality-item"><span>Platform</span><strong>${platformLabel()}</strong></div><div class="quality-item"><span>${term()}</span><strong>${builder.ad_sets.length}</strong></div><div class="quality-item"><span>Ads</span><strong>${builder.ads.length}</strong></div></div></div><div class="panel stack"><h3>Report</h3><textarea id="jdw_report" style="min-height:360px">${e(rep)}</textarea></div></div></section>`);
    document.getElementById("jdwGenerateReport").onclick=()=>{builder.report=summary();renderBuilder();};
    document.getElementById("jdwCopyReport").onclick=()=>navigator.clipboard.writeText(g("report") || document.getElementById("jdw_report").value).then(()=>toast("Report copied"));
    document.getElementById("jdwSaveBuilder").onclick=saveBuilder;
  }
  function renderBuilder(){
    try{collect(); if(builder.step==="campaign") renderCampaign(); else if(builder.step==="adsets") renderAdsets(); else if(builder.step==="ads") renderAds(); else if(builder.step==="checklist") renderChecklist(); else if(builder.step==="report") renderReport();}
    catch(err){console.error(err); modalRoot.innerHTML=`<div class="modal-backdrop"><div class="modal"><div class="modal-head between"><h2>Builder error</h2><button class="btn secondary" onclick="modalRoot.innerHTML=''">Close</button></div><div class="modal-body"><div class="jdw-error-card"><strong>${e(err.message||err)}</strong></div></div></div></div>`;}
  }
  async function saveBuilder(){
    collect();
    if(!builder.artistName || !builder.title){ toast("Add artist and campaign / track name first.",true); builder.step="campaign"; renderBuilder(); return; }
    try{
      const artist = await getOrCreateArtist(builder.artistName);
      const platformData = {platform:builder.platform,campaign_name:builder.campaign_name,acid_code:builder.acid_code,ad_account:builder.ad_account,optimisation_goal:builder.optimisation_goal,budget_strategy:builder.budget_strategy,schedule_start:builder.schedule_start,schedule_end:builder.schedule_end,ads:builder.ads,checklist:builder.checklist};
      let payload = {artist_id:artist.id,title:builder.title,status:builder.status,priority:builder.priority,deadline:builder.deadline||null,budget:builder.budget,objective:builder.objective,campaign_link:builder.campaign_link,territories:builder.territories,raw_brief:builder.raw_brief||"",structured_brief:builder.structured_brief,missing_info:builder.missing_info,report:builder.report||summary(),updated_at:new Date().toISOString(),platform:builder.platform,platform_data:platformData};
      let res = await sb.from("campaigns").insert(payload).select().single();
      if(res.error && /platform/i.test(res.error.message||"")){ delete payload.platform; delete payload.platform_data; res = await sb.from("campaigns").insert(payload).select().single(); }
      if(res.error) throw res.error;
      const id = res.data.id;
      if(builder.ad_sets.length) await sb.from("ad_sets").insert(builder.ad_sets.map((s,i)=>({campaign_id:id,name:s.name||`${term().slice(0,-1)} ${i+1}`,objective:s.objective||"",budget:s.budget||"",budget_type:s.budget_type||"Daily Budget",status:s.status||"Draft",audience:s.audience||"",notes:s.notes||"",position:i})));
      await sb.from("checklist_items").insert(builder.checklist.map((c,i)=>({campaign_id:id,text:c.text,done:!!c.done,position:i})));
      await sb.from("work_logs").insert({campaign_id:id,logged_by:"System",log_type:"Brief",text:`${platformLabel()} campaign created from Ads Manager-style builder.`,visible_to_james:true});
      await loadData();
      toast("Campaign created.");
      builder=null;
      legacyOpenCampaignModal(id);
    }catch(err){toast(err.message||String(err),true);}
  }
  openCampaignModal = function(id,prefill=null){
    if(id || prefill) return legacyOpenCampaignModal(id,prefill);
    builder = null;
    renderPlatformChoice();
  };
})();
</script>



<style id="jdw-v2-fix-css">
  .card,.stack-card{overflow:hidden;max-width:100%;}
  .card h3,.stack-card h3,.budget-box,.adset-line{overflow-wrap:anywhere;word-break:break-word;}
  .cards{min-width:0;}
  .column{overflow:hidden;}
  .board{grid-template-columns:repeat(8,minmax(280px,300px));}
  .modal.jdw-v2-modal{width:min(1480px,calc(100vw - 44px));max-height:calc(100vh - 44px);}
  .jdw-v2-body{padding:22px;overflow:auto;}
  .jdw-v2-tabs{display:flex;gap:8px;padding:14px 24px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.025);overflow-x:auto;}
  .jdw-v2-tab{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.035);color:var(--muted);padding:9px 13px;font-size:12px;font-weight:950;white-space:nowrap;}
  .jdw-v2-tab.active{color:var(--accent);border-color:rgba(var(--accent-rgb),.3);background:rgba(var(--accent-rgb),.1);}
  .jdw-v2-grid{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:12px;}
  .jdw-v2-grid .wide{grid-column:span 2;}
  .jdw-v2-panel{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.04);padding:18px;margin-bottom:16px;}
  .jdw-v2-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px;}
  .jdw-v2-head h3{margin:0 0 5px;font-size:24px;letter-spacing:-.045em;}
  .jdw-v2-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(var(--accent-rgb),.25);background:rgba(var(--accent-rgb),.08);color:var(--accent);border-radius:999px;padding:5px 9px;font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:.06em;}
  .jdw-v2-table{width:100%;border-collapse:separate;border-spacing:0 9px;font-size:12px;}
  .jdw-v2-table th{text-align:left;color:var(--muted2);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:0 8px;}
  .jdw-v2-table td{background:rgba(0,0,0,.17);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px;vertical-align:top;}
  .jdw-v2-table td:first-child{border-left:1px solid var(--line);border-radius:13px 0 0 13px;}
  .jdw-v2-table td:last-child{border-right:1px solid var(--line);border-radius:0 13px 13px 0;}
  .jdw-v2-table input,.jdw-v2-table select,.jdw-v2-table textarea{padding:8px 9px;border-radius:10px;font-size:12px;min-height:38px;}
  .jdw-v2-table textarea{min-height:58px;}
  .jdw-v2-targets{display:grid;gap:6px;max-height:160px;overflow:auto;}
  .jdw-v2-targets label{margin:0;display:flex;gap:7px;align-items:flex-start;text-transform:none;letter-spacing:0;font-size:11px;color:var(--muted);font-weight:850;}
  .jdw-v2-targets input{width:auto;min-height:auto;margin-top:2px;}
  .jdw-v2-choice{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .jdw-v2-choice-card{border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.085),rgba(255,255,255,.035));padding:32px;display:grid;gap:18px;min-height:220px;transition:.15s;}
  .jdw-v2-choice-card:hover{transform:translateY(-2px);border-color:rgba(var(--accent-rgb),.35);}
  .jdw-v2-choice-card h3{font-size:34px;letter-spacing:-.06em;margin:0;}
  .jdw-v2-icon{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;background:rgba(var(--accent-rgb),.13);color:var(--accent);border:1px solid rgba(var(--accent-rgb),.25);font-size:24px;font-weight:950;}
  .jdw-v2-check-list{display:grid;gap:9px;}
  .jdw-v2-report-grid{display:grid;grid-template-columns:0.75fr 1.25fr;gap:16px;}
  @media(max-width:1000px){.jdw-v2-grid{grid-template-columns:1fr}.jdw-v2-grid .wide{grid-column:auto}.jdw-v2-choice,.jdw-v2-report-grid{grid-template-columns:1fr}}
</style>

<script id="jdw-v2-fixed-builder">
(function(){
  let v2 = null;
  const modalRootEl = () => document.getElementById('modalRoot');
  const esc2 = (v)=>String(v ?? '').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  const attr2 = esc2;
  const getEl = (sel,root=document)=>root.querySelector(sel);
  const getAll = (sel,root=document)=>Array.from(root.querySelectorAll(sel));
  function inferPlatform(c){
    const pd = c?.platform_data || {};
    if(c?.platform) return c.platform;
    if(pd.platform) return pd.platform;
    const blob = [c?.title,c?.objective,c?.structured_brief,c?.raw_brief].join(' ').toLowerCase();
    return /tiktok|spark|fv15|focused view|tt\b/.test(blob) ? 'tiktok' : 'meta';
  }
  function label(){ return v2?.platform === 'tiktok' ? 'TikTok' : 'Meta'; }
  function adsetTerm(){ return v2?.platform === 'tiktok' ? 'Ad Groups' : 'Ad Sets'; }
  function checklistFor(platform){
    const tt = [
      'Confirm correct TikTok Business Center and Ads Manager account',
      'Confirm campaign objective is Video Views or the briefed objective',
      'Confirm optimisation goal / focused view / event is correct',
      'Confirm campaign budget and schedule',
      'Confirm campaign naming uses JDW convention and ACID if required',
      'Build the ad groups with correct countries, age, gender and language',
      'Add detailed targeting / smart interests exactly as briefed',
      'Check bid control and frequency cap',
      'Add Spark posts or uploaded creative assets',
      'Map each ad to the correct ad groups',
      'Check automatic enhancements are not changing the creative unexpectedly',
      'Preview every ad',
      'Confirm tracking if website destination is used',
      'Send setup summary for approval if required',
      'Publish only when approved'
    ];
    const meta = window.DEFAULT_CHECKLIST || [
      'Confirm correct Meta ad account, pixel/dataset, destination link and ACID',
      'Confirm campaign objective, conversion location and optimisation event',
      'Set campaign budget / spend cap exactly as briefed',
      'Build ad sets with correct audiences, exclusions, age and locations',
      'Check placements and platform rules',
      'Add ads / existing posts / dark ads',
      'Map each ad to the correct ad sets',
      'Turn off unwanted creative enhancements',
      'Preview every ad',
      'Send setup summary for approval before launch'
    ];
    return (platform==='tiktok'?tt:meta).map(text=>({text,done:false}));
  }
  function blank(platform){
    return {id:null,platform,step:'campaign',artistName:'',title:'',status:'New Brief',priority:'Normal',deadline:'',budget:'',objective:'',campaign_link:'',territories:'',raw_brief:'',structured_brief:'',missing_info:'',report:'',campaign_name:'',acid_code:'',ad_account:'',optimisation_goal:'',budget_strategy:'',schedule_start:'',schedule_end:'',ad_sets:[],ads:[],checklist:checklistFor(platform)};
  }
  function campaignToV2(c){
    const platform = inferPlatform(c);
    const pd = c.platform_data || {};
    const metaRows = Array.isArray(pd.ad_sets_meta) ? pd.ad_sets_meta : [];
    const rows = getCampaignAdSets(c.id).map((a,i)=>{ const m=metaRows[i]||{}; return {id:a.id,name:a.name||'',objective:a.objective||'',budget:a.budget||'',budget_type:a.budget_type||'Daily Budget',status:a.status||'Draft',audience:a.audience||'',notes:a.notes||'',audience_type:m.audience_type||'',audience_target:m.audience_target||'',age_range:m.age_range||'',region:m.region||'',platform_field:m.platform_field||''}; });
    const checks = getCampaignChecklist(c.id);
    return {id:c.id,platform,step:'campaign',artistName:getArtistName(c.artist_id),title:c.title||'',status:c.status||'New Brief',priority:c.priority||'Normal',deadline:c.deadline||'',budget:c.budget||'',objective:c.objective||'',campaign_link:c.campaign_link||'',territories:c.territories||'',raw_brief:c.raw_brief||'',structured_brief:c.structured_brief||'',missing_info:c.missing_info||'',report:c.report||'',campaign_name:pd.campaign_name||'',acid_code:pd.acid_code||'',ad_account:pd.ad_account||'',optimisation_goal:pd.optimisation_goal||'',budget_strategy:pd.budget_strategy||'',schedule_start:pd.schedule_start||'',schedule_end:pd.schedule_end||'',ad_sets:rows,ads:Array.isArray(pd.ads)?pd.ads:[],checklist:checks.length?checks.map(x=>({id:x.id,text:x.text,done:!!x.done})):checklistFor(platform)};
  }
  function input(k,label,type='text',wide=false){ return `<div class="${wide?'wide':''}"><label>${esc2(label)}</label><input data-v2="${k}" type="${type}" value="${attr2(v2[k]||'')}"></div>`; }
  function select(k,label,opts){ return `<div><label>${esc2(label)}</label><select data-v2="${k}">${opts.map(o=>`<option value="${attr2(o)}" ${String(v2[k]||'')===o?'selected':''}>${esc2(o||'')}</option>`).join('')}</select></div>`; }
  function textarea(k,label,wide=true){ return `<div class="${wide?'wide':''}"><label>${esc2(label)}</label><textarea data-v2="${k}">${esc2(v2[k]||'')}</textarea></div>`; }
  function normaliseAudienceToken(value){
    return String(value||'')
      .toLowerCase()
      .trim()
      .replace(/&/g,'and')
      .replace(/\+/g,'+')
      .replace(/[^a-z0-9+]+/g,'-')
      .replace(/-+/g,'-')
      .replace(/^-|-$/g,'');
  }
  function audienceTypeCode(value){
    const map={
      'Advantage+':'adv',
      'Interest':'int',
      'Custom Audience':'ca',
      'Lookalike':'lal',
      'Retargeting':'rt',
      'Broad/Open':'open'
    };
    return map[value] || normaliseAudienceToken(value) || 'aud';
  }
  function platformCode(value){
    const map={'IG':'ig','IG+FB':'ig-fb','FB':'fb','TT':'tt'};
    return map[value] || normaliseAudienceToken(value) || 'platform';
  }
  function hasStructuredAudience(row){
    return !!(row.audience_type || row.audience_target || row.age_range || row.region || row.platform_field);
  }
  function buildAudienceAssetName(row){
    if(!hasStructuredAudience(row) && row.name) return row.name;
    const type=audienceTypeCode(row.audience_type);
    const target=normaliseAudienceToken(row.audience_target) || 'target';
    const age=normaliseAudienceToken(row.age_range).replace(/-/g,'-') || 'age';
    const region=normaliseAudienceToken(row.region) || 'region';
    const platform=platformCode(row.platform_field);
    return `${type}_${target}_${age}_${region}_${platform}`;
  }
  function buildAudienceSummary(row){
    return `Audience Type: ${row.audience_type || 'TBC'}\nTarget: ${row.audience_target || 'TBC'}\nAge: ${row.age_range || 'TBC'}\nRegion: ${row.region || 'TBC'}\nPlatform: ${row.platform_field || 'TBC'}\nGenerated Name: ${buildAudienceAssetName(row)}`;
  }
  function adsetUsesCampaignBudget(row){
    return /campaign/i.test(String(row?.budget_type || ''));
  }
  function adsetRowDefaults(i){
    return {name:'',objective:'',budget:'',budget_type:'Uses campaign budget',audience_type:'',audience_target:'',age_range:'',region:'',platform_field:v2?.platform==='tiktok'?'TT':'IG',audience:'',status:'Draft',notes:''};
  }

  function collect(){
    if(!v2) return;
    getAll('[data-v2]').forEach(el=>{ v2[el.dataset.v2]=el.value; });
    getAll('[data-v2-adset]').forEach(row=>{
      const i=+row.dataset.v2Adset;
      const obj=v2.ad_sets[i];
      if(!obj) return;
      getAll('[data-field]',row).forEach(el=>obj[el.dataset.field]=el.value);
      if(adsetUsesCampaignBudget(obj)) obj.budget='';
      obj.audience=obj.notes || '';
    });
    getAll('[data-v2-ad]').forEach(row=>{ const i=+row.dataset.v2Ad; const obj=v2.ads[i]; if(!obj) return; getAll('[data-field]',row).forEach(el=>obj[el.dataset.field]=el.value); obj.adset_targets=getAll('[data-target]:checked',row).map(x=>x.value); });
    getAll('[data-v2-check]').forEach(el=>{ const i=+el.dataset.v2Check; if(v2.checklist[i]) v2.checklist[i].done=el.checked; });
  }
  function shell(body){
    const steps=[['campaign','1. Campaign'],['adsets',`2. ${adsetTerm()}`],['ads','3. Ads'],['brief','4. Brief'],['checklist','5. Checklist'],['report','6. Status / Report']];
    modalRootEl().innerHTML = `<div class="modal-backdrop" id="v2Backdrop"><div class="modal jdw-v2-modal"><div class="modal-head between"><div><h2>${v2.id?esc2(v2.artistName+' — '+v2.title):'New Campaign'}</h2><p class="small"><span class="jdw-v2-pill">${label()}</span> &nbsp; Campaign → ${adsetTerm()} → Ads → Brief → Checklist → Status/Report</p></div><div class="row"><button class="btn secondary" id="v2SaveTop">${v2.id?'Save':'Create'}</button><button class="btn secondary" id="v2Close">Close</button></div></div><div class="jdw-v2-tabs">${steps.map(([k,t])=>`<button class="jdw-v2-tab ${v2.step===k?'active':''}" data-v2-step="${k}">${esc2(t)}</button>`).join('')}</div><div class="jdw-v2-body">${body}</div></div></div>`;
    getEl('#v2Close').onclick=()=>{ modalRootEl().innerHTML=''; v2=null; };
    getEl('#v2SaveTop').onclick=saveV2;
    getEl('#v2Backdrop').onclick=e=>{ if(e.target.id==='v2Backdrop'){ modalRootEl().innerHTML=''; v2=null; } };
    getAll('[data-v2-step]').forEach(b=>b.onclick=()=>{ collect(); v2.step=b.dataset.v2Step; render(); });
  }
  function renderChoice(){
    modalRootEl().innerHTML = `<div class="modal-backdrop"><div class="modal jdw-v2-modal"><div class="modal-head between"><div><h2>New Campaign</h2><p class="small">Choose the Ads Manager build type.</p></div><button class="btn secondary" id="v2CloseChoice">Close</button></div><div class="jdw-v2-body"><div class="jdw-v2-choice"><button class="jdw-v2-choice-card" data-platform="meta"><span class="jdw-v2-icon">M</span><div><h3>Meta</h3><p>Campaign, ad sets and ads.</p></div></button><button class="jdw-v2-choice-card" data-platform="tiktok"><span class="jdw-v2-icon">♪</span><div><h3>TikTok</h3><p>Campaign, ad groups and ads.</p></div></button></div></div></div></div>`;
    getEl('#v2CloseChoice').onclick=()=>modalRootEl().innerHTML='';
    getAll('[data-platform]').forEach(b=>b.onclick=()=>{ v2=blank(b.dataset.platform); render(); });
  }
  function renderCampaign(){
    shell(`<section class="jdw-v2-panel"><div class="jdw-v2-head"><div><span class="jdw-v2-pill">${label()} Campaign</span><h3>Campaign level</h3><p class="small">Only the key campaign fields: campaign name, artist/track, ad account, budget, territories and objective.</p></div><button class="btn" id="nextAdsets">Next: ${adsetTerm()}</button></div><div class="jdw-v2-grid">${input('campaign_name','Campaign Name','text',true)}${input('artistName','Artist')}${input('title','Campaign / Track')}${input('ad_account','Ad Account')}${select('budget_strategy','Budget Type',['','Campaign budget','Ad set budget','Ad group budget','Lifetime campaign budget','Daily campaign budget'])}${input('budget','Campaign Budget')}${input('territories','Territories')}${input('objective','Objective','text',true)}</div></section>`);
    getEl('#nextAdsets').onclick=()=>{collect();v2.step='adsets';render();};
  }
  function renderAdsets(){
    const pastedHelp = `Paste one ${adsetTerm().slice(0,-1).toLowerCase()} name per line. This will create one row per name and keep the exact Meta naming.`;
    shell(`<section class="jdw-v2-panel">
      <div class="jdw-v2-head">
        <div>
          <span class="jdw-v2-pill">Bulk ${adsetTerm()} Paste</span>
          <h3>Paste ${adsetTerm().toLowerCase()} line by line</h3>
          <p class="small">${pastedHelp}</p>
        </div>
      </div>
      <div class="grid-2">
        <div class="panel stack">
          <h3>Paste names</h3>
          <textarea id="bulkAdsetNames" style="min-height:230px;" placeholder="EU_fop_eng_disco_BERLIN_A-artist_CORRECTED\nEU_fop_eng_disco_MANCHESTER_D-broad\nEU_fop_eng_disco_PARIS_B-genre-CORRECTED"></textarea>
        </div>
        <div class="panel stack">
          <h3>Apply to generated rows</h3>
          <div>
            <label>Budget Type</label>
            <select id="bulkBudgetType">
              <option>Uses campaign budget</option>
              <option>Daily Budget</option>
              <option>Lifetime Budget</option>
            </select>
          </div>
          <div id="bulkBudgetAmountWrap">
            <label>Budget Amount</label>
            <input id="bulkBudgetAmount" placeholder="Only needed for daily/lifetime ad set budgets">
          </div>
          <div>
            <label>Default Notes</label>
            <textarea id="bulkDefaultNotes" style="min-height:95px;" placeholder="Optional note applied to every pasted ${adsetTerm().slice(0,-1).toLowerCase()}..."></textarea>
          </div>
          <div class="row">
            <button class="btn" id="bulkReplaceAdsets">Generate / Replace Rows</button>
            <button class="btn secondary" id="bulkAppendAdsets">Add To Existing Rows</button>
          </div>
          <p class="small">If Budget Type is “Uses campaign budget”, each row’s amount field stays hidden and saves blank.</p>
        </div>
      </div>
    </section>

    <section class="jdw-v2-panel">
      <div class="jdw-v2-head">
        <div>
          <span class="jdw-v2-pill">${adsetTerm()}</span>
          <h3>${adsetTerm()} level</h3>
          <p class="small">Imported ${adsetTerm().slice(0,-1).toLowerCase()} name, budget type/amount and notes. If it uses campaign budget, the amount field disappears.</p>
        </div>
        <div class="row">
          <input id="v2Count" type="number" min="1" max="50" value="${Math.max(1,v2.ad_sets.length||2)}" style="width:90px">
          <button class="btn secondary" id="genSets">Generate Blank Rows</button>
          <button class="btn secondary" id="addSet">+ Add Row</button>
          <button class="btn" id="nextAds">Next: Ads</button>
        </div>
      </div>
      ${v2.ad_sets.length?`<table class="jdw-v2-table"><thead><tr><th>${adsetTerm().slice(0,-1)} Name</th><th>Budget Type</th><th>Budget Amount</th><th>Notes</th><th></th></tr></thead><tbody>${v2.ad_sets.map((s,i)=>{ const usesCampaign=adsetUsesCampaignBudget(s); if(usesCampaign) s.budget=''; return `<tr data-v2-adset="${i}"><td><input data-field="name" value="${attr2(s.name||'')}" placeholder="Imported Meta ${adsetTerm().slice(0,-1).toLowerCase()} name"></td><td><select data-field="budget_type"><option ${s.budget_type==='Uses campaign budget'?'selected':''}>Uses campaign budget</option><option ${s.budget_type==='Daily Budget'?'selected':''}>Daily Budget</option><option ${s.budget_type==='Lifetime Budget'?'selected':''}>Lifetime Budget</option><option ${s.budget_type==='Campaign Budget'?'selected':''}>Campaign Budget</option></select></td><td>${usesCampaign?`<div class="pill accent">Uses campaign budget</div><p class="small" style="margin:6px 0 0;">No ${adsetTerm().slice(0,-1).toLowerCase()} amount needed.</p>`:`<input data-field="budget" value="${attr2(s.budget||'')}" placeholder="Budget amount">`}</td><td><textarea data-field="notes" placeholder="Audience, targeting, placements, import notes...">${esc2(s.notes||'')}</textarea></td><td><button class="mini-btn" data-remove-set="${i}">×</button></td></tr>`;}).join('')}</tbody></table>`:`<div class="empty">No ${adsetTerm().toLowerCase()} yet. Paste names above or add rows manually.</div>`}
    </section>`);

    const getPastedRows = ()=>{
      const raw = getEl('#bulkAdsetNames')?.value || '';
      const names = raw.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
      if(!names.length){ toast(`Paste at least one ${adsetTerm().slice(0,-1).toLowerCase()} name.`, true); return null; }
      const budgetType = getEl('#bulkBudgetType')?.value || 'Uses campaign budget';
      const amount = /campaign/i.test(budgetType) ? '' : (getEl('#bulkBudgetAmount')?.value || '').trim();
      const notes = (getEl('#bulkDefaultNotes')?.value || '').trim();
      return names.map((name,i)=>({
        ...adsetRowDefaults(i),
        name,
        budget_type:budgetType,
        budget:amount,
        notes,
        audience:notes,
        status:'Draft'
      }));
    };

    const toggleBulkAmount = ()=>{
      const wrap = getEl('#bulkBudgetAmountWrap');
      if(!wrap) return;
      wrap.classList.toggle('hidden', /campaign/i.test(getEl('#bulkBudgetType')?.value || ''));
    };

    getEl('#bulkBudgetType').onchange=toggleBulkAmount;
    toggleBulkAmount();

    getEl('#bulkReplaceAdsets').onclick=()=>{ const rows=getPastedRows(); if(!rows) return; collect(); v2.ad_sets=rows; render(); };
    getEl('#bulkAppendAdsets').onclick=()=>{ const rows=getPastedRows(); if(!rows) return; collect(); v2.ad_sets=[...v2.ad_sets,...rows]; render(); };
    getEl('#genSets').onclick=()=>{collect(); const n=Number(getEl('#v2Count').value||1); v2.ad_sets=Array.from({length:n},(_,i)=>v2.ad_sets[i]||adsetRowDefaults(i)); render();};
    getEl('#addSet').onclick=()=>{collect();v2.ad_sets.push(adsetRowDefaults(v2.ad_sets.length));render();};
    getEl('#nextAds').onclick=()=>{collect();v2.step='ads';render();};
    getAll('[data-remove-set]').forEach(b=>b.onclick=()=>{collect();v2.ad_sets.splice(+b.dataset.removeSet,1);render();});
    getAll('[data-v2-adset] [data-field]').forEach(el=>{ el.oninput=()=>{ collect(); }; el.onchange=()=>{ collect(); render(); }; });
  }
  function renderAds(){
    const targets=v2.ad_sets.map((s,i)=>s.name||`${adsetTerm().slice(0,-1)} ${i+1}`);
    shell(`<section class="jdw-v2-panel"><div class="jdw-v2-head"><div><span class="jdw-v2-pill">Ad Level</span><h3>Ads / creative assets</h3><p class="small">Add videos/assets and choose which ${adsetTerm().toLowerCase()} each ad sits in.</p></div><div class="row"><button class="btn secondary" id="addAd">+ Add Ad</button><button class="btn secondary" id="allAds">All ads in all ${adsetTerm().toLowerCase()}</button><button class="btn" id="nextBrief">Next: Brief</button></div></div>${v2.ads.length?`<table class="jdw-v2-table"><thead><tr><th>Ad name</th><th>Format</th><th>Track / Asset</th><th>Source / Spark code</th><th>CTA / Destination</th><th>${adsetTerm()}</th><th>Status</th><th></th></tr></thead><tbody>${v2.ads.map((ad,i)=>`<tr data-v2-ad="${i}"><td><input data-field="name" value="${attr2(ad.name||'')}"></td><td><input data-field="format" value="${attr2(ad.format||'')}"></td><td><input data-field="track" value="${attr2(ad.track||'')}"></td><td><input data-field="source" value="${attr2(ad.source||'')}"><input data-field="spark_code" value="${attr2(ad.spark_code||'')}" placeholder="Spark code" style="margin-top:6px"></td><td><input data-field="cta" value="${attr2(ad.cta||'')}" placeholder="CTA"><input data-field="destination" value="${attr2(ad.destination||'')}" placeholder="Destination" style="margin-top:6px"></td><td><div class="jdw-v2-targets">${targets.length?targets.map(t=>`<label><input type="checkbox" data-target value="${attr2(t)}" ${(ad.adset_targets||[]).includes(t)?'checked':''}>${esc2(t)}</label>`).join(''):`<span class="small">Add ${adsetTerm().toLowerCase()} first.</span>`}</div></td><td><select data-field="status"><option ${ad.status==='Draft'?'selected':''}>Draft</option><option ${ad.status==='Ready'?'selected':''}>Ready</option><option ${ad.status==='Live'?'selected':''}>Live</option><option ${ad.status==='Needs Review'?'selected':''}>Needs Review</option></select></td><td><button class="mini-btn" data-remove-ad="${i}">×</button></td></tr>`).join('')}</tbody></table>`:`<div class="empty">No ads yet. Add video/ad assets here.</div>`}</section>`);
    getEl('#addAd').onclick=()=>{collect();v2.ads.push({name:'',format:'',track:'',source:'',spark_code:'',destination:'',cta:'',status:'Draft',adset_targets:[]});render();};
    getEl('#allAds').onclick=()=>{collect();v2.ads.forEach(ad=>ad.adset_targets=targets.slice());render();};
    getEl('#nextBrief').onclick=()=>{collect();v2.step='brief';render();};
    getAll('[data-remove-ad]').forEach(b=>b.onclick=()=>{collect();v2.ads.splice(+b.dataset.removeAd,1);render();});
  }
  function renderBrief(){
    shell(`<section class="jdw-v2-panel"><div class="jdw-v2-head"><div><span class="jdw-v2-pill">Brief</span><h3>Brief outline</h3><p class="small">Budget, objective, territories, instructions and missing info.</p></div><button class="btn" id="nextChecklist">Next: Checklist</button></div><div class="jdw-v2-grid">${textarea('structured_brief','Clean Brief Outline')}${textarea('raw_brief','Raw Imported Brief')}${textarea('missing_info','Questions / Missing Info')}${textarea('report','Draft Report / Notes')}</div></section>`);
    getEl('#nextChecklist').onclick=()=>{collect();v2.step='checklist';render();};
  }
  function summary(){
    return `${label()} Campaign Build\n\nCampaign Name: ${v2.campaign_name||'TBC'}\nArtist / Track: ${v2.artistName||'TBC'} — ${v2.title||'TBC'}\nAd Account: ${v2.ad_account||'TBC'}\nBudget: ${v2.budget||'TBC'}\nTerritories: ${v2.territories||'TBC'}\nObjective: ${v2.objective||'TBC'}\n\n${adsetTerm()}:\n${v2.ad_sets.length?v2.ad_sets.map((s,i)=>`${i+1}. ${s.name||'Untitled'} — ${adsetUsesCampaignBudget(s)?'Uses campaign budget':`${s.budget||'Budget TBC'} ${s.budget_type||''}`}${s.notes?` — Notes: ${s.notes}`:''}`).join('\n'):'None yet'}\n\nAds:\n${v2.ads.length?v2.ads.map((ad,i)=>`${i+1}. ${ad.name||'Untitled'} — ${(ad.adset_targets||[]).length?'Targets: '+ad.adset_targets.join(', '):'Targets TBC'}`).join('\n'):'None yet'}\n\nQuestions / Missing Info:\n${v2.missing_info||'None'}`;
  }
  function renderChecklist(){
    const done=v2.checklist.filter(x=>x.done).length;
    shell(`<section class="jdw-v2-panel"><div class="jdw-v2-head"><div><span class="jdw-v2-pill">${label()} Checklist</span><h3>Pre-launch checklist</h3><p class="small">Platform-specific checklist.</p></div><div class="row"><span class="badge">${done}/${v2.checklist.length}</span><button class="btn" id="nextReport">Next: Status / Report</button></div></div><div class="grid-2"><div class="panel"><div class="jdw-v2-check-list">${v2.checklist.map((c,i)=>`<label class="check-item ${c.done?'done':''}"><input type="checkbox" data-v2-check="${i}" ${c.done?'checked':''}><span>${esc2(c.text)}</span></label>`).join('')}</div></div><div class="panel stack"><h3>Build summary</h3><textarea readonly style="min-height:360px">${esc2(summary())}</textarea><button class="btn secondary" id="copySummary">Copy Build Summary</button></div></div></section>`);
    getAll('[data-v2-check]').forEach(b=>b.onchange=()=>{collect();render();});
    getEl('#nextReport').onclick=()=>{collect();v2.step='report';render();};
    getEl('#copySummary').onclick=()=>navigator.clipboard.writeText(summary()).then(()=>toast('Build summary copied'));
  }
  function renderReport(){
    shell(`<section class="jdw-v2-panel"><div class="jdw-v2-head"><div><span class="jdw-v2-pill">Status / Report</span><h3>Status and report</h3><p class="small">Updates and copyable report.</p></div><div class="row"><button class="btn secondary" id="genReport">Generate Report</button><button class="btn secondary" id="copyReport">Copy Report</button><button class="btn" id="saveFinal">${v2.id?'Save Changes':'Create Campaign'}</button></div></div><div class="jdw-v2-report-grid"><div class="panel stack"><h3>Status</h3><div class="quality-list"><div class="quality-item"><span>Status</span><strong>${esc2(v2.status)}</strong></div><div class="quality-item"><span>Platform</span><strong>${label()}</strong></div><div class="quality-item"><span>${adsetTerm()}</span><strong>${v2.ad_sets.length}</strong></div><div class="quality-item"><span>Ads</span><strong>${v2.ads.length}</strong></div><div class="quality-item"><span>Checklist</span><strong>${v2.checklist.filter(x=>x.done).length}/${v2.checklist.length}</strong></div></div></div><div class="panel stack"><h3>Report</h3><textarea data-v2="report" style="min-height:380px">${esc2(v2.report||summary())}</textarea></div></div></section>`);
    getEl('#genReport').onclick=()=>{collect();v2.report=summary();render();};
    getEl('#copyReport').onclick=()=>{collect();navigator.clipboard.writeText(v2.report||summary()).then(()=>toast('Report copied'));};
    getEl('#saveFinal').onclick=saveV2;
  }
  function render(){
    try{ collect(); if(v2.step==='campaign')renderCampaign(); else if(v2.step==='adsets')renderAdsets(); else if(v2.step==='ads')renderAds(); else if(v2.step==='brief')renderBrief(); else if(v2.step==='checklist')renderChecklist(); else renderReport(); }
    catch(err){ console.error(err); modalRootEl().innerHTML=`<div class="modal-backdrop"><div class="modal"><div class="modal-head between"><h2>Builder error</h2><button class="btn secondary" onclick="document.getElementById('modalRoot').innerHTML=''">Close</button></div><div class="modal-body"><div class="panel"><strong>${esc2(err.message||err)}</strong></div></div></div></div>`; }
  }
  async function saveV2(){
    collect();
    if(!v2.artistName || !v2.title){ toast('Add artist and campaign / track name first.',true); v2.step='campaign'; render(); return; }
    try{
      const artist=await getOrCreateArtist(v2.artistName);
      const platformData={platform:v2.platform,campaign_name:v2.campaign_name,acid_code:v2.acid_code,ad_account:v2.ad_account,optimisation_goal:v2.optimisation_goal,budget_strategy:v2.budget_strategy,schedule_start:v2.schedule_start,schedule_end:v2.schedule_end,ads:v2.ads,ad_sets_meta:v2.ad_sets.map(s=>({imported_name:s.name||'',budget_type:s.budget_type||'',uses_campaign_budget:adsetUsesCampaignBudget(s),notes:s.notes||''}))};
      const payload={artist_id:artist.id,title:v2.title,status:v2.status,priority:v2.priority,deadline:v2.deadline||null,budget:v2.budget,objective:v2.objective,campaign_link:v2.campaign_link,territories:v2.territories,raw_brief:v2.raw_brief||'',structured_brief:v2.structured_brief||'',missing_info:v2.missing_info||'',report:v2.report||summary(),updated_at:new Date().toISOString(),platform:v2.platform,platform_data:platformData};
      let id=v2.id;
      if(id){
        let res=await sb.from('campaigns').update(payload).eq('id',id); if(res.error && /platform/i.test(res.error.message||'')){ delete payload.platform; delete payload.platform_data; res=await sb.from('campaigns').update(payload).eq('id',id); } if(res.error) throw res.error;
        await sb.from('ad_sets').delete().eq('campaign_id',id);
        await sb.from('checklist_items').delete().eq('campaign_id',id);
      }else{
        let res=await sb.from('campaigns').insert(payload).select().single(); if(res.error && /platform/i.test(res.error.message||'')){ delete payload.platform; delete payload.platform_data; res=await sb.from('campaigns').insert(payload).select().single(); } if(res.error) throw res.error; id=res.data.id; v2.id=id;
      }
      if(v2.ad_sets.length) await sb.from('ad_sets').insert(v2.ad_sets.map((s,i)=>({campaign_id:id,name:s.name||`${adsetTerm().slice(0,-1)} ${i+1}`,objective:s.objective||'',budget:adsetUsesCampaignBudget(s)?'':(s.budget||''),budget_type:s.budget_type||'Uses campaign budget',status:s.status||'Draft',audience:s.notes||'',notes:s.notes||'',position:i})));
      if(v2.checklist.length) await sb.from('checklist_items').insert(v2.checklist.map((c,i)=>({campaign_id:id,text:c.text,done:!!c.done,position:i})));
      await sb.from('work_logs').insert({campaign_id:id,logged_by:'System',log_type:id===v2.id?'Update':'Brief',text:`${label()} campaign saved from Campaign / ${adsetTerm()} / Ads builder.`,visible_to_james:true});
      await loadData(); toast('Campaign saved.');
    }catch(err){ toast(err.message||String(err),true); }
  }
  window.openCampaignModal=function(id,prefill=null){
    if(id){ const c=campaigns.find(x=>x.id===id); if(!c){ toast('Campaign not found',true); return; } v2=campaignToV2(c); render(); return; }
    if(prefill){ v2={...blank('meta'),...prefill,id:null,step:'campaign',ad_sets:prefill.ad_sets||[],ads:[],checklist:checklistFor('meta')}; render(); return; }
    renderChoice();
  };
})();
</script>

</body>
